<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#1a4d1a"/>
<link rel="manifest" href="audit_manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-touch-icon" href="icon-192.png"/>
<title>Monthly Report — MJM Nursery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g900:#0d2b0d;--g800:#1a4d1a;--g700:#236023;--g600:#2d7a2d;
  --g400:#5aab5a;--g300:#81c784;--g200:#b5dfb5;--g100:#e0f2e0;--g50:#f2faf2;
  --white:#fff;--surface:#f4f6f4;--border:#dde8dd;--border2:#c4d8c4;
  --text1:#182018;--text2:#3d5c3d;--text3:#6b8a6b;--text4:#9db09d;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:16px;background:var(--surface);color:var(--text1);-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--surface)}

/* TOP BAR */
.top-bar{position:sticky;top:0;z-index:200;height:56px;background:var(--g800);display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.top-bar-back{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.top-bar-back svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.top-bar-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-bar-icon svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.top-bar-title{font-size:15px;font-weight:700;color:#fff;flex:1}
.top-bar-sub{font-size:10px;color:rgba(255,255,255,.55)}
.top-bar-btn{width:36px;height:36px;border-radius:8px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.top-bar-btn svg{width:18px;height:18px;stroke:rgba(255,255,255,.85);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* FILTER CARD */
.filter-card{background:var(--white);border-bottom:1px solid var(--border);padding:16px}
.filter-row{display:flex;gap:10px;margin-bottom:12px;align-items:flex-end}
.filter-row:last-child{margin-bottom:0}
.filter-field{flex:1}
.filter-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.select-wrap{position:relative}
.select-wrap::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:6px solid var(--text3);pointer-events:none}
select.input{width:100%;height:40px;padding:0 30px 0 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--r-md);background:var(--surface);color:var(--text1);outline:none;-webkit-appearance:none;appearance:none}
select.input:focus{border-color:var(--g400);background:var(--white)}
.module-checks{display:flex;flex-wrap:wrap;gap:8px}
.mod-check{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;background:var(--surface);border:1px solid var(--border2);padding:6px 12px;border-radius:var(--r-full,20px);-webkit-tap-highlight-color:transparent}
.mod-check input{display:none}
.mod-check.checked{background:var(--g800);color:#fff;border-color:var(--g800)}
.btn-generate{width:100%;height:44px;background:var(--g800);color:#fff;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--r-md);cursor:pointer;margin-top:14px}
.btn-generate:active{background:var(--g700)}

/* REPORT OUTPUT */
.report-wrap{padding:14px 12px 80px}

/* PRINT HEADER */
.report-header{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:12px;text-align:center}
.report-logo{font-size:22px;font-weight:800;color:var(--g800);letter-spacing:-.5px}
.report-logo span{color:var(--g400)}
.report-company{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.6px}
.report-title{font-size:16px;font-weight:700;color:var(--text1);margin-top:12px}
.report-period{font-size:13px;color:var(--text3);margin-top:4px}
.report-generated{font-size:11px;color:var(--text4);margin-top:6px}

/* SUMMARY CARDS */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sum-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 10px;text-align:center}
.sum-val{font-size:22px;font-weight:700;color:var(--g800);line-height:1}
.sum-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

/* NURSERY SECTION */
.nursery-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden}
.nursery-section-head{background:var(--g800);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.nursery-section-title{font-size:14px;font-weight:700;color:#fff}
.nursery-section-sub{font-size:11px;color:rgba(255,255,255,.6)}
.nursery-section-count{font-size:12px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;padding:3px 10px;border-radius:20px}

/* TABLE */
.report-table{width:100%;border-collapse:collapse}
.report-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);background:var(--g50)}
.report-table th:not(:first-child){text-align:center}
.report-table td{font-size:12px;color:var(--text1);padding:10px 14px;border-bottom:1px solid var(--border)}
.report-table td:not(:first-child){text-align:center;font-weight:600}
.report-table tr:last-child td{border-bottom:none}
.report-table tr:hover td{background:var(--g50)}
.total-row td{background:var(--g50);font-weight:700;color:var(--g800);border-top:2px solid var(--border)}
.zero{color:var(--text4)}
.has-data{color:var(--g700)}

/* MODULE BADGE */
.mod-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--g100);color:var(--g700);margin-right:4px;margin-bottom:2px}

/* MODULE BREAKDOWN (per-nursery case counts) */
.module-breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:12px;background:var(--white);border-bottom:1px solid var(--border)}
.mod-stat{display:flex;justify-content:space-between;align-items:center;background:var(--g50);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;color:var(--text2);min-width:0}
.mod-stat-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mod-stat-count{font-weight:800;color:var(--g800);font-size:14px;flex-shrink:0;margin-left:8px}

/* DETAIL RECORD CARDS */
.detail-records-wrap{padding:8px 10px;background:var(--surface)}
.detail-record{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.detail-record:last-child{margin-bottom:0}
.detail-record-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.detail-record-date{font-size:11px;font-weight:700;color:var(--text2)}
.detail-record-auditor{font-size:11px;font-weight:600;color:var(--g700);background:var(--g50);padding:2px 8px;border-radius:10px}
.detail-record-loc{font-size:13px;font-weight:700;color:var(--text1);margin-bottom:6px}
.detail-record-results{display:flex;flex-wrap:wrap;gap:4px}
.detail-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text2)}

/* EMPTY */
.empty-report{text-align:center;padding:3rem 1rem;color:var(--text4)}
.empty-report svg{width:48px;height:48px;stroke:var(--g200);fill:none;stroke-width:1.2;margin:0 auto 12px;display:block}

/* PRINT BUTTON */
.print-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px;background:var(--white);border-top:1px solid var(--border);display:flex;gap:8px;z-index:100}
.btn-print{flex:1;height:44px;background:var(--g800);color:#fff;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--r-md);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-print svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-print-secondary{flex:0 0 44px;height:44px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-print-secondary svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.print-bar.hidden{display:none}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--g900);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;z-index:9999;transition:all .28s ease}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADING */
#loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;display:flex;align-items:center;justify-content:center}
#loading-overlay.hidden{display:none !important}
.loading-box{background:#fff;border-radius:16px;padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--g100);border-top-color:var(--g800);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:13px;font-weight:600;color:var(--text2)}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* ── PRINT STYLES ── */
@media print {
  @page { margin: 15mm; size: A4; }
  body { background: #fff; font-size: 11pt; }
  #app { max-width: 100%; }
  .top-bar, .filter-card, .print-bar, .toast, #loading-overlay { display: none !important; }
  .report-wrap { padding: 0; }
  .nursery-section { break-inside: avoid; page-break-inside: avoid; }
  .report-header { border: 2px solid #1a4d1a; margin-bottom: 16pt; }
  .report-logo { font-size: 20pt; }
  .report-title { font-size: 14pt; }
  .nursery-section-head { background: #1a4d1a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .report-table th { background: #f2faf2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .total-row td { background: #f2faf2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .summary-row { break-inside: avoid; }
  a { text-decoration: none; color: inherit; }
}
</style>
</head>
<body>
<div id="app">

  <nav class="top-bar">
    <a href="audit_home.html" class="top-bar-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <div class="top-bar-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
    <div style="flex:1">
      <div class="top-bar-title">Monthly Report</div>
      <div class="top-bar-sub" id="nav-today"></div>
    </div>
    <button class="top-bar-btn" onclick="generateReport()" title="Refresh">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
    </button>
  </nav>

  <!-- FILTERS -->
  <div class="filter-card">
    <div class="filter-row">
      <div class="filter-field">
        <div class="filter-label">Month</div>
        <div class="select-wrap">
          <select class="input" id="f-month">
            <option value="1">January</option><option value="2">February</option>
            <option value="3">March</option><option value="4">April</option>
            <option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option>
            <option value="9">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>
          </select>
        </div>
      </div>
      <div class="filter-field">
        <div class="filter-label">Year</div>
        <div class="select-wrap">
          <select class="input" id="f-year"></select>
        </div>
      </div>
    </div>
    <div class="filter-label" style="margin-bottom:8px">Nursery Group</div>
    <div class="module-checks" id="scope-checks" style="margin-bottom:14px">
      <label class="mod-check checked" data-scope="all" onclick="setScope('all')">Both</label>
      <label class="mod-check" data-scope="pn" onclick="setScope('pn')">🌱 Pre Nursery</label>
      <label class="mod-check" data-scope="mn" onclick="setScope('mn')">🌳 Main Nursery</label>
    </div>
    <div class="filter-label" style="margin-bottom:8px">Modules to Include</div>
    <div class="module-checks">
      <label class="mod-check checked" id="mc-plot" onclick="toggleMod(this,'plot')"><input type="checkbox" checked/>📋 Plot Condition</label>
      <label class="mod-check checked" id="mc-height" onclick="toggleMod(this,'height')"><input type="checkbox" checked/>📏 Seedling Height</label>
      <label class="mod-check checked" id="mc-papan" onclick="toggleMod(this,'papan')"><input type="checkbox" checked/>🪧 Papan Tanda</label>
      <label class="mod-check checked" id="mc-maint" onclick="toggleMod(this,'maint')"><input type="checkbox" checked/>🔧 Maintenance</label>
    </div>
    <button class="btn-generate" onclick="generateReport()">Generate Report</button>
  </div>

  <!-- REPORT OUTPUT -->
  <div class="report-wrap" id="report-output">
    <div class="empty-report">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>Select month, year and modules<br>then tap <strong>Generate Report</strong></p>
    </div>
  </div>

  <!-- PRINT BAR -->
  <div class="print-bar hidden" id="print-bar">
    <button class="btn-print" onclick="window.print()">
      <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print / Save PDF
    </button>
  </div>

  <div class="toast" id="toast"></div>
  <div id="loading-overlay" class="hidden">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <span class="loading-text">Generating report...</span>
    </div>
  </div>

</div>

<script src="audit_lang.js?v=8"></script>
<script src="audit_supabase.js?v=8"></script>
<script src="audit_dexie_offline.js?v=8"></script>
<script>
'use strict';

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const PN_NURSERIES  = ['PN'];
const MN_NURSERIES  = ['BNN','UNN1','UNN2'];

let toastTimer = null;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}
function setLoading(on){
  document.getElementById('loading-overlay').classList.toggle('hidden',!on);
}

/* ── Init month/year dropdowns ── */
function initFilters(){
  const now = new Date();
  const mSel = document.getElementById('f-month');
  const ySel = document.getElementById('f-year');
  mSel.value = now.getMonth()+1;
  const curYear = now.getFullYear();
  for(let y=curYear; y>=curYear-3; y--){
    const o=document.createElement('option');
    o.value=y;o.textContent=y;
    if(y===curYear) o.selected=true;
    ySel.appendChild(o);
  }
  document.getElementById('nav-today').textContent =
    now.toLocaleDateString('en-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

/* ── Module toggles ── */
const selectedMods = new Set(['plot','height','papan','maint']);
function toggleMod(el, mod){
  if(selectedMods.has(mod)){
    if(selectedMods.size===1){showToast('⚠ At least one module required');return;}
    selectedMods.delete(mod);el.classList.remove('checked');
  } else {
    selectedMods.add(mod);el.classList.add('checked');
  }
}

/* ── Nursery scope ── */
let selectedScope = 'all';
function setScope(s){
  selectedScope = s;
  document.querySelectorAll('#scope-checks .mod-check').forEach(el=>{
    el.classList.toggle('checked', el.dataset.scope === s);
  });
}

/* ── Date helpers ── */
function monthRange(month, year){
  const start = `${year}-${String(month).padStart(2,'0')}-01`;
  const lastDay = new Date(year, month, 0).getDate();
  const end = `${year}-${String(month).padStart(2,'0')}-${lastDay}`;
  return {start, end};
}

/* ── Fetch data from Supabase ── */
async function fetchData(month, year){
  const {start, end} = monthRange(month, year);
  const dateFilter = `date=gte.${start}&date=lte.${end}`;

  const fetches = {};
  if(selectedMods.has('plot'))
    fetches.plot = sb.select('audit_plot_audits', `select=nursery,plot,batch,auditor_name,pest,tikus,disease,warna_daun,date&${dateFilter}`).catch(()=>[]);
  if(selectedMods.has('height'))
    fetches.height = sb.select('audit_height_records', `select=nursery,plot,batch,auditor_name,sample_1,sample_2,sample_3,avg_height,date&${dateFilter}`).catch(()=>[]);
  if(selectedMods.has('papan'))
    fetches.papan = sb.select('audit_papan_audits', `select=nursery,plot,batch_no,auditor_name,presence,info_correct,condition,date&${dateFilter}`).catch(()=>[]);
  if(selectedMods.has('maint'))
    fetches.maint = sb.select('audit_maintenance_audits', `select=nursery,plot,task_type,result,auditor_name,date&${dateFilter}`).catch(()=>[]);

  const keys = Object.keys(fetches);
  const results = await Promise.all(Object.values(fetches));
  const data = {};
  keys.forEach((k,i) => data[k] = results[i]);
  return data;
}

/* ── Count records per auditor per module per nursery group ── */
function tally(data, nurseries){
  // auditor → module → count
  const counts = {};

  function add(mod, rows){
    if(!rows) return;
    rows.forEach(r=>{
      if(!nurseries.includes(r.nursery)) return;
      const name = r.auditor_name || r.created_by || 'Unknown';
      if(!counts[name]) counts[name]={};
      counts[name][mod] = (counts[name][mod]||0) + 1;
    });
  }

  if(data.plot)   add('plot',   data.plot);
  if(data.height) add('height', data.height);
  if(data.papan)  add('papan',  data.papan);
  if(data.maint)  add('maint',  data.maint);
  return counts;
}

/* ── Build table HTML ── */
function buildTable(counts){
  const auditors = Object.keys(counts);
  if(!auditors.length) return '<p style="padding:16px;color:var(--text4);font-size:13px;text-align:center">No records found for this period.</p>';

  const mods = [...selectedMods];
  const modLabels = {plot:'Plot',height:'Height',papan:'Papan',maint:'Maint'};

  // Header
  let html = `<table class="report-table">
    <thead><tr>
      <th>Auditor</th>
      ${mods.map(m=>`<th>${modLabels[m]}</th>`).join('')}
      <th>Total</th>
    </tr></thead><tbody>`;

  // Totals per module
  const modTotals = {};
  mods.forEach(m => modTotals[m]=0);
  let grandTotal = 0;

  auditors.sort().forEach(name=>{
    let rowTotal=0;
    const cells = mods.map(m=>{
      const n = counts[name][m]||0;
      modTotals[m]+=n;
      rowTotal+=n;
      return `<td class="${n?'has-data':'zero'}">${n||'—'}</td>`;
    }).join('');
    grandTotal+=rowTotal;
    html+=`<tr><td style="font-weight:600">${name}</td>${cells}<td style="font-weight:700;color:var(--g800)">${rowTotal}</td></tr>`;
  });

  // Total row
  const totalCells = mods.map(m=>`<td>${modTotals[m]||'—'}</td>`).join('');
  html+=`<tr class="total-row"><td>TOTAL</td>${totalCells}<td>${grandTotal}</td></tr>`;
  html+=`</tbody></table>`;
  return html;
}

/* ── Per-nursery module case counts ── */
function buildModuleBreakdown(data, nurseries){
  const mods = [...selectedMods];
  const labels = {plot:'📋 Plot Condition',height:'📏 Seedling Height',papan:'🪧 Papan Tanda',maint:'🔧 Maintenance'};
  const cells = mods.map(m=>{
    const n = (data[m]||[]).filter(r=>nurseries.includes(r.nursery)).length;
    return `<div class="mod-stat"><span class="mod-stat-label">${labels[m]}</span><span class="mod-stat-count">${n}</span></div>`;
  }).join('');
  return `<div class="module-breakdown">${cells}</div>`;
}

/* ── Build detailed per-record sections ── */
function buildDetailsHTML(data, nurseries, headerColor){
  const mods = [...selectedMods];
  const modLabels = {plot:'Plot Condition',height:'Seedling Height',papan:'Papan Tanda',maint:'Maintenance'};
  const modIcons  = {plot:'📋',height:'📏',papan:'🪧',maint:'🔧'};

  let html = '<div style="margin-top:14px">';
  let any = false;

  mods.forEach(mod=>{
    const rows = (data[mod] || []).filter(r=>nurseries.includes(r.nursery));
    if(!rows.length) return;
    any = true;

    html += `<div class="nursery-section">
      <div class="nursery-section-head" style="background:${headerColor||'var(--g700)'}">
        <div><div class="nursery-section-title">${modIcons[mod]} ${modLabels[mod]}</div></div>
        <span class="nursery-section-count">${rows.length} record${rows.length>1?'s':''}</span>
      </div>
      <div class="detail-records-wrap">`;

    const sorted = [...rows].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    sorted.forEach(r=>{
      const d = r.date ? r.date.split('T')[0] : '—';
      const auditor = r.auditor_name || 'Unknown';
      const batch = mod==='papan' ? r.batch_no : r.batch;
      let pills = '';
      if(mod==='plot'){
        pills = `<span class="detail-pill">Pest: ${r.pest||'—'}</span>
          <span class="detail-pill">Animal: ${r.tikus||'—'}</span>
          <span class="detail-pill">Disease: ${r.disease||'—'}</span>
          <span class="detail-pill">Leaf: ${r.warna_daun||'—'}</span>`;
      } else if(mod==='height'){
        pills = `<span class="detail-pill">S1: ${r.sample_1??'—'} cm</span>
          <span class="detail-pill">S2: ${r.sample_2??'—'} cm</span>
          <span class="detail-pill">S3: ${r.sample_3??'—'} cm</span>
          <span class="detail-pill" style="background:var(--g100);color:var(--g700);border-color:var(--g200)">Avg: ${r.avg_height??'—'} cm</span>`;
      } else if(mod==='papan'){
        pills = `<span class="detail-pill">Presence: ${r.presence||'—'}</span>
          <span class="detail-pill">Info: ${r.info_correct||'—'}</span>
          <span class="detail-pill">Condition: ${r.condition||'—'}</span>`;
      } else if(mod==='maint'){
        pills = `<span class="detail-pill">Task: ${r.task_type||'—'}</span>
          <span class="detail-pill" style="background:var(--g100);color:var(--g700);border-color:var(--g200)">${r.result||'—'}</span>`;
      }

      html += `<div class="detail-record">
        <div class="detail-record-top">
          <span class="detail-record-date">${d}</span>
          <span class="detail-record-auditor">${auditor}</span>
        </div>
        <div class="detail-record-loc">${r.nursery} · ${r.plot}${batch?' · Batch '+batch:''}</div>
        <div class="detail-record-results">${pills}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += '</div>';
  return any ? html : '';
}

/* ── GENERATE REPORT ── */
async function generateReport(){
  const month = parseInt(document.getElementById('f-month').value);
  const year  = parseInt(document.getElementById('f-year').value);
  const periodStr = `${MONTHS[month-1]} ${year}`;

  setLoading(true);
  try{
    const data = await fetchData(month, year);

    const showPN = selectedScope === 'all' || selectedScope === 'pn';
    const showMN = selectedScope === 'all' || selectedScope === 'mn';

    const pnCounts = tally(data, PN_NURSERIES);
    const mnCounts = tally(data, MN_NURSERIES);

    // Count totals
    const countAll = (counts) => Object.values(counts).reduce((s,v)=>s+Object.values(v).reduce((a,b)=>a+b,0),0);
    const pnTotal = countAll(pnCounts);
    const mnTotal = countAll(mnCounts);
    const grandTotal = pnTotal + mnTotal;

    const now = new Date();
    const mods = [...selectedMods];
    const modLabels = {plot:'Plot Condition',height:'Seedling Height',papan:'Papan Tanda',maint:'Maintenance'};
    const modBadges = mods.map(m=>`<span class="mod-badge">${modLabels[m]}</span>`).join('');

    const html = `
      <!-- Report Header -->
      <div class="report-header">
        <div class="report-logo">MJM <span>Nursery</span></div>
        <div class="report-company">Mega Jutamas Sdn Bhd · Miri, Sarawak</div>
        <div class="report-title">Monthly Audit Report</div>
        <div class="report-period">${periodStr}</div>
        <div style="margin-top:10px">${modBadges}</div>
        <div class="report-generated">Generated: ${now.toLocaleString('en-MY',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
      </div>

      <!-- Summary -->
      <div class="summary-row">
        <div class="sum-card"><div class="sum-val">${grandTotal}</div><div class="sum-label">Total Audits</div></div>
        <div class="sum-card"><div class="sum-val" style="color:var(--g700)">${pnTotal}</div><div class="sum-label">Pre Nursery</div></div>
        <div class="sum-card"><div class="sum-val" style="color:#1565c0">${mnTotal}</div><div class="sum-label">Main Nursery</div></div>
      </div>

      ${showPN?`
      <!-- PN Section -->
      <div class="nursery-section">
        <div class="nursery-section-head">
          <div>
            <div class="nursery-section-title">Pre Nursery (PN)</div>
            <div class="nursery-section-sub">Plots P01 – P52</div>
          </div>
          <span class="nursery-section-count">${pnTotal} audits</span>
        </div>
        ${buildModuleBreakdown(data, PN_NURSERIES)}
        ${selectedScope==='all'?buildTable(pnCounts):''}
      </div>
      ${buildDetailsHTML(data, PN_NURSERIES, 'var(--g700)')}
      `:''}

      ${showMN?`
      <!-- MN Section -->
      <div class="nursery-section" style="margin-top:18px">
        <div class="nursery-section-head" style="background:#1565c0">
          <div>
            <div class="nursery-section-title">Main Nursery (BNN + UNN1 + UNN2)</div>
            <div class="nursery-section-sub">B01–B14 · U01–U18 · N01–N20</div>
          </div>
          <span class="nursery-section-count">${mnTotal} audits</span>
        </div>
        ${buildModuleBreakdown(data, MN_NURSERIES)}
        ${selectedScope==='all'?buildTable(mnCounts):''}
      </div>
      ${buildDetailsHTML(data, MN_NURSERIES, '#1565c0')}
      `:''}
    `;

    document.getElementById('report-output').innerHTML = html;
    document.getElementById('print-bar').classList.remove('hidden');
    showToast('✓ Report generated');
  }catch(e){
    console.error(e);
    showToast('⚠ Failed to load: '+e.message);
  }
  setLoading(false);
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', ()=>{
  initFilters();
});
