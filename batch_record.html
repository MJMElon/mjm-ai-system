<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Info - MJM Nursery AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Earthy Theme Colors */
        body { background-color: #f8f4ec; margin: 0; font-family: 'Outfit', system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(#e8dcc8 1px, transparent 1px); background-size: 24px 24px; z-index: -2; opacity: 0.5; }
        .glass-panel { background-color: rgba(253, 250, 244, 0.95); backdrop-filter: blur(24px); border: 1px solid #ffffff; box-shadow: 0 25px 50px -12px rgba(61, 38, 16, 0.08); border-l: 12px solid #6aa83c; }
        
        .prog-circle { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px;}

        /* Ledger Table Styles */
        #ledger-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #8a7a68; padding: 12px 16px; border-bottom: 2px solid #e8dcc8; }
        #ledger-table td { font-size: 13px; font-weight: 600; color: #1a150d; padding: 16px; border-bottom: 1px solid #f8f4ec; vertical-align: middle; }
        
        /* Bar Chart Animation */
        .chart-bar { transition: height 1s ease-out; }

        /* List Tabs */
        .list-tab-btn { padding: 10px 20px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 12px; transition: all 0.2s; white-space: nowrap; border: 2px solid transparent;}
        .list-tab-active { background-color: #6aa83c; color: white; border-color: #4a7a2e; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transform: scale(1.02);}
        .list-tab-inactive { background-color: white; color: #8a7a68; border-color: transparent;}
        .list-tab-inactive:hover { border-color: #e8dcc8; color: #3d2610;}
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 relative">
    <div class="bg-pattern"></div>

    <div class="w-full max-w-[1600px] mx-auto z-10 space-y-6 py-4">
        
        <div class="glass-panel p-6 rounded-[2rem] flex flex-col md:flex-row items-center justify-between gap-4 relative overflow-hidden !border-[#3d2610]">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-bold text-[#8a7a68] hover:text-[#3d2610] uppercase tracking-widest bg-[#f8f4ec] hover:bg-[#e8dcc8] px-5 py-3 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Dashboard
            </button>
            <h1 class="text-2xl md:text-3xl font-black uppercase tracking-widest text-[#3d2610] drop-shadow-sm pb-1 text-center" style="word-spacing: 0.2em;">Batch Info</h1>
            <div class="hidden md:block w-[130px]"></div>
        </div>

        <div class="glass-panel p-8 rounded-[3rem] shadow-xl relative overflow-hidden bg-gradient-to-br from-[#3d2610] to-[#1a150d] text-[#fdfaf4] !border-[#5c3d1e]">
            <div class="absolute inset-0 bg-cover bg-center opacity-10" style="background-image: url('https://kibqjztozokohqmhqqqf.supabase.co/storage/v1/object/public/system_map/nursery_bg.jpeg'); filter: saturate(0) brightness(0.5);"></div>
            
            <div class="flex flex-col md:flex-row items-center gap-6 mb-8 border-b border-[#5c3d1e] pb-6 relative z-10">
                <span class="w-20 h-20 bg-[#2e4a1e] text-white rounded-[2rem] flex items-center justify-center text-5xl shadow-2xl border-2 border-[#6aa83c]">🌴</span>
                <div class="text-center md:text-left flex-1">
                    <h2 class="text-3xl font-black uppercase tracking-widest text-[#fdfaf4]">Batch Statistics</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
                
                <div class="bg-[#1a150d]/60 p-6 rounded-2xl border border-[#5c3d1e] flex flex-col justify-center group hover:border-[#6aa83c] transition-colors">
                    <span class="text-[10px] font-bold text-[#e8dcc8] uppercase tracking-wider mb-1">Total Active Batches</span>
                    <span id="stat-active-batches" class="text-6xl font-black text-white">0</span>
                    <span class="text-[9px] text-[#9dd458] font-bold mt-2 uppercase tracking-widest group-hover:animate-pulse">Currently in nursery</span>
                </div>
                
                <div class="bg-[#1a150d]/60 p-6 rounded-2xl border border-[#5c3d1e] flex flex-col justify-center">
                    <span class="text-[10px] font-bold text-[#e8dcc8] uppercase tracking-wider mb-1">Average Culling Rate in Year <span id="current-year-label"></span></span>
                    <div class="flex items-baseline gap-2">
                        <span id="stat-culling-rate" class="text-6xl font-black text-[#c07820]">0%</span>
                    </div>
                    <span class="text-[9px] text-[#e8dcc8] opacity-70 font-bold mt-2 uppercase tracking-widest">Based on completed batches</span>
                </div>
                
                <div class="bg-[#1a150d]/60 p-6 rounded-2xl border border-[#5c3d1e] flex flex-col">
                    <span class="text-[10px] font-bold text-[#e8dcc8] uppercase tracking-wider mb-3">Yearly Culling Trend (%)</span>
                    <div class="flex-1 flex items-end gap-3 h-24 pt-2 border-b border-[#5c3d1e] pb-2" id="culling-chart">
                        </div>
                    <div id="culling-chart-labels" class="flex justify-between mt-2 text-[8px] font-bold text-[#e8dcc8] uppercase tracking-widest opacity-70">
                        </div>
                </div>

            </div>
        </div>

        <div class="glass-panel p-8 rounded-[3rem] shadow-lg border-[#e8dcc8]">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-[#e8dcc8] pb-5 gap-4">
                <h3 class="text-xl font-black text-[#3d2610] uppercase tracking-widest">Life of Seedling</h3>
                
                <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
                    <div class="relative w-full md:w-64">
                        <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-[#8a7a68]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="search-input" onkeyup="filterLedger()" placeholder="Search Batch ID..." class="w-full pl-12 pr-4 py-3 border border-[#e8dcc8] rounded-xl font-semibold text-sm outline-none focus:border-[#6aa83c] focus:ring-1 focus:ring-[#6aa83c] bg-white shadow-inner text-[#1a150d]">
                    </div>
                    
                    <button onclick="window.location.href='batch_detail.html?type=new'" class="w-full md:w-auto px-6 py-3 rounded-xl bg-[#6aa83c] text-white font-black text-[11px] uppercase tracking-widest shadow-md transition-transform hover:scale-[1.03] hover:bg-[#4a7a2e] flex items-center justify-center gap-2 whitespace-nowrap border border-[#4a7a2e]">
                        <span class="text-lg leading-none">+</span> Add New Batch Record
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-white p-2 rounded-2xl border border-[#e8dcc8] shadow-inner mb-6 w-fit overflow-x-auto">
                <button id="tab-active" class="list-tab-btn list-tab-active" onclick="switchListTab('active')">🟢 Active List</button>
                <button id="tab-completed" class="list-tab-btn list-tab-inactive" onclick="switchListTab('completed')">✅ Completed Batches</button>
            </div>
            
            <div class="bg-white rounded-2xl border border-[#e8dcc8] overflow-hidden shadow-inner">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[900px]" id="ledger-table">
                        <thead class="bg-[#f8f4ec]">
                            <tr>
                                <th>Batch</th>
                                <th>Breed</th>
                                <th>Planted Date</th>
                                <th>Planted Qty</th>
                                <th style="min-width: 180px;">Current Stage</th>
                                <th>Survival %</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ledger-body">
                            <tr>
                                <td colspan="7" class="text-center p-16 text-[#8a7a68] font-bold animate-pulse uppercase tracking-widest text-xs">Loading seedling list...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://kibqjztozokohqmhqqqf.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYnFqenRvem9rb2hxbWhxcXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzQzNjIsImV4cCI6MjA4OTgxMDM2Mn0.J7qJUZhWXYf5b9oey4wXJkjdi66jomEMw_NeV9NWF7M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let masterBatches = [];
        let currentListTab = 'active';

        async function initLedger() {
            try {
                // Fetch reception logs to build the summary list
                const { data: recLogs, error } = await _supabase
                    .from('inventory_logs')
                    .select('*')
                    .eq('transaction_type', 'Seeds_Received')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;

                // Process logic & simulate stages
                masterBatches = (recLogs || []).map(b => processBatchLogic(b));
                
                // Get Current Year
                const currentYear = new Date().getFullYear();
                document.getElementById('current-year-label').innerText = currentYear;

                // Process stats for CURRENT YEAR
                let totalActive = 0;
                let currentYearBatches = [];

                masterBatches.forEach(b => {
                    if (!b.isCompleted) totalActive++;
                    
                    const batchYear = new Date(b.created_at).getFullYear();
                    if (batchYear === currentYear && b.isCompleted) {
                        currentYearBatches.push(b);
                    }
                });

                // Calculate Average Culling Rate (Based on completed batches)
                let avgCulling = 0;
                if (currentYearBatches.length > 0) {
                    const sumCulling = currentYearBatches.reduce((sum, b) => sum + b.mockCullRate, 0);
                    avgCulling = (sumCulling / currentYearBatches.length).toFixed(1);
                }

                document.getElementById('stat-active-batches').innerText = totalActive;
                document.getElementById('stat-culling-rate').innerText = avgCulling + '%';

                renderCullingChart(currentYearBatches);
                switchListTab('active'); // Initial render

            } catch(e) { 
                console.error("Data load error:", e);
                document.getElementById('ledger-body').innerHTML = `<tr><td colspan="7" class="text-center p-10 text-red-600 font-bold">Error connecting to database. Verify Supabase policies.</td></tr>`;
            }
        }

        // --- CORE LOGIC ENGINE (Simulated until DB tables are built) ---
        function processBatchLogic(b) {
            const ageDays = Math.floor((new Date() - new Date(b.created_at)) / (1000 * 60 * 60 * 24));
            const ageMonths = ageDays / 30.44;
            const plantedQty = b.quantity_change || 0;
            
            b.mockCullRate = parseFloat((Math.random() * 8 + 2).toFixed(1)); // Base culling memory
            b.isCompleted = false;

            // 1. Pre-Nursery Maturing (0 to 3 months)
            if (ageMonths <= 3) {
                b.stageName = 'Pre-Nursery';
                b.stageColor = 'bg-[#c07820]'; // Amber
                b.progressPct = Math.min(100, Math.round((ageMonths / 3) * 100));
                b.progressText = `Maturing Progress: ${b.progressPct}%`;
            } 
            // 2. Matured to be transplanted (Gap before transplanting starts)
            else if (ageMonths > 3 && ageMonths <= 3.2) {
                b.stageName = 'Pre-Nursery';
                b.stageColor = 'bg-[#c07820]';
                b.progressPct = 100;
                b.progressText = `Matured to be transplant`;
            }
            // 3. Transplanting Process
            else if (ageMonths > 3.2 && ageMonths <= 4) {
                b.stageName = 'Transplanting';
                b.stageColor = 'bg-[#8a7a68]'; // Earthy Gray
                // Simulate transplanted/total planted seeds
                let transplanted = Math.round(plantedQty * ((ageMonths - 3.2) / 0.8));
                b.progressPct = Math.min(100, Math.round((transplanted / plantedQty) * 100));
                b.progressText = `Transplanting Progress: ${b.progressPct}%`;
            }
            // 4. Main Nursery Maturing (4 to 12 months = 9 months duration)
            else if (ageMonths > 4 && ageMonths <= 13) {
                b.stageName = 'Main Nursery';
                b.stageColor = 'bg-[#3a7ab4]'; // Sky Blue
                b.progressPct = Math.min(100, Math.round(((ageMonths - 4) / 9) * 100));
                b.progressText = `Maturing Progress: ${b.progressPct}%`;
            }
            // 5. Ready to Sales (Simulating Sold / Transplanted Qty)
            else if (ageMonths > 13 && ageMonths <= 16) {
                b.stageName = 'Ready for Sale';
                b.stageColor = 'bg-[#6aa83c]'; // Sprout Green
                let sold = Math.round(plantedQty * ((ageMonths - 13) / 3));
                b.progressPct = Math.min(100, Math.round((sold / plantedQty) * 100));
                b.progressText = `Sales Progress: ${b.progressPct}%`;
            }
            // 6. Completed
            else {
                b.stageName = 'Completed';
                b.stageColor = 'bg-[#4a7a2e]'; // Dark Green
                b.progressPct = 100;
                b.progressText = `100% Sold & Completed`;
                b.isCompleted = true;
            }

            return b;
        }

        function switchListTab(tabName) {
            currentListTab = tabName;
            
            // Update Button Styles
            if(tabName === 'active') {
                document.getElementById('tab-active').className = 'list-tab-btn list-tab-active';
                document.getElementById('tab-completed').className = 'list-tab-btn list-tab-inactive';
            } else {
                document.getElementById('tab-active').className = 'list-tab-btn list-tab-inactive';
                document.getElementById('tab-completed').className = 'list-tab-btn list-tab-active';
            }

            renderLedgerTable();
        }

        function renderLedgerTable() {
            const body = document.getElementById('ledger-body');
            body.innerHTML = '';

            // Filter batches based on active tab
            let displayBatches = masterBatches.filter(b => 
                currentListTab === 'active' ? !b.isCompleted : b.isCompleted
            );

            if(displayBatches.length === 0) {
                const emptyMsg = currentListTab === 'active' ? "No active batches in the nursery." : "No completed batches yet.";
                body.innerHTML = `<tr><td colspan="7" class="text-center p-16 text-[#8a7a68] font-bold">${emptyMsg}</td></tr>`;
                return;
            }

            displayBatches.forEach(b => {
                const datePlanted = new Date(b.created_at).toLocaleDateString('en-MY', { day: '2-digit', month: 'short', year: 'numeric' });
                const plantedQty = b.quantity_change ? b.quantity_change.toLocaleString() : '0';
                
                const survRate = (100 - b.mockCullRate).toFixed(1) + '%';
                const survColor = (100 - b.mockCullRate) > 90 ? 'text-[#6aa83c]' : 'text-[#c07820]';

                body.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-[#f8f4ec] transition-colors batch-row">
                        <td class="text-[#3d2610] font-black tracking-wider text-base batch-id-cell">${b.batch_name}</td>
                        <td class="breed-cell">${b.breed_name || '—'}</td>
                        <td class="text-[#8a7a68] text-xs">${datePlanted}</td>
                        <td class="font-black text-[#1a150d]">${plantedQty}</td>
                        <td>
                            <div class="flex flex-col gap-1.5 w-full max-w-[160px]">
                                <div class="font-bold text-xs flex items-center"><span class="prog-circle ${b.stageColor} shadow-sm"></span>${b.stageName}</div>
                                <div class="w-full bg-[#e8dcc8] rounded-full h-1.5 shadow-inner">
                                    <div class="${b.stageColor} h-1.5 rounded-full transition-all duration-500" style="width: ${b.progressPct}%"></div>
                                </div>
                                <span class="text-[9px] text-[#8a7a68] font-bold uppercase tracking-widest">${b.progressText}</span>
                            </div>
                        </td>
                        <td class="${survColor} font-black text-sm">${survRate}</td>
                        <td>
                            <button onclick="window.location.href='batch_detail.html?id=${b.batch_name}'" class="px-4 py-2 rounded-xl bg-white border border-[#e8dcc8] text-[#4a7a2e] font-bold text-[10px] uppercase tracking-widest hover:bg-[#6aa83c] hover:text-white hover:border-[#6aa83c] transition-colors shadow-sm flex items-center gap-2">
                                👁️ View
                            </button>
                        </td>
                    </tr>
                `);
            });
            
            // Re-apply search filter if there's text
            filterLedger();
        }

        function filterLedger() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const rows = document.querySelectorAll('.batch-row');
            
            rows.forEach(row => {
                const id = row.querySelector('.batch-id-cell').innerText.toLowerCase();
                const breed = row.querySelector('.breed-cell').innerText.toLowerCase();
                
                if (id.includes(query) || breed.includes(query)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        function renderCullingChart(batchesThisYear) {
            const chartDiv = document.getElementById('culling-chart');
            const labelsDiv = document.getElementById('culling-chart-labels');
            
            if (batchesThisYear.length === 0) {
                chartDiv.innerHTML = `<span class="text-xs text-[#8a7a68] m-auto">No completed batches this year</span>`;
                return;
            }

            const chartData = batchesThisYear.slice(0, 6).reverse();
            const maxVal = 20; 
            
            let barsHtml = '';
            let labelsHtml = '';

            chartData.forEach((b) => {
                const val = b.mockCullRate;
                const heightPct = (val / maxVal) * 100;
                
                let colorClass = 'bg-[#6aa83c]'; 
                if (val > 15) colorClass = 'bg-[#a83020]'; 
                else if (val > 8) colorClass = 'bg-[#c07820]'; 

                const labelName = b.batch_name ? b.batch_name.split('-').pop() : 'N/A';

                barsHtml += `
                    <div class="flex flex-col justify-end items-center flex-1 w-full h-full relative group">
                        <span class="text-[9px] font-bold text-white mb-1 opacity-0 group-hover:opacity-100 transition-opacity absolute -top-4">${val}%</span>
                        <div class="w-full ${colorClass} rounded-t-sm chart-bar shadow-lg" style="height: 0%" data-target-height="${heightPct}%"></div>
                    </div>
                `;
                labelsHtml += `<span>${labelName}</span>`;
            });

            chartDiv.innerHTML = barsHtml;
            labelsDiv.innerHTML = labelsHtml;

            setTimeout(() => {
                document.querySelectorAll('.chart-bar').forEach(bar => {
                    bar.style.height = bar.getAttribute('data-target-height');
                });
            }, 100);
        }

        // Auth check and load
        _supabase.auth.getSession().then(({ data: { session } }) => { 
            if (!session) window.location.href = 'index.html'; else initLedger(); 
        });
    </script>
</body>
</html>
