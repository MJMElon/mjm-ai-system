<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MJM AI System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Outfit', system-ui, sans-serif; }
  body { background-color: #050a0e; margin: 0; overflow-x: hidden; }
  .auth-bg { position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 40%,#0a1a12 0%,#050a0e 70%); }
  .grid-lines { position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(16,185,129,.04)1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.04)1px,transparent 1px);background-size:60px 60px; }
  @keyframes scan{0%{top:-4px}100%{top:100%}}
  .scan-beam{position:fixed;left:0;right:0;height:3px;z-index:2;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(16,185,129,.6),transparent);box-shadow:0 0 20px 4px rgba(16,185,129,.3);animation:scan 6s linear infinite;}
  @keyframes hBeam{0%{transform:translateX(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateX(100vw);opacity:0}}
  @keyframes vBeam{0%{transform:translateY(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh);opacity:0}}
  .beam{position:fixed;pointer-events:none;z-index:2;}
  .beam-h{height:1px;left:0;right:0;background:linear-gradient(90deg,transparent 0%,rgba(16,185,129,.8)30%,#a7f3d0 50%,rgba(16,185,129,.8)70%,transparent 100%);box-shadow:0 0 8px 2px rgba(16,185,129,.5);}
  .beam-v{width:1px;top:0;bottom:0;background:linear-gradient(180deg,transparent 0%,rgba(16,185,129,.8)30%,#a7f3d0 50%,rgba(16,185,129,.8)70%,transparent 100%);box-shadow:0 0 8px 2px rgba(16,185,129,.5);}
  .bh1{top:28%;animation:hBeam 7s linear infinite;}
  .bh2{top:61%;animation:hBeam 11s linear infinite 3.5s;}
  .bh3{top:82%;animation:hBeam 8s linear infinite 1.2s;}
  .bv1{left:22%;animation:vBeam 9s linear infinite .8s;}
  .bv2{left:55%;animation:vBeam 13s linear infinite 4s;}
  .bv3{left:78%;animation:vBeam 10s linear infinite 2s;}
  .corner{position:absolute;width:18px;height:18px;pointer-events:none;}
  .corner-tl{top:16px;left:16px;border-top:2px solid #10b981;border-left:2px solid #10b981;}
  .corner-tr{top:16px;right:16px;border-top:2px solid #10b981;border-right:2px solid #10b981;}
  .corner-bl{bottom:16px;left:16px;border-bottom:2px solid #10b981;border-left:2px solid #10b981;}
  .corner-br{bottom:16px;right:16px;border-bottom:2px solid #10b981;border-right:2px solid #10b981;}
  @keyframes crossH{0%{transform:scaleX(0);opacity:0}30%{transform:scaleX(1);opacity:1}70%{transform:scaleX(1);opacity:1}100%{transform:scaleX(0);opacity:0}}
  @keyframes crossV{0%{transform:scaleY(0);opacity:0}30%{transform:scaleY(1);opacity:1}70%{transform:scaleY(1);opacity:1}100%{transform:scaleY(0);opacity:0}}
  @keyframes pulseGlow{0%,100%{text-shadow:0 0 20px rgba(52,211,153,.4),0 0 60px rgba(16,185,129,.2)}50%{text-shadow:0 0 40px rgba(52,211,153,.9),0 0 100px rgba(16,185,129,.5)}}
  @keyframes aiFlicker{0%,95%,100%{opacity:1;box-shadow:0 0 20px rgba(16,185,129,.6)}96%{opacity:.6}97%{opacity:1}98%{opacity:.4;box-shadow:0 0 40px rgba(16,185,129,1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  /* Logo title — bright on dark, big, glowing */
  .logo-title{font-weight:900;color:#ecfdf5;letter-spacing:.04em;animation:pulseGlow 4s ease-in-out infinite;}
  .logo-cross-h{position:absolute;left:0;right:0;height:1px;top:50%;background:linear-gradient(90deg,transparent,#34d399,#a7f3d0,#34d399,transparent);transform-origin:center;animation:crossH 3s ease-in-out infinite;box-shadow:0 0 8px #34d399;}
  .logo-cross-v{position:absolute;top:0;bottom:0;width:1px;left:50%;background:linear-gradient(180deg,transparent,#34d399,#a7f3d0,#34d399,transparent);transform-origin:center;animation:crossV 3s ease-in-out infinite;box-shadow:0 0 8px #34d399;}
  .ai-badge{display:inline-flex;align-items:center;justify-content:center;padding:6px 16px;border-radius:10px;background:linear-gradient(135deg,#059669,#10b981);color:white;font-size:22px;font-weight:900;letter-spacing:.12em;border:1px solid #34d399;animation:aiFlicker 5s infinite;position:relative;}
  .ai-badge::before{content:'';position:absolute;inset:-3px;border-radius:13px;background:radial-gradient(ellipse,rgba(52,211,153,.4),transparent 70%);animation:pulseGlow 2s ease-in-out infinite;}
  /* Login card — dark glass exactly like operation dashboard */
  .auth-card{background:rgba(5,20,12,.88);backdrop-filter:blur(24px);border:1px solid rgba(52,211,153,.2);box-shadow:0 0 0 1px rgba(16,185,129,.1),0 40px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);}
  .auth-input{background:rgba(255,255,255,.05);border:1px solid rgba(52,211,153,.2);color:#ecfdf5;border-radius:14px;padding:14px 18px;width:100%;font-size:14px;font-weight:600;outline:none;transition:all .2s;box-sizing:border-box;}
  .auth-input::placeholder{color:rgba(167,243,208,.4);}
  .auth-input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.15);background:rgba(255,255,255,.08);}
  .auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,#059669,#10b981);color:white;font-weight:900;font-size:12px;letter-spacing:.15em;text-transform:uppercase;border:none;border-radius:14px;cursor:pointer;box-shadow:0 8px 20px rgba(16,185,129,.35);transition:all .2s;}
  .auth-btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(16,185,129,.45);}
  /* Hub screen */
  .hub-bg{background:#050a0e;min-height:100vh;}
  .module-card{background:rgba(5,20,12,.72);border:1px solid rgba(52,211,153,.15);border-radius:20px;padding:32px 24px 24px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:16px;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;backdrop-filter:blur(12px);}
  .module-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--glow) 0%,transparent 65%);opacity:0;transition:opacity .3s;}
  .module-card:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.4),0 0 30px var(--glow-strong);}
  .module-card:hover::before{opacity:1;}
  .module-icon-wrap{width:72px;height:72px;border-radius:20px;background:var(--icon-bg);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--glow);position:relative;z-index:1;transition:box-shadow .25s;}
  .module-card:hover .module-icon-wrap{box-shadow:0 0 30px var(--glow-strong),0 0 60px var(--glow);}
  .module-name{font-size:14px;font-weight:700;color:#ecfdf5;text-align:center;letter-spacing:.03em;line-height:1.3;position:relative;z-index:1;}
  .module-tag{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);opacity:.7;position:relative;z-index:1;}
  .card-corner{position:absolute;width:12px;height:12px;pointer-events:none;}
  .card-tl{top:10px;left:10px;border-top:2px solid var(--accent);border-left:2px solid var(--accent);}
  .card-tr{top:10px;right:10px;border-top:2px solid var(--accent);border-right:2px solid var(--accent);}
  .card-bl{bottom:10px;left:10px;border-bottom:2px solid var(--accent);border-left:2px solid var(--accent);}
  .card-br{bottom:10px;right:10px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);}
  .module-card:nth-child(1){animation:fadeUp .4s .1s both;}
  .module-card:nth-child(2){animation:fadeUp .4s .2s both;}
  .module-card:nth-child(3){animation:fadeUp .4s .3s both;}
  .glow-line{height:1px;background:linear-gradient(90deg,transparent,rgba(52,211,153,.4),transparent);}
  .user-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.1);border:1px solid rgba(52,211,153,.25);border-radius:999px;padding:7px 16px;font-size:11px;font-weight:700;color:#6ee7b7;letter-spacing:.04em;}
  .user-dot{width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981;animation:pulseGlow 2s infinite;flex-shrink:0;}

</style>
</head>
<body>
<div class="auth-bg"></div>
<div class="grid-lines"></div>
<div class="scan-beam"></div>
<div class="beam beam-h bh1"></div><div class="beam beam-h bh2"></div><div class="beam beam-h bh3"></div>
<div class="beam beam-v bv1"></div><div class="beam beam-v bv2"></div><div class="beam beam-v bv3"></div>

<!-- ═══════════════════════════════════════════════════════ LOGIN SCREEN -->
<div id="auth-screen" style="display:flex" class="min-h-screen items-center justify-center p-4 relative">
  <div class="auth-card rounded-[2.5rem] w-full max-w-md p-10 relative z-10">
    <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div><div class="corner corner-br"></div>
    <div class="flex flex-col items-center mb-10">
      <div class="relative w-full flex items-center justify-center mb-6" style="height:110px;">
        <div class="logo-cross-h"></div>
        <div class="logo-cross-v"></div>
        <div class="logo-title z-10 relative text-center px-4" style="line-height:1.2;">
          <div style="font-size:clamp(2.8rem,7vw,4rem);font-weight:900;letter-spacing:.06em;">MJM</div>
          <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-top:6px;">
            <span class="ai-badge" style="font-size:1rem;padding:4px 12px;border-radius:8px;letter-spacing:.12em;">AI</span>
            <span style="font-size:1.1rem;letter-spacing:0.3em;color:#34d399;font-weight:900;">SYSTEM</span>
          </div>
        </div>
      </div>
      <p class="text-[11px] font-black text-emerald-500 uppercase tracking-[.3em] text-center">The future is here</p>
    </div>
    <div id="standard-auth-fields" class="space-y-3">
      <div id="signup-fields" class="hidden"><input type="text" id="user-name" placeholder="Full Name" class="auth-input mb-3"></div>
      <input type="email" id="email" placeholder="Email Address" class="auth-input">
      <input type="password" id="password" placeholder="Password" class="auth-input">
      <button id="main-auth-btn" class="auth-btn mt-2">Login</button>
      <div class="flex justify-between items-center pt-2">
        <button id="forgot-password-btn" class="text-[10px] font-bold text-emerald-600/70 hover:text-emerald-400 uppercase tracking-widest bg-transparent border-none cursor-pointer transition-colors">Forgot Password?</button>
        <button id="toggle-auth-btn" class="text-[10px] font-bold text-slate-400 hover:text-emerald-400 uppercase tracking-widest bg-transparent border-none cursor-pointer transition-colors">Create Account</button>
      </div>
    </div>
    <div id="recovery-auth-fields" class="hidden space-y-3">
      <div class="text-center text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-4">Create New Password</div>
      <input type="password" id="new-password" placeholder="Enter New Password" class="auth-input">
      <button id="update-password-btn" class="auth-btn mt-2">Save Password</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ HUB SCREEN -->
<div id="hub-screen" style="display:none" class="hub-bg min-h-screen flex flex-col">

  <!-- Top bar -->
  <div class="border-b border-emerald-900/40 px-6 py-4 flex justify-between items-center sticky top-0 z-30" style="background:rgba(5,10,8,.9);backdrop-filter:blur(12px);">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-emerald-500/20 border border-emerald-500/40 rounded-lg flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3" fill="#10b981"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="font-black text-emerald-400 uppercase tracking-widest text-xs">MJM AI System</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="user-chip">
        <div class="user-dot"></div>
        <span id="welcome-text">—</span>
      </div>
      <button onclick="handleLogout()" class="text-[10px] font-bold text-slate-500 hover:text-red-400 uppercase tracking-widest bg-transparent border border-slate-700 px-4 py-2 rounded-full cursor-pointer transition-colors">Sign Out</button>
    </div>
  </div>

  <!-- Hub content -->
  <div class="flex-1 flex flex-col items-center px-4 py-12">

    <p class="text-[11px] font-black text-emerald-500 uppercase tracking-[.25em] mb-8 text-center" style="margin-top:8px;">Select a module to continue</p>
    <div class="glow-line w-56 mb-10 mx-auto"></div>

    <!-- 3 Module cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 w-full max-w-2xl">

      <a class="module-card" href="operation/operation_dashboard.html"
         style="--accent:#10b981;--glow:rgba(16,185,129,.25);--glow-strong:rgba(16,185,129,.35);--icon-bg:rgba(16,185,129,.12);">
        <div class="card-corner card-tl"></div><div class="card-corner card-tr"></div>
        <div class="card-corner card-bl"></div><div class="card-corner card-br"></div>
        <div class="module-icon-wrap">
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
            <path d="M17 5C17 5 9 11 9 19a8 8 0 0016 0c0-8-8-14-8-14z" fill="rgba(16,185,129,.2)" stroke="#10b981" stroke-width="1.5"/>
            <path d="M17 14v9M14 17l3-3 3 3" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="17" cy="27" r="1.5" fill="#10b981"/>
          </svg>
        </div>
        <div class="module-name">Nursery<br>Operations</div>
        <div class="module-tag">operation_</div>
      </a>

      <a class="module-card" href="salesweb/salesweb_admin.html" onclick="sessionStorage.setItem('mjm_portal_entry','1')"
         style="--accent:#f59e0b;--glow:rgba(245,158,11,.25);--glow-strong:rgba(245,158,11,.35);--icon-bg:rgba(245,158,11,.12);">
        <div class="card-corner card-tl"></div><div class="card-corner card-tr"></div>
        <div class="card-corner card-bl"></div><div class="card-corner card-br"></div>
        <div class="module-icon-wrap">
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
            <rect x="6" y="12" width="22" height="15" rx="3" fill="rgba(245,158,11,.18)" stroke="#f59e0b" stroke-width="1.5"/>
            <path d="M12 12V10a5 5 0 0110 0v2" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="17" cy="20" r="2.5" fill="#f59e0b"/>
            <path d="M17 20v3.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="module-name">Sales Web<br>Admin</div>
        <div class="module-tag">salesweb_</div>
      </a>

      <a class="module-card" href="audit/audit_home.html" onclick="sessionStorage.setItem('mjm_portal_entry','1')"
         style="--accent:#f97316;--glow:rgba(249,115,22,.25);--glow-strong:rgba(249,115,22,.35);--icon-bg:rgba(249,115,22,.12);">
        <div class="card-corner card-tl"></div><div class="card-corner card-tr"></div>
        <div class="card-corner card-bl"></div><div class="card-corner card-br"></div>
        <div class="module-icon-wrap">
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
            <rect x="9" y="4" width="16" height="22" rx="3" fill="rgba(249,115,22,.18)" stroke="#f97316" stroke-width="1.5"/>
            <path d="M13 11h8M13 15h8M13 19h5" stroke="#fdba74" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="23" cy="25" r="5" fill="#050a0e" stroke="#f97316" stroke-width="1.5"/>
            <path d="M21.5 25l1.2 1.3L25 23" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="module-name">Field<br>Audit</div>
        <div class="module-tag">audit_</div>
      </a>

    </div>

    <div class="mt-auto pt-12 text-center">
      <div class="glow-line w-40 mb-3 mx-auto"></div>
      <p class="text-[10px] font-black text-slate-700 uppercase tracking-[.15em]">MJM AI System · <span id="yr"></span></p>
    </div>
  </div>
</div>

<script>
  // ── Gate: require fresh login each new browser window/tab ──
  // Skip gate if this is a password recovery link (has access_token in URL hash)
  const isRecoveryLink = window.location.hash.includes('access_token') ||
                         window.location.hash.includes('type=recovery') ||
                         window.location.search.includes('type=recovery');
  if (!isRecoveryLink && !sessionStorage.getItem('mjm_session_active')) {
    // New window — clear any lingering Supabase tokens so onAuthStateChange shows login
    Object.keys(localStorage).forEach(k => { if (k.startsWith('sb-')) localStorage.removeItem(k); });
    localStorage.removeItem('mjm_user');
  }

  const SUPABASE_URL = 'https://kibqjztozokohqmhqqqf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYnFqenRvem9rb2hxbWhxcXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzQzNjIsImV4cCI6MjA4OTgxMDM2Mn0.J7qJUZhWXYf5b9oey4wXJkjdi66jomEMw_NeV9NWF7M';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const authScreen     = document.getElementById('auth-screen');
  const hubScreen      = document.getElementById('hub-screen');
  const mainBtn        = document.getElementById('main-auth-btn');
  const toggleBtn      = document.getElementById('toggle-auth-btn');
  const signupFields   = document.getElementById('signup-fields');
  const forgotBtn      = document.getElementById('forgot-password-btn');
  const updatePwBtn    = document.getElementById('update-password-btn');
  const welcomeText    = document.getElementById('welcome-text');
  const standardFields = document.getElementById('standard-auth-fields');
  const recoveryFields = document.getElementById('recovery-auth-fields');

  document.getElementById('yr').textContent = new Date().getFullYear();

  function showAuth() { hubScreen.style.display='none'; authScreen.style.display='flex'; }
  function showHub()  { authScreen.style.display='none'; hubScreen.style.display='block'; }

  let isSignUpMode = false;
  let isRecovering = window.location.hash.includes('type=recovery');
  let isLoggingOut = false;

  window.handleLogout = async function() {
    isLoggingOut = true;
    sessionStorage.removeItem('mjm_session_active');
    Object.keys(localStorage).forEach(k => { if (k.startsWith('sb-')) localStorage.removeItem(k); });
    localStorage.removeItem('mjm_user');
    try { await _supabase.auth.signOut({ scope: 'local' }); } catch(e) {}
    showAuth();
    resetAuthForm();
    resetAuthForm();
    isLoggingOut = false;
  };

  function resetAuthForm() {
    isSignUpMode = false;
    signupFields.classList.add('hidden');
    mainBtn.innerText = 'Login';
    toggleBtn.innerText = 'Create Account';
    forgotBtn.style.display = 'inline-block';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    if (document.getElementById('user-name')) document.getElementById('user-name').value = '';
  }

  toggleBtn.addEventListener('click', () => {
    isSignUpMode = !isSignUpMode;
    if (isSignUpMode) {
      signupFields.classList.remove('hidden'); mainBtn.innerText = 'Sign Up';
      toggleBtn.innerText = 'Back to Login'; forgotBtn.style.display = 'none';
    } else {
      signupFields.classList.add('hidden'); mainBtn.innerText = 'Login';
      toggleBtn.innerText = 'Create Account'; forgotBtn.style.display = 'inline-block';
    }
  });

  mainBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('password').value;
    if (!email || !pw) return alert('Please enter email and password.');
    mainBtn.innerText = 'Processing…'; mainBtn.disabled = true;
    if (isSignUpMode) {
      const name = document.getElementById('user-name').value.trim();
      const { error } = await _supabase.auth.signUp({ email, password: pw, options: { data: { full_name: name } } });
      if (error) { alert('Signup Error: ' + error.message); mainBtn.innerText = 'Sign Up'; }
      else {
        alert('Account created! You can now log in.');
        isSignUpMode = false; signupFields.classList.add('hidden');
        mainBtn.innerText = 'Login'; toggleBtn.innerText = 'Create Account';
        forgotBtn.style.display = 'inline-block';
      }
    } else {
      const { error } = await _supabase.auth.signInWithPassword({ email, password: pw });
      if (error) { alert('Login Error: ' + error.message); mainBtn.innerText = 'Login'; }
    }
    mainBtn.disabled = false;
  });

  forgotBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) return alert('Enter your email first.');
    forgotBtn.innerText = 'Sending…';
    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/') + 'index.html'
    });
    if (error) alert('Error: ' + error.message);
    else alert('Reset link sent! Check your inbox.');
    forgotBtn.innerText = 'Forgot Password?';
  });

  updatePwBtn.addEventListener('click', async () => {
    const pw = document.getElementById('new-password').value;
    if (!pw || pw.length < 6) return alert('Password must be at least 6 characters.');
    updatePwBtn.innerText = 'Updating…';
    const { error } = await _supabase.auth.updateUser({ password: pw });
    if (error) { alert('Error: ' + error.message); updatePwBtn.innerText = 'Save Password'; }
    else {
      alert('Password updated! Please log in.');
      isRecovering = false; window.location.hash = '';
      recoveryFields.classList.add('hidden');
      standardFields.classList.remove('hidden');
      showAuth();
    }
  });

  // ── Enter key triggers login ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && authScreen.style.display !== 'none') {
      const recoveryVisible = !recoveryFields.classList.contains('hidden');
      if (recoveryVisible) {
        updatePwBtn.click();
      } else {
        mainBtn.click();
      }
    }
  });

  _supabase.auth.onAuthStateChange(async (event, session) => {
    if (isLoggingOut) return;
    if (event === 'PASSWORD_RECOVERY') {
      isRecovering = true;
      sessionStorage.setItem('mjm_session_active', '1'); // keep session alive during recovery
      showAuth();
      standardFields.classList.add('hidden');
      recoveryFields.classList.remove('hidden'); return;
    }
    if (event === 'SIGNED_OUT' || !session) { showAuth(); return; }
    if (session) {
      welcomeText.innerText = session.user.user_metadata?.full_name || session.user.email;
      // Mark session active for this window (clears on window close)
      sessionStorage.setItem('mjm_session_active', '1');
      // Set mjm_user so audit_home and other modules can read it
      localStorage.setItem('mjm_user', JSON.stringify({
        email: session.user.email,
        full_name: session.user.user_metadata?.full_name || session.user.email,
        name: session.user.user_metadata?.full_name || session.user.email,
        role: 'staff'
      }));
      showHub();
    }
  });
</script>
</body>
</html>
