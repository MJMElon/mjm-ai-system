<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJM Nursery AI · Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Outfit', system-ui, sans-serif; }
  body { background: #050a0e; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .auth-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 50% 40%, #0a1a12 0%, #050a0e 70%); }

  @keyframes scan { 0% { top: -4px } 100% { top: 100% } }
  .scan-beam { position: fixed; left: 0; right: 0; height: 3px; z-index: 1; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(16,185,129,.6), transparent);
    box-shadow: 0 0 20px 4px rgba(16,185,129,.3); animation: scan 6s linear infinite; }

  .auth-card {
    background: rgba(5,20,12,.88); backdrop-filter: blur(24px);
    border: 1px solid rgba(52,211,153,.2); border-radius: 2rem;
    box-shadow: 0 0 0 1px rgba(16,185,129,.1), 0 40px 80px rgba(0,0,0,.5);
    padding: 2.5rem; width: 100%; max-width: 400px; position: relative; z-index: 10;
  }

  .auth-input {
    background: rgba(255,255,255,.05); border: 1px solid rgba(52,211,153,.2);
    color: #ecfdf5; border-radius: 14px; padding: 14px 18px; width: 100%;
    font-size: 14px; font-weight: 600; outline: none; transition: all .2s; box-sizing: border-box;
    font-family: 'Outfit', sans-serif;
  }
  .auth-input::placeholder { color: rgba(167,243,208,.4); }
  .auth-input:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.15); }

  .auth-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #059669, #10b981);
    color: white; font-weight: 900; font-size: 12px; letter-spacing: .15em; text-transform: uppercase;
    border: none; border-radius: 14px; cursor: pointer; transition: all .2s;
    box-shadow: 0 8px 20px rgba(16,185,129,.35); font-family: 'Outfit', sans-serif;
  }
  .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(16,185,129,.45); }
  .auth-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .method-toggle {
    display: flex; gap: 4px; background: rgba(255,255,255,.05); border-radius: 12px; padding: 4px; margin-bottom: 1.5rem;
  }
  .method-btn {
    flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 900;
    letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.4);
    border: none; background: none; border-radius: 10px; cursor: pointer; transition: all .2s;
    font-family: 'Outfit', sans-serif;
  }
  .method-btn.active { background: rgba(16,185,129,.2); color: #34d399; }

  .otp-row { display: flex; gap: .5rem; }
  .otp-row .auth-input { flex: 1; }
  .otp-send {
    padding: 14px 18px; background: rgba(16,185,129,.2); border: 1px solid rgba(16,185,129,.3);
    color: #34d399; font-size: 11px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
    border-radius: 14px; cursor: pointer; transition: all .2s; white-space: nowrap;
    font-family: 'Outfit', sans-serif;
  }
  .otp-send:hover { background: rgba(16,185,129,.3); }
  .otp-send:disabled { opacity: .4; cursor: not-allowed; }

  .link-btn {
    background: none; border: none; color: rgba(167,243,208,.5); font-size: 11px;
    font-weight: 600; cursor: pointer; transition: color .2s;
  }
  .link-btn:hover { color: #34d399; }

  .status-msg { font-size: 12px; font-weight: 600; padding: 10px; border-radius: 10px; margin-bottom: 1rem; display: none; }
  .status-msg.error { display: block; background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
  .status-msg.success { display: block; background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.2); }

  @keyframes pulseGlow { 0%,100% { text-shadow: 0 0 20px rgba(52,211,153,.4); } 50% { text-shadow: 0 0 40px rgba(52,211,153,.9); } }
</style>
</head>
<body>

<div class="auth-bg"></div>
<div class="scan-beam"></div>

<div class="auth-card">
  <!-- Logo -->
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:clamp(1.5rem,4vw,2rem);font-weight:900;color:#ecfdf5;letter-spacing:.04em;line-height:1.1;animation:pulseGlow 4s ease-in-out infinite;">
      MJM<br><span style="font-size:.55em;letter-spacing:.3em;color:#34d399;font-weight:900;">NURSERY</span>
    </div>
    <div style="display:inline-flex;align-items:center;justify-content:center;padding:4px 12px;border-radius:8px;background:linear-gradient(135deg,#059669,#10b981);color:white;font-size:16px;font-weight:900;letter-spacing:.12em;border:1px solid #34d399;margin-top:.5rem;">AI</div>
    <div style="font-size:10px;font-weight:700;color:rgba(52,211,153,.5);letter-spacing:.3em;text-transform:uppercase;margin-top:.75rem;">Secure Login</div>
  </div>

  <!-- Method: Password / Email OTP / SMS OTP -->
  <div class="method-toggle">
    <button class="method-btn active" id="method-password" onclick="switchMethod('password')">Password</button>
    <button class="method-btn" id="method-otp" onclick="switchMethod('otp')">Email OTP</button>
    <button class="method-btn" id="method-sms" onclick="switchMethod('sms')">SMS OTP</button>
  </div>

  <!-- Status -->
  <div class="status-msg" id="status-msg"></div>

  <!-- Email + Password form -->
  <div id="form-password">
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <input type="email" id="ep-email" class="auth-input" placeholder="Email Address">
      <input type="password" id="ep-password" class="auth-input" placeholder="Password">
      <button class="auth-btn" id="btn-login" onclick="loginEmailPassword()">Login</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;">
      <button class="link-btn" onclick="forgotPassword()">Forgot Password?</button>
      <button class="link-btn" id="btn-toggle-signup" onclick="toggleSignup()">Create Account</button>
    </div>
  </div>

  <!-- Email + OTP form -->
  <div id="form-otp" style="display:none;">
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <input type="email" id="eo-email" class="auth-input" placeholder="Email Address">
      <div class="otp-row">
        <input type="text" id="eo-otp" class="auth-input" placeholder="Enter 6-digit code" maxlength="6">
        <button class="otp-send" id="eo-send" onclick="sendEmailOTP()">Send Code</button>
      </div>
      <button class="auth-btn" onclick="verifyEmailOTP()">Verify & Login</button>
    </div>
    <div style="text-align:center;margin-top:.75rem;">
      <span style="font-size:10px;color:rgba(255,255,255,.3);">A 6-digit code will be sent to your email</span>
    </div>
  </div>

  <!-- Phone + SMS OTP form -->
  <div id="form-sms" style="display:none;">
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <input type="tel" id="sms-phone" class="auth-input" placeholder="Phone Number (e.g. +60112345678)">
      <div class="otp-row">
        <input type="text" id="sms-otp" class="auth-input" placeholder="Enter 6-digit code" maxlength="6">
        <button class="otp-send" id="sms-send" onclick="sendSmsOTP()">Send SMS</button>
      </div>
      <button class="auth-btn" onclick="verifySmsOTP()">Verify & Login</button>
    </div>
    <div style="text-align:center;margin-top:.75rem;">
      <span style="font-size:10px;color:rgba(255,255,255,.3);">A 6-digit code will be sent via SMS to your phone</span>
    </div>
  </div>

  <!-- Signup fields (hidden, toggled) -->
  <div id="signup-fields" style="display:none;margin-bottom:.75rem;">
    <input type="text" id="signup-name" class="auth-input" placeholder="Full Name" style="margin-bottom:.75rem;">
  </div>

  <!-- Recovery form -->
  <div id="form-recovery" style="display:none;">
    <div style="text-align:center;font-size:11px;font-weight:700;color:#34d399;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem;">Create New Password</div>
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <input type="password" id="rec-password" class="auth-input" placeholder="Enter New Password">
      <button class="auth-btn" onclick="updatePassword()">Save Password</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://kibqjztozokohqmhqqqf.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYnFqenRvem9rb2hxbWhxcXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzQzNjIsImV4cCI6MjA4OTgxMDM2Mn0.J7qJUZhWXYf5b9oey4wXJkjdi66jomEMw_NeV9NWF7M';
var _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var authMethod = 'password';
var isSignUp = false;
var isRecovery = window.location.hash.includes('type=recovery');

// ── UI ──
function switchMethod(method) {
  authMethod = method;
  document.getElementById('method-password').classList.toggle('active', method === 'password');
  document.getElementById('method-otp').classList.toggle('active', method === 'otp');
  document.getElementById('method-sms').classList.toggle('active', method === 'sms');
  document.getElementById('form-password').style.display = method === 'password' ? 'block' : 'none';
  document.getElementById('form-otp').style.display = method === 'otp' ? 'block' : 'none';
  document.getElementById('form-sms').style.display = method === 'sms' ? 'block' : 'none';
  clearStatus();
}

function toggleSignup() {
  isSignUp = !isSignUp;
  document.getElementById('signup-fields').style.display = isSignUp ? 'block' : 'none';
  document.getElementById('btn-login').textContent = isSignUp ? 'Sign Up' : 'Login';
  document.getElementById('btn-toggle-signup').textContent = isSignUp ? 'Back to Login' : 'Create Account';
}

function showStatus(msg, type) {
  var el = document.getElementById('status-msg');
  el.textContent = msg; el.className = 'status-msg ' + type;
}
function clearStatus() { document.getElementById('status-msg').className = 'status-msg'; }

// ── EMAIL + PASSWORD ──
async function loginEmailPassword() {
  var email = document.getElementById('ep-email').value.trim();
  var pw = document.getElementById('ep-password').value;
  if (!email || !pw) { showStatus('Please enter email and password.', 'error'); return; }

  if (isSignUp) {
    var name = document.getElementById('signup-name').value.trim();
    showStatus('Creating account...', 'success');
    var { error } = await _supabase.auth.signUp({
      email: email, password: pw,
      options: { data: { full_name: name } }
    });
    if (error) { showStatus(error.message, 'error'); return; }
    showStatus('Account created! You can now log in.', 'success');
    toggleSignup();
    return;
  }

  showStatus('Signing in...', 'success');
  var { data, error } = await _supabase.auth.signInWithPassword({ email: email, password: pw });
  if (error) { showStatus(error.message, 'error'); return; }
  await handlePostLogin(data.session);
}

// ── EMAIL + OTP ──
async function sendEmailOTP() {
  var email = document.getElementById('eo-email').value.trim();
  if (!email) { showStatus('Please enter your email.', 'error'); return; }

  var btn = document.getElementById('eo-send');
  btn.disabled = true; btn.textContent = 'Sending...';

  var { error } = await _supabase.auth.signInWithOtp({ email: email });
  if (error) { showStatus(error.message, 'error'); btn.disabled = false; btn.textContent = 'Send Code'; return; }

  showStatus('Code sent to ' + email + '. Check your inbox.', 'success');
  btn.textContent = 'Sent';
  var countdown = 30;
  var timer = setInterval(function() {
    countdown--;
    btn.textContent = 'Resend (' + countdown + ')';
    if (countdown <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = 'Resend'; }
  }, 1000);
}

async function verifyEmailOTP() {
  var email = document.getElementById('eo-email').value.trim();
  var otp = document.getElementById('eo-otp').value.trim();
  if (!email || !otp) { showStatus('Please enter email and code.', 'error'); return; }

  showStatus('Verifying...', 'success');
  var { data, error } = await _supabase.auth.verifyOtp({ email: email, token: otp, type: 'email' });
  if (error) { showStatus(error.message, 'error'); return; }
  await handlePostLogin(data.session);
}

// ── PHONE + SMS OTP ──
async function sendSmsOTP() {
  var phone = document.getElementById('sms-phone').value.trim();
  if (!phone) { showStatus('Please enter your phone number.', 'error'); return; }
  if (!phone.startsWith('+')) { showStatus('Include country code (e.g. +60112345678)', 'error'); return; }

  var btn = document.getElementById('sms-send');
  btn.disabled = true; btn.textContent = 'Sending...';

  var { error } = await _supabase.auth.signInWithOtp({ phone: phone });
  if (error) { showStatus(error.message, 'error'); btn.disabled = false; btn.textContent = 'Send SMS'; return; }

  showStatus('SMS sent to ' + phone + '. Check your messages.', 'success');
  btn.textContent = 'Sent';
  var countdown = 30;
  var timer = setInterval(function() {
    countdown--;
    btn.textContent = 'Resend (' + countdown + ')';
    if (countdown <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = 'Resend'; }
  }, 1000);
}

async function verifySmsOTP() {
  var phone = document.getElementById('sms-phone').value.trim();
  var otp = document.getElementById('sms-otp').value.trim();
  if (!phone || !otp) { showStatus('Please enter phone number and code.', 'error'); return; }

  showStatus('Verifying...', 'success');
  var { data, error } = await _supabase.auth.verifyOtp({ phone: phone, token: otp, type: 'sms' });
  if (error) { showStatus(error.message, 'error'); return; }
  await handlePostLogin(data.session);
}

// ── FORGOT PASSWORD ──
async function forgotPassword() {
  var email = document.getElementById('ep-email').value.trim();
  if (!email) { showStatus('Enter your email first, then click Forgot Password.', 'error'); return; }
  showStatus('Sending reset link...', 'success');
  var { error } = await _supabase.auth.resetPasswordForEmail(email);
  if (error) { showStatus(error.message, 'error'); return; }
  showStatus('Reset link sent! Check your inbox.', 'success');
}

async function updatePassword() {
  var pw = document.getElementById('rec-password').value;
  if (!pw || pw.length < 6) { showStatus('Password must be at least 6 characters.', 'error'); return; }
  var { error } = await _supabase.auth.updateUser({ password: pw });
  if (error) { showStatus(error.message, 'error'); return; }
  showStatus('Password updated! Redirecting...', 'success');
  isRecovery = false; window.location.hash = '';
  setTimeout(function() { window.location.href = 'mobile_auth.html'; }, 1500);
}

// ── POST-LOGIN: ROLE CHECK + ROUTING ──
async function handlePostLogin(session) {
  if (!session) { showStatus('Login failed.', 'error'); return; }

  showStatus('Checking access...', 'success');
  sessionStorage.setItem('mjm_user_email', session.user.email || '');
  sessionStorage.setItem('mjm_user_name', session.user.user_metadata?.full_name || session.user.email || '');

  // Check role in profiles table
  var { data: profile } = await _supabase
    .from('shared_profiles')
    .select('role')
    .eq('id', session.user.id)
    .single();

  var role = (profile && profile.role) || 'customer';

  if (role === 'admin') {
    showStatus('Welcome, Admin! Redirecting...', 'success');
    setTimeout(function() { window.location.href = 'mobile_landing.html'; }, 800);
  } else {
    showStatus('Welcome! Redirecting...', 'success');
    setTimeout(function() { window.location.href = 'portal.html?uid=' + session.user.id; }, 800);
  }
}

// ── AUTH STATE LISTENER ──
_supabase.auth.onAuthStateChange(async function(event, session) {
  if (event === 'PASSWORD_RECOVERY') {
    isRecovery = true;
    document.getElementById('form-password').style.display = 'none';
    document.getElementById('form-otp').style.display = 'none';
    document.getElementById('form-sms').style.display = 'none';
    document.querySelector('.method-toggle').style.display = 'none';
    document.getElementById('form-recovery').style.display = 'block';
    return;
  }
  if (event === 'SIGNED_IN' && session && !isRecovery) {
    await handlePostLogin(session);
  }
});

// Check if already logged in
_supabase.auth.getSession().then(async function({ data: { session } }) {
  if (session && !isRecovery) { await handlePostLogin(session); }
});

// Recovery mode on load
if (isRecovery) {
  document.getElementById('form-password').style.display = 'none';
  document.querySelector('.method-toggle').style.display = 'none';
  document.getElementById('form-recovery').style.display = 'block';
}

// Enter key
document.querySelectorAll('.auth-input').forEach(function(input) {
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var form = input.closest('[id^="form-"]');
      if (form) { var btn = form.querySelector('.auth-btn'); if (btn) btn.click(); }
    }
  });
});
</script>
</body>
</html>
