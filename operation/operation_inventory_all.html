<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Map Layers - MJM Nursery AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; margin: 0; font-family: 'Outfit', system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; z-index: -2; opacity: 0.5; }
        .glass-panel { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(24px); border: 1px solid #ffffff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border-l: 12px solid #3b82f6; }
        
        .tab-btn { padding: 12px 24px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 16px; transition: all 0.3s; color: #64748b; background: transparent; text-align: center; display: flex; align-items: center; justify-content: center; white-space: nowrap; border: 2px solid transparent; }
        .tab-btn.active-nursery { background: #6366f1; color: white; box-shadow: 0 4px 10px -2px rgba(99, 102, 241, 0.4); border-color: #4f46e5; }
        
        .layer-btn { padding: 12px 20px; border-radius: 12px; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; border: 2px solid transparent; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
        .layer-btn .desc { font-size: 9px; font-weight: 600; opacity: 0.7; text-transform: none; letter-spacing: 0;}
        
        .layer-active { border-color: currentColor; background-color: white; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .layer-inactive { background-color: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        .layer-inactive:hover { background-color: #e2e8f0; }

        /* Adjusted Map heights for side-by-side grid */
        .nursery-map-container { position: relative; width: 100%; height: 400px; background-color: #e2e8f0; border-radius: 20px; overflow: hidden; border: 6px solid white; box-shadow: inset 0 4px 20px rgba(0,0,0,0.1), 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .nursery-map-canvas { position: relative; display: inline-block; max-height: 100%; max-width: 100%; }
        .nursery-map-image { max-height: 388px; width: auto; object-fit: contain; display: block; filter: contrast(1.05) brightness(1.02); }
        
        .plots-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
        .plot-shape { transition: all 0.5s ease-in-out; cursor: pointer; }
        .plot-shape:hover { stroke-width: 1.5 !important; filter: brightness(1.2); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 relative">
    <div class="bg-pattern"></div>

    <div class="w-full max-w-[1600px] mx-auto z-10 space-y-6 py-4">
        
        <div class="glass-panel p-6 rounded-[2rem] flex flex-col items-center gap-4 relative overflow-hidden border-l-[12px] border-indigo-600">
            <div class="flex flex-col md:flex-row w-full items-center justify-between z-30 relative gap-4">
                <button onclick="window.location.href='operation_dashboard.html'" class="text-[10px] font-bold text-slate-500 hover:text-indigo-700 uppercase tracking-widest bg-slate-100 hover:bg-slate-200 px-5 py-3 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Dashboard
                </button>
                <h1 class="text-2xl md:text-3xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-800 via-purple-600 to-indigo-500 drop-shadow-sm pb-1 text-center" style="word-spacing: 0.2em;">Global Analytics Layers</h1>
                <div class="hidden md:block w-[130px]"></div>
            </div>

            <div id="nursery-tabs-container" class="bg-slate-100/80 p-2 rounded-[20px] flex gap-2 z-30 shadow-inner w-full max-w-4xl overflow-x-auto border border-slate-200 backdrop-blur-md">
                <button class="tab-btn flex-1 active-nursery cursor-default">🌐 ALL MAPS (LAYERS)</button>
                <button onclick="window.location.href='operation_inventory_map.html'" class="tab-btn flex-1 hover:bg-blue-50 hover:text-blue-600">🏠 Individual Maps</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-200 relative z-20">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Select Data Layer Overlay</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                
                <button id="layer-stock" onclick="switchLayer('stock')" class="layer-btn layer-active text-emerald-600">
                    <div class="flex items-center gap-2"><span class="text-lg">📦</span> Stock & Availability</div>
                    <span class="desc">Standard view showing total capacity vs available units.</span>
                </button>

                <button id="layer-maturity" onclick="switchLayer('maturity')" class="layer-btn layer-inactive text-amber-600">
                    <div class="flex items-center gap-2"><span class="text-lg">⏳</span> Plot Maturity (Age)</div>
                    <span class="desc">Color coded by planting date (Months).</span>
                </button>

                <button id="layer-height" onclick="switchLayer('height')" class="layer-btn layer-inactive text-blue-600">
                    <div class="flex items-center gap-2"><span class="text-lg">📏</span> Seedling Height</div>
                    <span class="desc">Color gradient mapping average seedling height (cm).</span>
                </button>

                <button id="layer-sales" onclick="switchLayer('sales')" class="layer-btn layer-inactive text-purple-600">
                    <div class="flex items-center gap-2"><span class="text-lg">🛒</span> Sales & Collection</div>
                    <span class="desc">Highlights Open plots vs Locked growing plots.</span>
                </button>
            </div>
        </div>

        <div id="all-maps-container" class="grid grid-cols-1 xl:grid-cols-2 gap-6 relative z-20">
            <div class="text-center p-10 text-slate-400 font-bold animate-pulse col-span-full">Loading Global Maps...</div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://kibqjztozokohqmhqqqf.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYnFqenRvem9rb2hxbWhxcXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzQzNjIsImV4cCI6MjA4OTgxMDM2Mn0.J7qJUZhWXYf5b9oey4wXJkjdi66jomEMw_NeV9NWF7M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let globalNurseries = [];
        let globalPlots = [];
        let currentLayer = 'stock'; // Default layer

        // --- MOCK DATA GENERATOR ---
        // Simulating data that will eventually come from your plot_balances table
        const mockDataCache = {};
        function getMockData(plotId) {
            if(!mockDataCache[plotId]) {
                const age = Math.floor(Math.random() * 12) + 1; // 1 to 12 months
                const height = age * 15 + Math.floor(Math.random() * 20); // 15cm to 200cm
                
                let salesStatus = 'Locked';
                if(age >= 8) salesStatus = 'Collecting';
                else if (age >= 6) salesStatus = 'Priority Next';

                mockDataCache[plotId] = {
                    stock: Math.floor(Math.random() * 5000) + 1000,
                    avail: Math.floor(Math.random() * 3000),
                    ageMonths: age,
                    heightCm: height,
                    salesStatus: salesStatus
                };
            }
            return mockDataCache[plotId];
        }

        async function init() {
            try {
                const [nursRes, plotsRes] = await Promise.all([
                    _supabase.from('operation_nurseries').select('*').order('name'),
                    _supabase.from('shared_plots').select('*')
                ]);

                globalNurseries = nursRes.data || [];
                globalPlots = plotsRes.data || [];

                renderAllMaps();
            } catch(e) { console.error(e); }
        }

        function switchLayer(layerName) {
            currentLayer = layerName;
            
            // Update Buttons
            ['stock', 'maturity', 'height', 'sales'].forEach(l => {
                const btn = document.getElementById(`layer-${l}`);
                if(l === layerName) {
                    btn.classList.remove('layer-inactive');
                    btn.classList.add('layer-active');
                } else {
                    btn.classList.remove('layer-active');
                    btn.classList.add('layer-inactive');
                }
            });

            // Instantly re-render the SVGs to show new colors/text
            renderAllMaps();
        }

        function renderAllMaps() {
            const container = document.getElementById('all-maps-container');
            container.innerHTML = '';

            const mappedNurseries = globalNurseries.filter(n => n.map_image_url);

            if(mappedNurseries.length === 0) {
                container.innerHTML = `<div class="glass-panel p-10 rounded-[2.5rem] text-center text-slate-500 font-bold uppercase tracking-widest col-span-full">No Maps Uploaded. Go to Settings.</div>`;
                return;
            }

            mappedNurseries.forEach(nursery => {
                // Wrapper for each nursery
                const nurseryCard = document.createElement('div');
                nurseryCard.className = 'glass-panel p-6 rounded-[2rem] shadow-lg flex flex-col';

                // Nursery Title & Legend
                let legendHtml = getLegendHtml(currentLayer);
                
                nurseryCard.innerHTML = `
                    <div class="flex justify-between items-center mb-4 px-2 border-b border-slate-100 pb-3">
                        <h2 class="text-lg font-black text-slate-800 uppercase tracking-widest truncate">${nursery.name}</h2>
                        ${legendHtml}
                    </div>
                    <div class="nursery-map-container flex-1">
                        <div class="nursery-map-canvas">
                            <img src="${nursery.map_image_url}" class="nursery-map-image">
                            <svg class="plots-svg" viewBox="0 0 100 100" preserveAspectRatio="none" id="svg-${nursery.id}"></svg>
                        </div>
                    </div>
                `;

                container.appendChild(nurseryCard);

                // Draw Plots for this specific nursery
                drawPlotsForNursery(nursery.name, `svg-${nursery.id}`);
            });
        }

        function drawPlotsForNursery(nurseryName, svgId) {
            const svg = document.getElementById(svgId);
            const plots = globalPlots.filter(p => p.nursery_name === nurseryName);
            let html = '';

            plots.forEach(p => {
                if(p.map_top && p.map_top.startsWith('[')) {
                    try {
                        const pts = JSON.parse(p.map_top);
                        const ptsStr = pts.map(pt => `${pt.x},${pt.y}`).join(' ');
                        const mockData = getMockData(p.id);
                        
                        // GET VISUALS BASED ON ACTIVE LAYER
                        const visuals = getLayerVisuals(mockData, currentLayer);

                        html += `<polygon points="${ptsStr}" fill="${visuals.fill}" stroke="${visuals.stroke}" stroke-width="0.3" class="plot-shape"/>`;
                        
                        // Centroid for text
                        const cx = pts.reduce((s, pt) => s + pt.x, 0) / pts.length;
                        const cy = pts.reduce((s, pt) => s + pt.y, 0) / pts.length;
                        
                        // Main Plot Name
                        html += `<text x="${cx}" y="${cy - 2}" fill="white" font-weight="900" font-family="Outfit, sans-serif" font-size="2.5" text-anchor="middle" style="text-shadow: 0px 1px 3px rgba(0,0,0,0.9); pointer-events: none;">${p.plot_name}</text>`;
                        
                        // Layer Specific Data Text
                        html += `<text x="${cx}" y="${cy + 1.5}" fill="${visuals.textColor}" font-weight="900" font-family="Outfit, sans-serif" font-size="1.8" text-anchor="middle" style="text-shadow: 0px 1px 2px rgba(255,255,255,0.9); pointer-events: none;">${visuals.text1}</text>`;
                        
                        if(visuals.text2) {
                            html += `<text x="${cx}" y="${cy + 4}" fill="${visuals.textColor}" font-weight="900" font-family="Outfit, sans-serif" font-size="1.8" text-anchor="middle" style="text-shadow: 0px 1px 2px rgba(255,255,255,0.9); pointer-events: none;">${visuals.text2}</text>`;
                        }

                    } catch(e) {}
                }
            });
            svg.innerHTML = html;
        }

        // --- LAYER LOGIC ENGINE ---
        function getLayerVisuals(data, layer) {
            let fill, stroke, textColor, text1, text2;

            if (layer === 'stock') {
                textColor = '#1e293b';
                text1 = `STK: ${data.stock}`;
                text2 = `AVL: ${data.avail}`;
                // Color Logic: Red if very low avail
                if(data.avail < 500) { fill = 'rgba(239, 68, 68, 0.6)'; stroke = '#ef4444'; } // Red
                else { fill = 'rgba(34, 197, 94, 0.4)'; stroke = '#22c55e'; } // Green
            } 
            else if (layer === 'maturity') {
                textColor = '#000000';
                text1 = `${data.ageMonths} Months`;
                text2 = null;
                // Color Logic: Age
                if(data.ageMonths < 3) { fill = 'rgba(250, 204, 21, 0.5)'; stroke = '#facc15'; } // Yellow (Young)
                else if(data.ageMonths < 8) { fill = 'rgba(132, 204, 22, 0.6)'; stroke = '#84cc16'; } // Light Green
                else { fill = 'rgba(21, 128, 61, 0.7)'; stroke = '#15803d'; textColor = 'white';} // Dark Green (Mature)
            }
            else if (layer === 'height') {
                textColor = '#1e3a8a';
                text1 = `${data.heightCm} cm`;
                text2 = null;
                // Color Logic: Height
                if(data.heightCm < 50) { fill = 'rgba(147, 197, 253, 0.5)'; stroke = '#93c5fd'; } // Light Blue
                else if(data.heightCm < 120) { fill = 'rgba(59, 130, 246, 0.6)'; stroke = '#3b82f6'; } // Blue
                else { fill = 'rgba(30, 58, 138, 0.7)'; stroke = '#1e3a8a'; textColor = 'white';} // Deep Blue
            }
            else if (layer === 'sales') {
                text2 = null;
                // Color Logic: Priority
                if(data.salesStatus === 'Collecting') { 
                    fill = 'rgba(168, 85, 247, 0.6)'; stroke = '#a855f7'; textColor = 'white'; text1 = 'OPEN NOW';
                } 
                else if (data.salesStatus === 'Priority Next') { 
                    fill = 'rgba(249, 115, 22, 0.6)'; stroke = '#f97316'; textColor = 'white'; text1 = 'NEXT Q';
                } 
                else { 
                    fill = 'rgba(100, 116, 139, 0.4)'; stroke = '#64748b'; textColor = '#1e293b'; text1 = 'LOCKED';
                }
            }

            return { fill, stroke, textColor, text1, text2 };
        }

        function getLegendHtml(layer) {
            if(layer === 'stock') return `
                <div class="flex gap-2 md:gap-4 text-[9px] font-bold uppercase tracking-widest text-slate-500 bg-slate-50 px-3 py-2 rounded-xl">
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-green-500/40 border border-green-500 rounded"></div> Healthy</div>
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-red-500/60 border border-red-500 rounded"></div> Low</div>
                </div>`;
            if(layer === 'maturity') return `
                <div class="flex gap-2 md:gap-4 text-[9px] font-bold uppercase tracking-widest text-slate-500 bg-slate-50 px-3 py-2 rounded-xl">
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-yellow-400/50 border border-yellow-400 rounded"></div> 0-3m</div>
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-lime-500/60 border border-lime-500 rounded"></div> 3-8m</div>
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-green-700/70 border border-green-700 rounded"></div> >8m</div>
                </div>`;
            if(layer === 'height') return `
                <div class="flex gap-2 md:gap-4 text-[9px] font-bold uppercase tracking-widest text-slate-500 bg-slate-50 px-3 py-2 rounded-xl">
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-blue-300/50 border border-blue-300 rounded"></div> Short</div>
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-blue-500/60 border border-blue-500 rounded"></div> Med</div>
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-blue-900/70 border border-blue-900 rounded"></div> Tall</div>
                </div>`;
            if(layer === 'sales') return `
                <div class="flex gap-2 md:gap-4 text-[9px] font-bold uppercase tracking-widest text-slate-500 bg-slate-50 px-3 py-2 rounded-xl">
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-purple-500/60 border border-purple-500 rounded"></div> Collect</div>
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-orange-500/60 border border-orange-500 rounded"></div> Next</div>
                    <div class="flex items-center gap-1"><div class="w-2.5 h-2.5 bg-slate-500/40 border border-slate-500 rounded"></div> Grow</div>
                </div>`;
            return '';
        }

        _supabase.auth.getSession().then(({ data: { session } }) => { if (!session) window.location.href = 'operation_dashboard.html'; else init(); });
    </script>
</body>
</html>
