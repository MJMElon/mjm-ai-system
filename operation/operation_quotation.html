// ════════════════════════════════════════════════════════
//  COMPANY + STANDARD T&C  (matches the existing printed quotation)

const COMPANY = {
  name: 'MEGA JUTAMAS SDN BHD',
  reg:  '(663951-U)',
  addr: '2ND Floor (B), Lot 1180, Bangunan BEI, Lorong Dua, Krokop,\nP.O. Box 163, 98007 Miri, Sarawak.',

  fax:  '085-413264',
};
// Bank details — printed inside the Terms & Conditions section so the
// "made payable to" line, the payee name and the account number live
// together with the other payment terms.
const BANK_DETAILS = {

  bank:   'Hong Leong Bank Berhad',

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let quotations = [];
let products   = [];   // published salesweb products
let editing    = null;
let items      = [];

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function fmtMoney(n){
  var v = Number(n)||0;
  return 'RM ' + v.toLocaleString('en-MY', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function fmtMoneyPlain(n){
  return Number(n||0).toLocaleString('en-MY', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function fmtDateLong(d){
  if (!d) return '—';
  var dt = typeof d === 'string' ? new Date(d+'T00:00:00') : d;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return String(dt.getDate()).padStart(2,'0') + ' ' + months[dt.getMonth()] + ' ' + dt.getFullYear();
}
function fmtDateShort(d){
  if (!d) return '—';
  var dt = typeof d === 'string' ? new Date(d+'T00:00:00') : d;
  return dt.toLocaleDateString('en-MY', { day:'2-digit', month:'short', year:'numeric' });
}
function todayIso(){
  var d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDaysIso(ds, days){
  var d = new Date(ds+'T00:00:00'); d.setDate(d.getDate()+days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function showToast(msg){
  var t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
function escapeHtml(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Next quote number — format QOPS<n>/MM/YY where <n> is a globally running
// counter (continues across months/years). We scan all existing rows and
// take max(n)+1.
async function nextQuoteNumber(){
  var d = new Date();
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yy = String(d.getFullYear()).slice(-2);
  var { data } = await _supabase.from('shared_quotations')
    .select('quote_number')
    .ilike('quote_number', 'QOPS%')
    .limit(5000);
  var maxN = 0;
  (data||[]).forEach(function(r){
    var m = /^QOPS(\d+)\//i.exec(r.quote_number||'');
    if (m){ var n = parseInt(m[1],10); if (n > maxN) maxN = n; }
  });
  return 'QOPS' + String(maxN + 1).padStart(3, '0') + '/' + mm + '/' + yy;
}

// ════════════════════════════════════════════════════════
//  LOAD PRODUCTS (salesweb published list)
// ════════════════════════════════════════════════════════
async function loadProducts(){
  var statusEl = document.getElementById('products-status');
  var { data, error } = await _supabase.from('salesweb_products')
    .select('id,name,price,sell_month,sell_year,stock_qty')
    .eq('is_published', true)
    .order('name', { ascending:true });
  if (error){
    statusEl.textContent = '⚠️ Could not load products: ' + error.message;
    return;
  }
  products = data || [];
  if (!products.length){
    statusEl.textContent = '⚠️ No published products on Sales Web — use the Custom option to enter a line manually.';
  } else {
    statusEl.textContent = products.length + ' published product' + (products.length===1?'':'s') + ' available from Sales Web · prices auto-fill on select.';
  }
}

// ════════════════════════════════════════════════════════
//  LIST
// ════════════════════════════════════════════════════════
async function loadList(){
  var { data, error } = await _supabase.from('shared_quotations')
    .select('*')
    .order('quote_date', { ascending:false })
    .order('created_at', { ascending:false })
    .limit(500);
  if (error){
    document.getElementById('q-list-body').innerHTML =
      '<tr><td colspan="7" class="text-center text-red-500 py-6 text-xs font-bold">'+escapeHtml(error.message)+'</td></tr>';
    return;
  }
  quotations = data || [];
  renderList();
}

function renderList(){
  var search = (document.getElementById('q-search').value || '').trim().toLowerCase();
  var statusFilter = document.getElementById('q-status-filter').value;
  var rows = quotations.filter(function(q){
    if (statusFilter && q.status !== statusFilter) return false;
    if (search){
      var hay = (q.quote_number+' '+q.customer_name+' '+(q.customer_company||'')).toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    return true;
  });

  var totalAll = rows.reduce(function(s,q){ return s + (Number(q.total)||0); }, 0);
  document.getElementById('q-summary').textContent =
    rows.length + ' quotation' + (rows.length===1?'':'s') + ' · Total ' + fmtMoney(totalAll);

  var body = document.getElementById('q-list-body');
  if (!rows.length){
    body.innerHTML = '<tr><td colspan="7" class="text-center text-slate-400 py-8 text-xs font-bold uppercase tracking-widest">No quotations yet</td></tr>';
    return;
  }
  body.innerHTML = rows.map(function(q){
    var customer = escapeHtml(q.customer_name) + (q.customer_company ? ' <span class="text-slate-400 font-bold">· '+escapeHtml(q.customer_company)+'</span>' : '');
    return '<tr>' +
      '<td class="font-black text-slate-800">'+escapeHtml(q.quote_number)+'</td>' +
      '<td>'+fmtDateShort(q.quote_date)+'</td>' +
      '<td>'+customer+'</td>' +
      '<td class="font-black text-emerald-700">'+fmtMoney(q.total)+'</td>' +
      '<td><span class="status-pill status-'+escapeHtml(q.status||'draft')+'">'+escapeHtml(q.status||'draft')+'</span></td>' +
      '<td class="text-slate-400 text-[11px]">'+escapeHtml(q.created_by_name||'—')+'</td>' +
      '<td class="text-right whitespace-nowrap">' +
        '<button onclick="openEdit(\''+q.id+'\')" class="btn btn-secondary" style="padding:6px 12px;font-size:10px;">Edit</button> ' +
        '<button onclick="downloadPdfFor(\''+q.id+'\')" class="btn btn-ghost" style="padding:6px 10px;font-size:10px;">⬇️ PDF</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

document.getElementById('q-search').addEventListener('input', renderList);
document.getElementById('q-status-filter').addEventListener('change', renderList);

  editing = null;
  items = [];
  document.getElementById('editor-title').textContent = 'New Quotation';
  document.getElementById('editor-subtitle').textContent = '';
  document.getElementById('btn-delete').classList.add('hidden');
  document.getElementById('btn-save').textContent = '💾 Save & Back to List';

  var today = todayIso();
  document.getElementById('f-quote-date').value = today;
  document.getElementById('f-valid-until').value = addDaysIso(today, 14);
  document.getElementById('f-status').value = 'draft';
  document.getElementById('f-cust-name').value = '';
  document.getElementById('f-cust-company').value = '';
  document.getElementById('f-cust-contact').value = '';
  document.getElementById('f-cust-email').value = '';
  document.getElementById('f-cust-address').value = '';
  document.getElementById('f-notes').value = '';

  document.getElementById('f-quote-number').value = 'Generating…';
  document.getElementById('editor-modal').classList.add('open');

  addItemRow();
  renderItems();
  recalcTotals();

  try {
    var qn = await nextQuoteNumber();
    document.getElementById('f-quote-number').value = qn;
  } catch(e){
    document.getElementById('f-quote-number').value = '';
  }
}

function openEdit(id){
  var q = quotations.find(function(x){ return x.id === id; });
  if (!q) return;
  editing = q;
  items = Array.isArray(q.items) ? q.items.map(function(x){ return Object.assign({}, x); }) : [];
  if (!items.length) addItemRow();

  document.getElementById('editor-title').textContent = q.quote_number;
  document.getElementById('editor-subtitle').textContent = 'Created ' + fmtDateShort(q.created_at) + (q.created_by_name ? ' by ' + q.created_by_name : '');
  document.getElementById('btn-delete').classList.remove('hidden');
  document.getElementById('btn-save').textContent = '💾 Save & Back to List';

  document.getElementById('f-quote-number').value = q.quote_number || '';
  document.getElementById('f-quote-date').value = q.quote_date || todayIso();
  document.getElementById('f-valid-until').value = q.valid_until || addDaysIso(q.quote_date || todayIso(), 14);
  document.getElementById('f-status').value = q.status || 'draft';
  document.getElementById('f-cust-name').value = q.customer_name || '';
  document.getElementById('f-cust-company').value = q.customer_company || '';
  document.getElementById('f-cust-contact').value = q.customer_contact || '';
  document.getElementById('f-cust-email').value = q.customer_email || '';
  document.getElementById('f-cust-address').value = q.customer_address || '';
  document.getElementById('f-notes').value = q.notes || '';

  renderItems();
  recalcTotals();

  document.getElementById('editor-modal').classList.add('open');
}

function closeEditor(){
  document.getElementById('editor-modal').classList.remove('open');
  editing = null;
  items = [];
}

// ── ITEMS ────────────────────────────────────────────────
function addItemRow(){
  items.push({ product_id:'', description:'', details:'', qty:1, unit:'Palm', unit_price:0, line_total:0 });
  renderItems();
}
function removeItemRow(idx){
  items.splice(idx, 1);
  if (!items.length) addItemRow();
  renderItems();
  recalcTotals();
}
function onProductSelect(idx, value){
  var it = items[idx];
  if (value === '__custom__'){
    it.product_id = '';
    it.description = '';
  } else if (value){
    var p = products.find(function(x){ return x.id === value; });
    if (p){
      it.product_id = p.id;
      it.description = p.name;
      it.unit_price = Number(p.price) || 0;
    }
  } else {
    it.product_id = '';
    it.description = '';
  }
  it.line_total = (Number(it.qty)||0) * (Number(it.unit_price)||0);
  renderItems();
  recalcTotals();
}
function onItemChange(idx, field, value){
  var it = items[idx];
  if (field === 'qty' || field === 'unit_price') it[field] = Number(value) || 0;
  else it[field] = value;
  it.line_total = (Number(it.qty)||0) * (Number(it.unit_price)||0);
  var lt = document.getElementById('item-total-'+idx);
  if (lt) lt.textContent = fmtMoney(it.line_total);
  recalcTotals();
}
function renderItems(){
  var container = document.getElementById('items-container');
  if (!items.length){ container.innerHTML = ''; return; }
  container.innerHTML = items.map(function(it, idx){
    var opts = '<option value="">— Select product —</option>';
    products.forEach(function(p){
      var sel = (it.product_id === p.id) ? ' selected' : '';
      var stockHint = (p.stock_qty != null) ? ' · ' + p.stock_qty + ' avail' : '';
      var priceHint = ' (RM ' + Number(p.price||0).toFixed(2) + stockHint + ')';
      opts += '<option value="'+escapeHtml(p.id)+'"'+sel+'>'+escapeHtml(p.name)+priceHint+'</option>';
    });
    var isCustom = !it.product_id && (it.description||'').length > 0;
    opts += '<option value="__custom__"'+(isCustom?' selected':'')+'>— Custom (free text) —</option>';

    var descField = it.product_id
      ? '<input class="input" type="text" value="'+escapeHtml(it.description||'')+'" readonly style="background:#f8fafc;color:#475569;">'
      : '<input class="input" type="text" value="'+escapeHtml(it.description||'')+'" oninput="onItemChange('+idx+',\'description\',this.value)">';

    return '<div class="item-card">' +
      '<div class="item-grid">' +
        '<div>' +
          '<div class="label">Product</div>' +
          '<select class="input" onchange="onProductSelect('+idx+',this.value)">'+opts+'</select>' +
          '<div style="margin-top:6px;">'+descField+'</div>' +
        '</div>' +
        '<div><div class="label">Qty</div><input class="input" type="number" min="0" step="1" value="'+(it.qty||0)+'" oninput="onItemChange('+idx+',\'qty\',this.value)"></div>' +
        '<div><div class="label">Unit</div><input class="input" type="text" value="'+escapeHtml(it.unit||'Palm')+'" oninput="onItemChange('+idx+',\'unit\',this.value)"></div>' +
        '<div><div class="label">Unit Price (RM)</div><input class="input" type="number" min="0" step="0.01" value="'+(it.unit_price||0)+'" oninput="onItemChange('+idx+',\'unit_price\',this.value)"></div>' +
        '<div><div class="label">Amount (RM)</div><div class="input" id="item-total-'+idx+'" style="background:#f8fafc;border-color:#e2e8f0;color:#065f46;font-weight:900;">'+fmtMoney(it.line_total||0)+'</div></div>' +
        '<div><div class="label" style="opacity:0;">.</div><button onclick="removeItemRow('+idx+')" class="btn btn-ghost" style="padding:8px 10px;font-size:14px;color:#dc2626;" title="Remove">&times;</button></div>' +
      '</div>' +
      '<div style="margin-top:8px;">' +
        '<div class="label">Item details (printed on PDF)</div>' +
        '<textarea class="input" rows="2" oninput="onItemChange('+idx+',\'details\',this.value)">'+escapeHtml(it.details||'')+'</textarea>' +
      '</div>' +
    '</div>';
  }).join('');
}

function recalcTotals(){
  var subtotal = items.reduce(function(s,it){
    var lt = (Number(it.qty)||0) * (Number(it.unit_price)||0);
    it.line_total = lt;
    return s + lt;
  }, 0);
  document.getElementById('t-subtotal').textContent = fmtMoney(subtotal);
  document.getElementById('t-grand').textContent = fmtMoney(subtotal);
}

// ── SAVE / DELETE ────────────────────────────────────────
function gatherPayload(){
  var subtotal = items.reduce(function(s,it){ return s + (Number(it.qty)||0)*(Number(it.unit_price)||0); }, 0);
  var cleanItems = items
    .filter(function(it){ return (it.description||'').trim() || Number(it.qty)>0 || Number(it.unit_price)>0; })
    .map(function(it){ return {
      product_id: it.product_id||null,
      description: it.description||'',
      details: it.details||'',
      qty: Number(it.qty)||0,
      unit: it.unit||'Palm',
      unit_price: Number(it.unit_price)||0,
      line_total: (Number(it.qty)||0) * (Number(it.unit_price)||0),
    }; });

  return {
    quote_number: (document.getElementById('f-quote-number').value || '').trim(),
    quote_date: document.getElementById('f-quote-date').value || todayIso(),
    valid_until: document.getElementById('f-valid-until').value || null,
    customer_name: (document.getElementById('f-cust-name').value || '').trim(),
    customer_company: (document.getElementById('f-cust-company').value || '').trim() || null,
    customer_contact: (document.getElementById('f-cust-contact').value || '').trim() || null,
    customer_email: (document.getElementById('f-cust-email').value || '').trim() || null,
    customer_address: (document.getElementById('f-cust-address').value || '').trim() || null,
    items: cleanItems,
    subtotal: subtotal,
    discount: 0,
    tax_rate: 0,
    tax_amount: 0,
    total: subtotal,
    notes: (document.getElementById('f-notes').value || '').trim() || null,
    terms: 'Cash Only',
    status: document.getElementById('f-status').value || 'draft',
  };
}

async function saveQuotation(){
  var p = gatherPayload();
  if (!p.customer_name){ showToast('❌ Customer name is required'); return; }
  if (!p.quote_number){ showToast('❌ Quote number is required'); return; }
  if (!p.items.length){ showToast('❌ Add at least one line item'); return; }

  var btn = document.getElementById('btn-save');
  btn.disabled = true; var oldText = btn.textContent; btn.textContent = 'Saving…';

  if (editing){
    var { error } = await _supabase.from('shared_quotations')
      .update(p).eq('id', editing.id);
    if (error){ showToast('❌ '+error.message); btn.disabled=false; btn.textContent=oldText; return; }
    showToast('✅ Quotation updated');
  } else {
    p.created_by = currentSession ? currentSession.user.id : null;
    p.created_by_name = currentSession ? (currentSession.user.user_metadata?.full_name || currentSession.user.email) : null;
    var { error } = await _supabase.from('shared_quotations')
      .insert(p);
    if (error){ showToast('❌ '+error.message); btn.disabled=false; btn.textContent=oldText; return; }
    showToast('✅ Quotation saved');
  }
  btn.disabled = false; btn.textContent = '💾 Save & Back to List';
  closeEditor();
  await loadList();
}

async function deleteCurrentQuotation(){
  if (!editing) return;
  if (!confirm('Delete quotation '+editing.quote_number+'? This cannot be undone.')) return;
  var { error } = await _supabase.from('shared_quotations').delete().eq('id', editing.id);
  if (error){ showToast('❌ '+error.message); return; }
  showToast('🗑 Deleted');
  closeEditor();
  loadList();
}

// ════════════════════════════════════════════════════════
//  PDF — matches the existing MJM quotation layout
// ════════════════════════════════════════════════════════
function downloadPdf(){
  var p = gatherPayload();
  if (!p.quote_number || !p.customer_name){ showToast('❌ Need quote number + customer to make PDF'); return; }
  generatePdf(p);
}
function downloadPdfFor(id){
  var q = quotations.find(function(x){ return x.id === id; });
  if (!q) return;
  generatePdf(q);
}

function generatePdf(q){
  var jsPDFNS = window.jspdf || window;
  var doc = new jsPDFNS.jsPDF({ unit:'pt', format:'a4' });
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = doc.internal.pageSize.getHeight();
  var margin = 36;

  // Palette — sage olive replaces emerald as the accent so labels +
  // section headings warm up; body text in a slightly softer near-black
  // for a printed-letterhead feel.
  var OLIVE        = [122, 138, 87];   // sage olive — labels + accents
  var OLIVE_SOFT   = [156, 167, 124];  // lighter olive for sub-labels
  var INK          = [40, 40, 40];     // warm near-black
  var INK_SOFT     = [85, 85, 85];     // warm grey body
  var INK_FAINT    = [140, 140, 140];  // captions
  var RULE         = [120, 120, 110];
  var RULE_SOFT    = [220, 220, 215];
  var ROW_ALT      = [251, 250, 246];  // cream table zebra
  // Keep these aliases so any tiny accent references elsewhere still
  // resolve to a sensible colour without needing edits.
  var EMERALD      = OLIVE;
  var EMERALD_TINT = OLIVE_SOFT;
  var EMERALD_DEEP = OLIVE;

  function setFill(c){ doc.setFillColor(c[0], c[1], c[2]); }
  function setText(c){ doc.setTextColor(c[0], c[1], c[2]); }
  function setStroke(c){ doc.setDrawColor(c[0], c[1], c[2]); }
  function bodyFont(weight, size){
    doc.setFont('times', weight || 'normal');
    doc.setFontSize(size || 11);
  }

  // ── 1) HEADER  ·  LEFT: MJM Nursery wordmark + Mega Jutamas letterhead
  //                  RIGHT: Quotation label + No / Date / Valid Until (stacked)
  var headerTopY = 56;

  // LEFT-TOP: MJM Nursery wordmark — uniform Times Bold in INK,
  // mixed-case to match the supplied design (but not split across two
  // colours or fonts the way the source mock-up does).
  doc.setFont('times', 'bold'); doc.setFontSize(28); setText(INK);
  doc.text('MJM Nursery', margin, headerTopY);

  // LEFT-BELOW: Mega Jutamas letterhead in compact Times Roman 10pt
  bodyFont('normal', 10); setText(INK_SOFT);
  var addrY = headerTopY + 22;
  doc.text(COMPANY.name + '  ' + COMPANY.reg, margin, addrY); addrY += 12;
  COMPANY.addr.split('\n').forEach(function(ln){ doc.text(ln, margin, addrY); addrY += 12; });
  doc.text('Tel: ' + COMPANY.tel + '  ·  Fax: ' + COMPANY.fax, margin, addrY);
  var leftHeaderBottom = addrY + 4;

  // RIGHT: stacked meta lines (Quotation label → No → Date → Valid Until)
  // No bordered table — looks lighter and matches the clean header in
  // the supplied design.
  var rx = pageW - margin;
  doc.setFont('times', 'bold'); doc.setFontSize(13); setText(INK);
  doc.text('Quotation', rx, headerTopY - 4, { align:'right' });

  bodyFont('normal', 10); setText(INK_SOFT);
  doc.text('No: '          + (q.quote_number || '—'),  rx, headerTopY + 14, { align:'right' });
  doc.text('Date: '        + fmtDateLong(q.quote_date),  rx, headerTopY + 28, { align:'right' });
  doc.text('Valid Until: ' + fmtDateLong(q.valid_until), rx, headerTopY + 42, { align:'right' });
  var rightHeaderBottom = headerTopY + 46;

  var headerSectionBottom = Math.max(leftHeaderBottom, rightHeaderBottom);

  // Divider beneath the header
  setStroke(RULE_SOFT); doc.setLineWidth(0.6);
  doc.line(margin, headerSectionBottom + 10, pageW - margin, headerSectionBottom + 10);

  // ── 2) TWO-COLUMN INFO STRIP  ·  Quotation For (left) · Payment Terms (right)
  var infoY = headerSectionBottom + 28;
  var halfW = (pageW - margin*2) / 2;

  // Section labels in OLIVE caps
  bodyFont('bold', 9); setText(OLIVE);
  doc.text('QUOTATION FOR', margin, infoY);
  doc.text('PAYMENT TERMS', margin + halfW, infoY);

  // LEFT: customer details
  var custY = infoY + 16;
  bodyFont('bold', 11); setText(INK);
  doc.text((q.customer_company || q.customer_name || '—'), margin, custY);
  custY += 14;

  bodyFont('normal', 10); setText(INK_SOFT);
  if (q.customer_name)    { doc.text('Attn: '  + q.customer_name,    margin, custY); custY += 12; }
  if (q.customer_address){
    var aLines = doc.splitTextToSize(q.customer_address, halfW - 10);
    doc.text(aLines, margin, custY); custY += aLines.length * 12;
  }
  if (q.customer_contact) { doc.text('Tel: '   + q.customer_contact, margin, custY); custY += 12; }
  if (q.customer_email)   { doc.text('Email: ' + q.customer_email,   margin, custY); custY += 12; }
  var leftInfoBottom = custY;

  // RIGHT: payment terms
  var ptY = infoY + 16;
  bodyFont('bold', 11); setText(INK);
  doc.text('Cash Only', margin + halfW, ptY);
  ptY += 14;
  bodyFont('normal', 10); setText(INK_SOFT);
  doc.text('Quotation valid for 14 days from issue date.', margin + halfW, ptY);
  ptY += 12;

  var leftBottom = Math.max(leftInfoBottom, ptY);

  // ── 4) ITEMS TABLE  ·  black-on-white, tight rows
  var tableTop = leftBottom + 18;
  var unitLabel = ((q.items||[])[0] && (q.items[0].unit||'Palm')) || 'Palm';
  var itemRows = (q.items||[]).map(function(it, idx){
    return [
      String(idx+1),
      { descName: it.description || '', descDetails: it.details || '' },
      Number(it.qty||0).toLocaleString('en-MY'),
      fmtMoneyPlain(it.unit_price||0),
      fmtMoneyPlain(it.line_total||0),
    ];
  });
  // Fixed widths chosen so column headers fit on one or two lines and the
  // "No" column is wide enough for "No" not to wrap.
  var COL_NO    = 42;
  var COL_QTY   = 70;
  var COL_PRICE = 80;
  var COL_AMT   = 92;
  var descColWidth = pageW - margin*2 - (COL_NO + COL_QTY + COL_PRICE + COL_AMT);
  function descCellHeight(name, details, cellWidth){
    var contentW = cellWidth - 12;
    doc.setFont('times', 'bold'); doc.setFontSize(11);
    var nameLines = doc.splitTextToSize(name || '', contentW).length || 1;
    doc.setFont('times', 'italic'); doc.setFontSize(10);
    var detailLines = details ? doc.splitTextToSize(details, contentW).length : 0;
    var h = nameLines * 13 + (details ? (detailLines * 12 + 4) : 0) + 12;
    return Math.max(h, 28);
  }

  doc.autoTable({
    startY: tableTop,
    head: [['No', 'Description', 'Qty\n(' + unitLabel + ')', 'Unit Price\n(RM)', 'Amount\n(RM)']],
    body: itemRows,
    theme: 'plain',
    margin: { left: margin, right: margin },
    styles: { font:'times', fontSize:11, cellPadding:6, lineColor:RULE_SOFT, lineWidth:0.5, valign:'top', textColor:INK },
    headStyles: { fillColor:[255,255,255], textColor:INK, fontStyle:'bold', halign:'center', fontSize:10, cellPadding:8, lineColor:INK, lineWidth:0.8 },
    alternateRowStyles: { fillColor: ROW_ALT },
    columnStyles: {
      0: { halign:'center', cellWidth:COL_NO },
      1: { halign:'left',   cellWidth:'auto' },
      2: { halign:'right',  cellWidth:COL_QTY },
      3: { halign:'right',  cellWidth:COL_PRICE },
      4: { halign:'right',  cellWidth:COL_AMT, fontStyle:'bold' },
    },
    didParseCell: function(d){
      if (d.section === 'body' && d.column.index === 1 && d.cell.raw && typeof d.cell.raw === 'object'){
        d.cell.text = [];
        d.cell.styles.minCellHeight = descCellHeight(d.cell.raw.descName, d.cell.raw.descDetails, descColWidth);
      }
    },
    didDrawCell: function(d){
      if (d.section === 'body' && d.column.index === 1 && d.cell.raw && typeof d.cell.raw === 'object'){
        var x = d.cell.x + 6;
        var y = d.cell.y + 6 + 10;
        var contentW = d.cell.width - 12;
        doc.setFont('times', 'bold'); doc.setFontSize(11); setText(INK);
        var nameLines = doc.splitTextToSize(d.cell.raw.descName || '', contentW);
        doc.text(nameLines, x, y);
        y += nameLines.length * 13;
        if (d.cell.raw.descDetails){
          y += 3;
          doc.setFont('times', 'italic'); doc.setFontSize(10); setText(INK_SOFT);
          var detailLines = doc.splitTextToSize(d.cell.raw.descDetails, contentW);
          doc.text(detailLines, x, y);
        }
      }
    },
  });

  // ── 5) TOTALS  ·  right-aligned, no colored band
  var afterTableY = doc.lastAutoTable.finalY + 14;
  var totalsLabelX = pageW - margin - 220;
  var totalsValueX = pageW - margin;

  bodyFont('normal', 11); setText(INK_SOFT);
  doc.text('Subtotal (RM)', totalsLabelX, afterTableY);
  bodyFont('normal', 11); setText(INK);
  doc.text(fmtMoneyPlain(q.subtotal||0), totalsValueX, afterTableY, { align:'right' });
  afterTableY += 6;

  setStroke(INK); doc.setLineWidth(0.6);
  doc.line(totalsLabelX, afterTableY, totalsValueX, afterTableY);

  afterTableY += 16;
  doc.setFont('times', 'bold'); doc.setFontSize(12); setText(INK);
  doc.text('TOTAL QUOTE (RM)', totalsLabelX, afterTableY);
  doc.text(fmtMoneyPlain(q.total||0), totalsValueX, afterTableY, { align:'right' });

  afterTableY += 5;
  setStroke(INK); doc.setLineWidth(1.2);
  doc.line(totalsLabelX, afterTableY, totalsValueX, afterTableY);
  afterTableY += 2.5;
  doc.setLineWidth(0.5);
  doc.line(totalsLabelX, afterTableY, totalsValueX, afterTableY);
  var totalsBottom = afterTableY + 4;

  // Optional per-quote notes
  var contentBottom = totalsBottom;
  if (q.notes && String(q.notes).trim()){
    var noteText = String(q.notes).trim();
    var noteY = totalsBottom + 22;
    bodyFont('bold', 9); setText(INK_FAINT);
    doc.text('NOTES', margin, noteY); noteY += 12;
    bodyFont('normal', 10); setText(INK_SOFT);
    var noteLines = doc.splitTextToSize(noteText, pageW - margin*2);
    doc.text(noteLines, margin, noteY);
    contentBottom = noteY + noteLines.length * 12 + 4;
  }

  // ── 6) TERMS & CONDITIONS  ·  flow naturally after content
  // (the previous version anchored T&C to the bottom which made the
  // middle of the page feel hollow when items were few — flowing it
  // immediately after totals gives a more standard invoice rhythm.)
  var tcY = contentBottom + 30;
  if (tcY > pageH - 160){ doc.addPage(); tcY = 60; }

  bodyFont('bold', 10); setText(INK_FAINT);
  doc.text('TERMS & CONDITIONS', margin, tcY);
  tcY += 5;
  setStroke(EMERALD); doc.setLineWidth(1);
  doc.line(margin, tcY, margin + 100, tcY);
  doc.setLineWidth(0.5);
  tcY += 14;

  function tcNum(n, y){
    bodyFont('bold', 11); setText(INK);
    doc.text(String(n) + '.', margin + 4, y);
  }

  // 1) Payment + bank
  tcNum(1, tcY);
  bodyFont('normal', 11); setText(INK_SOFT);
  doc.text('All payment should be crossed and made payable to:', margin + 22, tcY);
  tcY += 13;
  bodyFont('bold', 11); setText(INK);
  doc.text(BANK_DETAILS.payee, margin + 22, tcY);
  tcY += 13;
  bodyFont('normal', 11); setText(INK_SOFT);
  doc.text('A/C No : ' + BANK_DETAILS.ac_no + '   ·   ' + BANK_DETAILS.bank, margin + 22, tcY);
  tcY += 16;

  // 2)
  tcNum(2, tcY);
  bodyFont('normal', 11); setText(INK_SOFT);
  var t2Lines = doc.splitTextToSize(
    'All payment made towards the purchase of oil palm seedlings are non-refundable.',
    pageW - margin*2 - 26);
  doc.text(t2Lines, margin + 22, tcY);
  tcY += t2Lines.length * 13 + 4;

  // 3)
  tcNum(3, tcY);
  bodyFont('normal', 11); setText(INK_SOFT);
  var t3Lines = doc.splitTextToSize(
    'Collection must be made according to the scheduled collection date.',
    pageW - margin*2 - 26);
  doc.text(t3Lines, margin + 22, tcY);
  tcY += t3Lines.length * 13 + 4;

  // ── 7) FOOTER (every page)
  var totalPages = doc.internal.getNumberOfPages();
  for (var pg = 1; pg <= totalPages; pg++){
    doc.setPage(pg);
    var fy = pageH - 36;
    setStroke(RULE_SOFT); doc.setLineWidth(0.5);
    doc.line(margin, fy, pageW - margin, fy);

    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); setText(EMERALD);
    doc.text('MJM NURSERY', margin, fy + 14);

    doc.setFont('times', 'italic'); doc.setFontSize(9); setText(INK_FAINT);
    doc.text('"This is a computer-generated quotation and no signature is required."', pageW/2, fy + 14, { align:'center' });

    doc.setFont('times', 'normal'); doc.setFontSize(9); setText(INK_FAINT);
    doc.text((q.quote_number || '') + '   ·   Page ' + pg + ' of ' + totalPages, pageW - margin, fy + 14, { align:'right' });
  }

  var safeCust = ((q.customer_company || q.customer_name || 'customer')+'').replace(/[^a-zA-Z0-9_\-]/g,'_').slice(0,40);
  var safeNum  = (q.quote_number || 'quotation').replace(/[\/\\]/g,'-');
  doc.save('Quotation_' + safeNum + '_' + safeCust + '.pdf');
}

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
Promise.all([loadProducts(), loadList()]);
</script>
