<style>
  body { background:#f8f4ec; margin:0; font-family:'Outfit', system-ui, sans-serif; color:#1a150d; }
  .bg-pattern { position:fixed; inset:0; background-image:radial-gradient(#e8dcc8 1px, transparent 1px); background-size:24px 24px; z-index:-2; opacity:.5; }
  .glass-panel { background-color:rgba(253, 250, 244, .95); backdrop-filter:blur(24px); border:1px solid #fff; box-shadow:0 25px 50px -12px rgba(61, 38, 16, .08); border-left:12px solid #6aa83c; }

  .input-style { border:1.5px solid #e8dcc8; background:#fff; padding:10px 12px; border-radius:12px; outline:none; width:100%; font-weight:600; font-size:13px; color:#1a150d; }
  .input-style:focus { border-color:#c07820; box-shadow:0 0 0 4px rgba(192, 120, 32, .15); }
  .label-style { font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.15em; color:#8a7a68; margin-left:4px; margin-bottom:6px; display:block; }
  .btn-earth { background:linear-gradient(135deg, #6aa83c, #4a7a2e); color:white; font-weight:900; padding:12px 24px; border-radius:12px; cursor:pointer; text-transform:uppercase; letter-spacing:.1em; box-shadow:0 8px 20px -4px rgba(74, 122, 46, .5); border:none; font-size:12px; }
  .btn-earth:hover { transform:translateY(-2px); }

  .stat-card { background:#fff; border:1px solid #e8dcc8; border-radius:1.5rem; padding:24px; }
  .stat-num  { font-size:2.5rem; font-weight:900; color:#3d2610; line-height:1; }
  .stat-label { font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.18em; color:#8a7a68; margin-bottom:8px; }

  table.report-table { width:100%; border-collapse:separate; border-spacing:0; }
  .report-table th { text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:#8a7a68; padding:12px 14px; border-bottom:2px solid #e8dcc8; background:#fdfaf4; white-space:nowrap; }
  .report-table td { font-size:13px; font-weight:600; color:#1a150d; padding:14px; border-bottom:1px solid #f3efe6; }
  .report-table tr:hover td { background:#fdfaf4; }
  .funnel-bar { height:14px; background:#f3efe6; border-radius:999px; overflow:hidden; display:flex; box-shadow:inset 0 1px 2px rgba(0,0,0,.05); }
  .funnel-seg { height:100%; transition:width .5s ease-out; }
  .seg-seeds   { background:#c07820; }
  .seg-planted { background:#6aa83c; }
  .seg-trans   { background:#3a7ab4; }
  .seg-cull    { background:#a83020; }

  /* Nursery multi-select chips */
  .nursery-chip { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:10px; background:#fff; border:1.5px solid #e8dcc8; cursor:pointer; font-size:11px; font-weight:700; color:#3d2610; user-select:none; }
  .nursery-chip:has(input:checked) { background:#e8f5da; border-color:#6aa83c; }
  .nursery-chip input { accent-color:#4a7a2e; }

  @media print {
    body { background:white; }
    .no-print, .glass-panel, header { box-shadow:none !important; border:none !important; }
    .no-print { display:none !important; }
    .stat-card, table { box-shadow:none !important; }
  }
</style>

      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Back to Main Page
    </button>

          <div class="flex items-center justify-between mb-1">

            <div class="flex gap-3 text-[10px] font-black uppercase tracking-widest">
              <button type="button" id="f-nurs-all" class="text-[#4a7a2e] hover:underline">All</button>

            </div>
          </div>

            <div class="flex gap-3 text-[10px] font-black uppercase tracking-widest">
              <button type="button" id="f-yr-all" class="text-[#4a7a2e] hover:underline">All</button>
              <button type="button" id="f-yr-none" class="text-[#a83020] hover:underline">Clear</button>
            </div>

    <!-- Loading state -->
    <div id="loading" class="text-center py-12 text-xs font-bold text-[#8a7a68] uppercase tracking-widest animate-pulse">Loading…</div>

    <!-- Report container -->
    <div id="report-output" class="hidden space-y-6"></div>

  </div>

</div>

<script>
const _supabase = supabase.createClient(SHARED_SUPA_URL, SHARED_SUPA_KEY);

const STAGE_TYPES = {
  seeds:   ['Seeds_Received'],
  planted: ['Planted'],
  trans:   ['Transplanted', 'Transplanted_Premium', 'Transplanted_DoubleTone'],
  cull1:   ['1st_Culling'],
  cull2:   ['2nd_Culling'],
  cull3:   ['3rd_Culling']
};

function fmtNum(n)   { return (n || 0).toLocaleString(); }
function fmtPct(n)   { return (Math.max(0, Math.min(999, n || 0))).toFixed(2) + '%'; }
function fmtDate(d)  { if (!d) return '—'; const x = new Date(d); return isNaN(x) ? '—' : x.toLocaleDateString('en-MY', { day:'2-digit', month:'short', year:'numeric' }); }

function defaultRange() {
  const to = new Date();
  const from = new Date(); from.setMonth(from.getMonth() - 12);
  return { from: from.toISOString().slice(0, 10), to: to.toISOString().slice(0, 10) };
}

async function loadBreeds() {
  const { data } = await _supabase.from('shared_breeds').select('name').order('name');
  const sel = document.getElementById('f-breed');
  (data || []).forEach(b => {
    const o = document.createElement('option');
    o.value = b.name; o.textContent = b.name;
    sel.appendChild(o);
  });
}

/**
 * Batch Production Summary
 *
 * Per batch, aggregate quantity_change by transaction_type group:
 *   seeds_in          = SUM(Seeds_Received)
 *   damaged           = ABS(SUM(Damaged_Seeds))   // not in funnel; shown for context
 *   planted           = SUM(Planted)
 *   transplanted      = SUM(Transplanted | _Premium | _DoubleTone)
 *   cull_1/2/3        = ABS(SUM(1st/2nd/3rd_Culling))
 *
 * Final alive  = transplanted − cull_1 − cull_2 − cull_3   (post-transplant losses only)
 * Survival %   = final alive / seeds_in × 100
 */
async function runBatchProduction() {
  const out = document.getElementById('report-output');
  const loading = document.getElementById('loading');
  out.classList.add('hidden');
  loading.classList.remove('hidden');

  const from  = document.getElementById('f-from').value;
  const to    = document.getElementById('f-to').value;
  const breed = document.getElementById('f-breed').value;

  // Fetch all batches in range — anchor date is Seeds_Received transaction_date.
  let q = _supabase
    .from('shared_inventory_logs')
    .select('batch_name, transaction_type, quantity_change, transaction_date, created_at')
    .order('transaction_date', { ascending: true });

  const { data: logs, error: logErr } = await q;
  if (logErr) {
    loading.classList.add('hidden');
    out.classList.remove('hidden');
    out.innerHTML = `<div class="glass-panel p-6 rounded-[2rem] text-red-700 text-sm">Failed to load logs: ${logErr.message}</div>`;
    return;
  }

  // Pull batch metadata for breed/created_at filtering.
  const { data: batches } = await _supabase
    .from('operation_batches')
    .select('name, breed_name, created_at');

  const meta = {};
  (batches || []).forEach(b => { meta[b.name] = b; });

  // Group logs by batch.
  const byBatch = {};
  (logs || []).forEach(l => {
    const b = l.batch_name; if (!b) return;
    if (!byBatch[b]) byBatch[b] = {
      batch_name: b,
      seeds: 0, planted: 0, trans: 0, cull1: 0, cull2: 0, cull3: 0,
      seeds_date: null
    };
    const row = byBatch[b];
    const qty = Number(l.quantity_change || 0);
    const t = l.transaction_type;
    if (STAGE_TYPES.seeds.includes(t))   { row.seeds   += qty; row.seeds_date = row.seeds_date || l.transaction_date || l.created_at; }
    else if (STAGE_TYPES.planted.includes(t)) row.planted += qty;
    else if (STAGE_TYPES.trans.includes(t))   row.trans   += qty;
    else if (STAGE_TYPES.cull1.includes(t))   row.cull1   += Math.abs(qty);
    else if (STAGE_TYPES.cull2.includes(t))   row.cull2   += Math.abs(qty);
    else if (STAGE_TYPES.cull3.includes(t))   row.cull3   += Math.abs(qty);
  });

  // Filter by date range (on Seeds_Received date) and breed.
  const fromTs = from ? new Date(from).getTime() : -Infinity;
  const toTs   = to   ? new Date(to).getTime() + 86400000 : Infinity;

  let rows = Object.values(byBatch).map(r => {
    const m = meta[r.batch_name] || {};
    r.breed_name = m.breed_name || '—';
    r.batch_created_at = m.created_at || r.seeds_date;
    const finalAlive = Math.max(0, r.trans - r.cull1 - r.cull2 - r.cull3);
    const survival   = r.seeds > 0 ? (finalAlive / r.seeds) * 100 : 0;
    r.final_alive = finalAlive;
    r.survival_pct = survival;
    return r;
  });

  rows = rows.filter(r => {
    if (breed && r.breed_name !== breed) return false;
    const anchor = r.seeds_date ? new Date(r.seeds_date).getTime()
                : (r.batch_created_at ? new Date(r.batch_created_at).getTime() : NaN);
    if (isNaN(anchor)) return true; // keep batches with no anchor date so users see them
    return anchor >= fromTs && anchor <= toTs;
  });

  rows.sort((a, b) => {
    const da = a.seeds_date ? new Date(a.seeds_date).getTime() : 0;
    const db = b.seeds_date ? new Date(b.seeds_date).getTime() : 0;
    return db - da;
  });

  // ── Aggregate summary ──
  const summary = rows.reduce((s, r) => ({
    batches:    s.batches + 1,
    seeds:      s.seeds   + r.seeds,
    planted:    s.planted + r.planted,
    trans:      s.trans   + r.trans,
    cull:       s.cull    + r.cull1 + r.cull2 + r.cull3,
    final:      s.final   + r.final_alive
  }), { batches: 0, seeds: 0, planted: 0, trans: 0, cull: 0, final: 0 });

  const overallSurvival = summary.seeds > 0 ? (summary.final / summary.seeds) * 100 : 0;

  // ── Render ──
  loading.classList.add('hidden');
  out.classList.remove('hidden');

  out.innerHTML = `
    <!-- Summary cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <div class="stat-card">
        <div class="stat-label">Batches</div>
        <div class="stat-num">${fmtNum(summary.batches)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Seeds Received</div>
        <div class="stat-num text-[#c07820]">${fmtNum(summary.seeds)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Transplanted</div>
        <div class="stat-num text-[#3a7ab4]">${fmtNum(summary.trans)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Culled (1+2+3)</div>
        <div class="stat-num text-[#a83020]">${fmtNum(summary.cull)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Final Alive</div>
        <div class="stat-num text-[#4a7a2e]">${fmtNum(summary.final)}</div>
        <div class="text-[10px] font-black uppercase tracking-widest text-[#4a7a2e] mt-1">Survival ${fmtPct(overallSurvival)}</div>
      </div>
    </div>

    <!-- Per-batch table -->
    <div class="glass-panel p-6 rounded-[2rem]">
      <div class="flex items-center justify-between mb-4 border-b border-[#e8dcc8] pb-4">
        <h3 class="text-lg font-black uppercase tracking-widest text-[#3d2610]">Batch Production Summary</h3>
        <div class="text-[10px] font-bold text-[#8a7a68] uppercase tracking-widest">${fmtNum(rows.length)} batch${rows.length === 1 ? '' : 'es'}${from ? ' · from ' + fmtDate(from) : ''}${to ? ' · to ' + fmtDate(to) : ''}${breed ? ' · ' + breed : ''}</div>
      </div>

      <div class="overflow-x-auto">
        <table class="report-table">
          <thead>
            <tr>
              <th>Batch</th>
              <th>Breed</th>
              <th>Seeds In</th>
              <th class="text-right">Seeds</th>
              <th class="text-right">Planted</th>
              <th class="text-right">Transplanted</th>
              <th class="text-right">Cull 1 / 2 / 3</th>
              <th class="text-right">Final Alive</th>
              <th class="text-right">Survival</th>
              <th style="min-width:200px">Funnel</th>
            </tr>
          </thead>
          <tbody>
            ${rows.length ? rows.map(r => {
              const segMax = Math.max(r.seeds, r.planted, r.trans, 1);
              const segPct = (v) => Math.max(0, Math.min(100, (v / segMax) * 100));
              return `
                <tr>
                  <td><div class="font-black text-[#3d2610]">${r.batch_name}</div></td>
                  <td>${r.breed_name}</td>
                  <td>${fmtDate(r.seeds_date)}</td>
                  <td class="text-right text-[#c07820] font-black">${fmtNum(r.seeds)}</td>
                  <td class="text-right">${fmtNum(r.planted)}</td>
                  <td class="text-right text-[#3a7ab4] font-black">${fmtNum(r.trans)}</td>
                  <td class="text-right text-[#a83020]">${fmtNum(r.cull1)} / ${fmtNum(r.cull2)} / ${fmtNum(r.cull3)}</td>
                  <td class="text-right text-[#4a7a2e] font-black">${fmtNum(r.final_alive)}</td>
                  <td class="text-right font-black ${r.survival_pct >= 80 ? 'text-[#4a7a2e]' : r.survival_pct >= 60 ? 'text-[#c07820]' : 'text-[#a83020]'}">${fmtPct(r.survival_pct)}</td>
                  <td>
                    <div class="funnel-bar" title="Seeds ${fmtNum(r.seeds)} → Planted ${fmtNum(r.planted)} → Transplanted ${fmtNum(r.trans)}">
                      <div class="funnel-seg seg-seeds"   style="width:${segPct(r.seeds)}%"></div>
                    </div>
                    <div class="funnel-bar mt-1">
                      <div class="funnel-seg seg-planted" style="width:${segPct(r.planted)}%"></div>
                    </div>
                    <div class="funnel-bar mt-1">
                      <div class="funnel-seg seg-trans"   style="width:${segPct(r.trans)}%"></div>
                    </div>
                  </td>
                </tr>`;
            }).join('') : `<tr><td colspan="10" class="text-center py-10 text-[#8a7a68]">No batches match the selected filters.</td></tr>`}
          </tbody>
        </table>
      </div>

      <div class="text-[10px] font-bold text-[#8a7a68] mt-4 leading-relaxed">
        <strong class="text-[#3d2610]">Notes —</strong>
        Survival % = Final&nbsp;Alive ÷ Seeds&nbsp;Received × 100. Final&nbsp;Alive subtracts cull cycles 1, 2, 3 from Transplanted. Damaged seeds at planting are tracked separately in the Planting tab and are not included in the cull totals here.
      </div>
    </div>
  `;
}

async function runReport() {
  const which = document.getElementById('f-report').value;
  if (which === 'batch_production')   return runBatchProduction();
  if (which === 'nursery_movement')   return runSummaryMovement();
  if (which === 'seedling_sales')     return runSeedlingSales();
}

// ── Filter visibility by report type ─────────────────────────────────────────
function syncFilterVisibility() {
  const which     = document.getElementById('f-report').value;
  const isMove    = (which === 'nursery_movement');
  const isBatch   = (which === 'batch_production');
  const isSales   = (which === 'seedling_sales');
  document.querySelectorAll('.f-range').forEach(el         => el.classList.toggle('hidden', !(isBatch || isMove)));
  document.querySelectorAll('.f-group').forEach(el         => el.classList.toggle('hidden', !isMove));
  document.querySelectorAll('.f-nursery-pick').forEach(el  => el.classList.toggle('hidden', !isMove));
  document.querySelectorAll('.f-breed').forEach(el         => el.classList.toggle('hidden', !isBatch));
  document.querySelectorAll('.f-sales-mode').forEach(el    => el.classList.toggle('hidden', !isSales));
  document.querySelectorAll('.f-sales-years').forEach(el   => el.classList.toggle('hidden', !isSales));
}

// View mode (Table vs Chart) for the Seedling Sales report
let _salesViewMode = 'table';
function _setSalesView(mode) {
  _salesViewMode = mode;
  const t = document.getElementById('f-mode-table');
  const c = document.getElementById('f-mode-chart');
  const active   = 'bg-[#3d2610] text-white';
  const inactive = 'text-[#3d2610]';
  t.className = `flex-1 px-3 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest ${mode === 'table' ? active : inactive}`;
  c.className = `flex-1 px-3 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest ${mode === 'chart' ? active : inactive}`;
}

// ── Nursery multi-select ─────────────────────────────────────────────────────
async function loadNurseryFilter() {
  const { data } = await _supabase.from('shared_plots').select('nursery_name');
  const names = new Set();
  (data || []).forEach(p => { if (p.nursery_name) names.add(p.nursery_name); });
  names.add('Pre-Nursery'); // virtual aggregate for pre-nursery plots
  const wrap = document.getElementById('f-nursery-chips');
  wrap.innerHTML = '';
  [...names].sort().forEach(n => {
    const safe = String(n).replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c]));
    const lbl = document.createElement('label');
    lbl.className = 'nursery-chip';
    lbl.innerHTML = `<input type="checkbox" class="f-nurs-cb" value="${safe}" checked>${safe}`;
    wrap.appendChild(lbl);
  });
  document.getElementById('f-nurs-all').onclick  = () => { document.querySelectorAll('.f-nurs-cb').forEach(cb => cb.checked = true); };
  document.getElementById('f-nurs-none').onclick = () => { document.querySelectorAll('.f-nurs-cb').forEach(cb => cb.checked = false); };
}
function selectedNurseries() {
  return [...document.querySelectorAll('.f-nurs-cb:checked')].map(cb => cb.value);
}

document.getElementById('f-run').addEventListener('click', runReport);
document.getElementById('f-report').addEventListener('change', () => { syncFilterVisibility(); runReport(); });

// ════════════════════════════════════════════════════════════════════════════
// Seedling Sales Report (year × month grid)
// ════════════════════════════════════════════════════════════════════════════
// Aggregates `shared_do_records.total_qty` by year and month of delivery_date,
// excluding cancelled DOs. Renders a year-by-year grid like the printed report,
// with a variance row at the bottom comparing the latest year to the previous.

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const _CHART_COLORS = ['#3a7ab4', '#c07820', '#4a7a2e', '#a83020', '#7c3aed', '#0891b2', '#db2777', '#65a30d', '#ca8a04', '#0284c7', '#9333ea', '#dc2626'];

// Populate the year chip filter once the data has told us which years exist.
function _populateYearChips(years) {
  const wrap = document.getElementById('f-year-chips');
  if (!wrap) return;
  const existing = new Set([...wrap.querySelectorAll('input')].map(cb => cb.value));
  const incoming = new Set(years.map(String));
  // Only rebuild when the set of years actually changes
  if (existing.size === incoming.size && [...existing].every(v => incoming.has(v))) return;
  wrap.innerHTML = '';
  years.forEach(y => {
    const lbl = document.createElement('label');
    lbl.className = 'nursery-chip';
    lbl.innerHTML = `<input type="checkbox" class="f-yr-cb" value="${y}" checked>${y}`;
    wrap.appendChild(lbl);
  });
  document.getElementById('f-yr-all').onclick  = () => { document.querySelectorAll('.f-yr-cb').forEach(cb => cb.checked = true);  };
  document.getElementById('f-yr-none').onclick = () => { document.querySelectorAll('.f-yr-cb').forEach(cb => cb.checked = false); };
}
function _selectedYears() {
  return [...document.querySelectorAll('.f-yr-cb:checked')].map(cb => Number(cb.value));
}

// Simple SVG line chart of monthly sales, one line per selected year.
function _renderSalesChart(grid, years) {
  const W = 960, H = 460, PL = 60, PR = 20, PT = 30, PB = 50;
  const months = MONTHS_SHORT;
  const data = years.map(y => grid[y] || new Array(12).fill(0));
  const max = Math.max(1, ...data.flat());
  const niceMax = Math.ceil(max / 5000) * 5000 || max;
  const xStep = (W - PL - PR) / 11;
  const yPlot = (v) => PT + (H - PT - PB) * (1 - v / niceMax);
  const xPlot = (i) => PL + xStep * i;

  let svg = `<svg viewBox="0 0 ${W} ${H}" class="w-full" style="max-height:520px" preserveAspectRatio="xMidYMid meet">`;
  // Y gridlines + labels
  for (let i = 0; i <= 5; i++) {
    const y   = yPlot((niceMax * i) / 5);
    const val = Math.round((niceMax * i) / 5);
    svg += `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" stroke="#e8dcc8" stroke-width="1"/>`;
    svg += `<text x="${PL - 10}" y="${y + 4}" text-anchor="end" fill="#8a7a68" font-size="11" font-weight="700">${fmtNum(val)}</text>`;
  }
  // X labels
  months.forEach((m, i) => {
    svg += `<text x="${xPlot(i)}" y="${H - PB + 22}" text-anchor="middle" fill="#3d2610" font-size="11" font-weight="700">${m}</text>`;
  });
  // Lines + dots
  data.forEach((vals, idx) => {
    const color = _CHART_COLORS[idx % _CHART_COLORS.length];
    const pts = vals.map((v, i) => `${xPlot(i)},${yPlot(v)}`).join(' ');
    svg += `<polyline points="${pts}" stroke="${color}" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>`;
    vals.forEach((v, i) => {
      svg += `<circle cx="${xPlot(i)}" cy="${yPlot(v)}" r="4" fill="${color}"><title>${years[idx]} ${months[i]}: ${fmtNum(v)}</title></circle>`;
    });
  });
  svg += `</svg>`;

  const legend = years.map((y, i) => `
    <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white border border-[#e8dcc8] text-[11px] font-bold text-[#3d2610]">
      <span style="width:14px;height:14px;background:${_CHART_COLORS[i % _CHART_COLORS.length]};border-radius:3px;display:inline-block"></span>${y}
    </span>`).join('');

  return `<div class="flex flex-wrap gap-2 mb-4">${legend}</div>${svg}`;
}

async function runSeedlingSales() {
  const out = document.getElementById('report-output');
  const loading = document.getElementById('loading');
  out.classList.add('hidden');
  loading.classList.remove('hidden');

  const { data: dos, error } = await _supabase
    .from('shared_do_records')
    .select('delivery_date, total_qty, status, remark')
    .order('delivery_date', { ascending: true });

  if (error) {
    loading.classList.add('hidden');
    out.classList.remove('hidden');
    out.innerHTML = `<div class="glass-panel p-6 rounded-[2rem] text-red-700 text-sm">Failed to load deliveries: ${error.message}</div>`;
    return;
  }

  // Build the full year × month grid (all years on record).
  const grid = {};
  (dos || []).forEach(d => {
    const cancelled = d.status === 'Cancelled' || (d.remark && d.remark.includes('[CANCELLED]'));
    if (cancelled) return;
    if (!d.delivery_date) return;
    const dt = new Date(d.delivery_date);
    if (isNaN(dt)) return;
    const y = dt.getFullYear();
    const m = dt.getMonth();
    if (!grid[y]) grid[y] = new Array(12).fill(0);
    grid[y][m] += Number(d.total_qty || 0);
  });

  const allYears = Object.keys(grid).map(Number).sort();
  if (!allYears.length) {
    loading.classList.add('hidden');
    out.classList.remove('hidden');
    out.innerHTML = `<div class="glass-panel p-6 rounded-[2rem] text-[#8a7a68] text-sm">No delivery records found.</div>`;
    return;
  }

  // Populate the year chip filter (idempotent — only rebuilds if the year set changed).
  _populateYearChips(allYears);

  // Years the user picked (default: every checkbox is checked on first load).
  let years = _selectedYears();
  if (!years.length) years = allYears;
  years.sort();

  const latest = years[years.length - 1];
  const prev   = years.length > 1 ? years[years.length - 2] : null;
  const rowTotal = (arr) => arr.reduce((s, v) => s + v, 0);

  // Year-by-year variance row (latest visible year vs the one before it).
  let varianceAbs = null, variancePct = null;
  if (prev != null) {
    varianceAbs = grid[latest].map((v, i) => v - grid[prev][i]);
    variancePct = grid[latest].map((v, i) => {
      const base = grid[prev][i];
      return (base === 0) ? null : ((v - base) / base) * 100;
    });
  }

  const fmtVarPct = (n) => (n == null) ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  const cell = (n) => `<td class="text-right">${n === 0 ? '0' : fmtNum(n)}</td>`;
  const varCell = (n) => {
    const cls = n > 0 ? 'text-[#4a7a2e]' : (n < 0 ? 'text-[#a83020]' : 'text-[#8a7a68]');
    return `<td class="text-right font-black ${cls}">${n > 0 ? '+' : ''}${fmtNum(n)}</td>`;
  };
  const varPctCell = (n) => {
    if (n == null) return `<td class="text-right text-[#8a7a68]">—</td>`;
    const cls = n > 0 ? 'text-[#4a7a2e]' : (n < 0 ? 'text-[#a83020]' : 'text-[#8a7a68]');
    return `<td class="text-right font-black ${cls}">${fmtVarPct(n)}</td>`;
  };

  loading.classList.add('hidden');
  out.classList.remove('hidden');

  const headerHtml = `
    <div class="flex items-center justify-between mb-4 border-b border-[#e8dcc8] pb-4">
      <h3 class="text-lg font-black uppercase tracking-widest text-[#3d2610]">Seedlings Sales Report</h3>
      <div class="text-[10px] font-bold text-[#8a7a68] uppercase tracking-widest">${years.length} year${years.length === 1 ? '' : 's'} · ${years[0]} – ${latest}</div>
    </div>`;

  const bodyHtml = (_salesViewMode === 'chart')
    ? _renderSalesChart(grid, years)
    : `
      <div class="overflow-x-auto">
        <table class="report-table">
          <thead>
            <tr>
              <th>Year</th>
              ${MONTHS_SHORT.map(m => `<th class="text-right">${m}</th>`).join('')}
              <th class="text-right">Total</th>
            </tr>
          </thead>
          <tbody>
            ${years.map(y => `
              <tr>
                <td class="font-black text-[#3d2610]">${y}</td>
                ${grid[y].map(v => cell(v)).join('')}
                <td class="text-right font-black text-[#3d2610]">${fmtNum(rowTotal(grid[y]))}</td>
              </tr>
            `).join('')}
            ${prev != null ? `
              <tr style="background:#fdfaf4">
                <td class="font-black text-[#3d2610]">Variance<br><span class="text-[10px] font-bold text-[#8a7a68]">(${latest} vs ${prev})</span></td>
                ${varianceAbs.map(v => varCell(v)).join('')}
                ${varCell(rowTotal(varianceAbs))}
              </tr>
              <tr style="background:#fdfaf4">
                <td class="font-black text-[#3d2610]">%</td>
                ${variancePct.map(p => varPctCell(p)).join('')}
                ${varPctCell(rowTotal(varianceAbs) / (rowTotal(grid[prev]) || 1) * 100)}
              </tr>
            ` : ''}
          </tbody>
        </table>
      </div>`;

  out.innerHTML = `
    <div class="glass-panel p-6 rounded-[2rem]">
      ${headerHtml}
      ${bodyHtml}
      <div class="text-[10px] font-bold text-[#8a7a68] mt-4 leading-relaxed">
        <strong class="text-[#3d2610]">Notes —</strong>
        Issuance is the sum of <code>total_qty</code> on delivery (DO) records, bucketed by <code>delivery_date</code>.
        Cancelled DOs are excluded. Each DO can cover multiple plots / batches; the total here counts the DO once.
        Variance row compares the latest visible year against the one before it (within the current Years selection).
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════════════
// Nursery Summary Report (per-nursery monthly movement for a chosen year)
// ════════════════════════════════════════════════════════════════════════════
// Per nursery (mapped via shared_plots.nursery_name + Pre-Nursery aliases):
//   Seeds In         = SUM(Seeds_Received)               — pre-nursery only
//   Transplanted In  = SUM(Transplanted*) into this nursery's plots
//   Transplanted Out = mirror of trans-in, credited to source nursery
//                      (best-effort: source assumed Pre-Nursery for transplants
//                      into Main; not perfectly resolvable from current schema)
//   Damaged          = ABS(SUM(Damaged_Seeds))
//   Culling          = ABS(SUM(1st/2nd/3rd_Culling))
//   Sold             = SUM(qty_n) on DO records, by plot_n's nursery (cancelled excluded)
//   Balance c/f      = Balance b/f + Seeds In + Trans In − Trans Out − Damaged − Culling − Sold

const PRE_NURSERY_PLOTS = ['Pre-Nursery', 'DOUBLE-TONE', 'PREMIUM CARE'];
const TRANSPLANT_TYPES  = ['Transplanted', 'Transplanted_Premium', 'Transplanted_DoubleTone'];

function ymKey(d) {
  if (!d) return null;
  const x = new Date(d);
  if (isNaN(x)) return null;
  return `${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, '0')}`;
}


// ════════════════════════════════════════════════════════════════════════════
// Summary Report (group by Batch / Plot / Date)
// ════════════════════════════════════════════════════════════════════════════
// One universal column set; rows roll up to the chosen dimension:
//   By Plot  → one row per (Plot, Batch). Plot is shown once at the top of
//              each plot group, then individual batch rows underneath; a TOTAL
//              line closes each plot. Matches the supplied xlsx samples.
//   By Batch → one row per Batch (summed across plots).
//   By Date  → one row per calendar date.
//
// Columns: B/F · Seeds In · Planted · Transplanted · Premium · Double Tone ·
//          Damaged · 1st Cull · 2nd Cull · 3rd Cull · Sold · Closing
// B/F is the cumulative net of all transactions BEFORE the From date for the
// same (plot, batch) / batch / date key. Closing = B/F + inflow − outflow.

const SUMMARY_SKIP_TYPES = new Set([
  'Seed_Audit', 'Seed_Audit_Email', 'Seed_Audit_Note', 'Seed_Audit_Action',
  'Planting_Photo', 'Stock_Calibration'
]);

function _emptyMv() {
  return { seeds:0, planted:0, trans:0, premium:0, dtone:0, damaged:0, cull1:0, cull2:0, cull3:0, sold:0 };
}
function _netOfMv(b) { return b.seeds + b.planted + b.trans + b.premium + b.dtone - b.damaged - b.cull1 - b.cull2 - b.cull3 - b.sold; }

function _categorise(b, t, q) {
  switch (t) {
    case 'Seeds_Received':           b.seeds   += q; break;
    case 'Planted':                  b.planted += q; break;
    case 'Transplanted':             b.trans   += q; break;
    case 'Transplanted_Premium':     b.premium += q; break;
    case 'Transplanted_DoubleTone':  b.dtone   += q; break;
    case 'Damaged_Seeds':            b.damaged += Math.abs(q); break;
    case '1st_Culling':              b.cull1   += Math.abs(q); break;
    case '2nd_Culling':              b.cull2   += Math.abs(q); break;
    case '3rd_Culling':              b.cull3   += Math.abs(q); break;
    case 'Sold':                     b.sold    += q; break;
  }
}

async function runSummaryMovement() {
  const out = document.getElementById('report-output');
  const loading = document.getElementById('loading');
  out.classList.add('hidden');
  loading.classList.remove('hidden');

  const fromStr = document.getElementById('f-from').value;
  const toStr   = document.getElementById('f-to').value;
  const groupBy = document.getElementById('f-group').value || 'plot';

  const fromMs = fromStr ? new Date(fromStr).getTime() : -Infinity;
  const toMs   = toStr   ? new Date(toStr).getTime() + 86400000 : Infinity;

  const [logsRes, dosRes, plotsRes] = await Promise.all([
    _supabase.from('shared_inventory_logs')
      .select('transaction_type, transaction_date, plot_name, batch_name, quantity_change'),
    _supabase.from('shared_do_records')
      .select('delivery_date, status, remark, plot_1, qty_1, batch_1, plot_2, qty_2, batch_2, plot_3, qty_3, batch_3, plot_4, qty_4, batch_4, plot_5, qty_5, batch_5'),
    _supabase.from('shared_plots').select('plot_name, nursery_name')
  ]);
  if (logsRes.error || dosRes.error || plotsRes.error) {
    loading.classList.add('hidden');
    out.classList.remove('hidden');
    out.innerHTML = `<div class="glass-panel p-6 rounded-[2rem] text-red-700 text-sm">Failed to load data.</div>`;
    return;
  }

  // Plot → location map. Pre-Nursery aliases collapse to a single virtual one.
  const plotToLoc = {};
  (plotsRes.data || []).forEach(p => { plotToLoc[p.plot_name] = p.nursery_name || 'Unassigned'; });
  PRE_NURSERY_PLOTS.forEach(p => { plotToLoc[p] = 'Pre-Nursery'; });
  const locOf = (plot) => (plot && PRE_NURSERY_PLOTS.includes(plot)) ? 'Pre-Nursery' : (plotToLoc[plot] || 'Unassigned');

  const selectedLocs = new Set(selectedNurseries());
  const passLoc = (plot) => selectedLocs.size === 0 ? false : selectedLocs.has(locOf(plot));

  // Normalise every event into a {date, plot, batch, type, qty} tuple.
  // Events whose plot doesn't belong to a selected location are dropped.
  const events = [];
  (logsRes.data || []).forEach(l => {
    if (SUMMARY_SKIP_TYPES.has(l.transaction_type)) return;
    if (!passLoc(l.plot_name)) return;
    events.push({
      date:  l.transaction_date || null,
      plot:  l.plot_name  || '—',
      batch: l.batch_name || '—',
      type:  l.transaction_type,
      qty:   Number(l.quantity_change || 0)
    });
  });
  (dosRes.data || []).forEach(d => {
    if (d.status === 'Cancelled' || (d.remark && d.remark.includes('[CANCELLED]'))) return;
    for (let i = 1; i <= 5; i++) {
      const qty  = Number(d[`qty_${i}`] || 0);
      if (!qty) continue;
      const plot = d[`plot_${i}`];
      if (!passLoc(plot)) continue;
      events.push({
        date:  d.delivery_date || null,
        plot:  plot  || '—',
        batch: d[`batch_${i}`] || '—',
        type:  'Sold',
        qty
      });
    }
  });

  // Pick the key extractor based on grouping
  function makeKey(ev) {
    if (groupBy === 'batch') return ev.batch;
    if (groupBy === 'date')  return ev.date ? String(ev.date).slice(0, 10) : '—';
    return ev.plot + '\u0001' + ev.batch;  // unique per (plot, batch)
  }

  // bf  = pre-period cumulative net per key
  // buc = in-period movement per key (one bucket of columns)
  const bf  = {};
  const buc = {};
  for (const ev of events) {
    const ts = ev.date ? new Date(ev.date).getTime() : NaN;
    if (!isFinite(ts)) continue;
    const k = makeKey(ev);
    if (!k) continue;
    if (ts < fromMs) {
      if (!bf[k]) bf[k] = _emptyMv();
      _categorise(bf[k], ev.type, ev.qty);
    } else if (ts <= toMs) {
      if (!buc[k]) buc[k] = _emptyMv();
      _categorise(buc[k], ev.type, ev.qty);
    }
  }
  const openingOf = (k) => bf[k] ? _netOfMv(bf[k]) : 0;

  // Build a flat row per key (and remember plot/batch/date for grouping)
  const allKeys = new Set([...Object.keys(buc), ...Object.keys(bf)]);
  let rows = [];
  for (const k of allKeys) {
    const b = buc[k] || _emptyMv();
    const opening = openingOf(k);
    const inflow  = b.seeds + b.planted + b.trans + b.premium + b.dtone;
    const outflow = b.damaged + b.cull1 + b.cull2 + b.cull3 + b.sold;
    const closing = opening + inflow - outflow;
    // Hide rows that are entirely empty for the chosen period AND have zero opening
    if (opening === 0 && inflow === 0 && outflow === 0) continue;
    let plot = '', batch = '', date = '';
    if (groupBy === 'plot')  { [plot, batch] = k.split('\u0001'); }
    else if (groupBy === 'batch') { batch = k; }
    else if (groupBy === 'date')  { date  = k; }
    rows.push({ key: k, plot, batch, date, opening, ...b, closing });
  }

  // Sort: plot rows by (plot, batch); batch rows by batch; date rows by date asc
  // Natural compare so B2 sorts before B10 (instead of after, alphabetically).
  const _natCmp = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' }).compare;
  rows.sort((a, c) => {
    if (groupBy === 'plot')  return _natCmp(a.plot, c.plot) || _natCmp(a.batch, c.batch);
    if (groupBy === 'batch') return _natCmp(a.batch, c.batch);
    return a.date.localeCompare(c.date);
  });

  loading.classList.add('hidden');
  out.classList.remove('hidden');
  if (!rows.length) {
    out.innerHTML = `<div class="glass-panel p-6 rounded-[2rem] text-[#8a7a68] text-sm">No movement found in this period.</div>`;
    return;
  }

  const fmtCell = (n, cls) => `<td class="text-right ${cls || ''}">${n ? fmtNum(n) : '0'}</td>`;
  const isPlotMode  = groupBy === 'plot';
  const isBatchMode = groupBy === 'batch';
  const isDateMode  = groupBy === 'date';

  // For plot mode, only show the Plot cell once per plot group + emit a per-plot total row
  const tbodyHtml = (() => {
    if (!isPlotMode) {
      return rows.map(r => `
        <tr>
          <td class="font-black text-[#3d2610]">${isDateMode ? (r.date || '—') : (r.batch || '—')}</td>
          ${fmtCell(r.opening)}
          ${fmtCell(r.seeds,   'text-[#c07820] font-black')}
          ${fmtCell(r.planted, 'text-[#c07820]')}
          ${fmtCell(r.trans,   'text-[#3a7ab4]')}
          ${fmtCell(r.premium, 'text-[#3a7ab4]')}
          ${fmtCell(r.dtone,   'text-[#3a7ab4]')}
          ${fmtCell(r.damaged, 'text-[#a83020]')}
          ${fmtCell(r.cull1,   'text-[#a83020]')}
          ${fmtCell(r.cull2,   'text-[#a83020]')}
          ${fmtCell(r.cull3,   'text-[#a83020]')}
          ${fmtCell(r.sold,    'text-[#a83020]')}
          ${fmtCell(r.closing, 'text-[#4a7a2e] font-black')}
        </tr>`).join('');
    }
    // plot mode: group rows by plot. No subtotal row — the plot's running
    // balance is shown next to its label on the first row of each group.
    const groups = {};
    rows.forEach(r => { (groups[r.plot] ||= []).push(r); });
    const plotKeys = Object.keys(groups).sort(_natCmp);
    const html = [];
    for (const p of plotKeys) {
      const list = groups[p];
      const plotBalance = list.reduce((s, r) => s + r.closing, 0);
      list.forEach((r, i) => {
        const plotCell = (i === 0)
          ? `<td class="font-black text-[#3d2610]">${r.plot}<br><span class="text-[10px] font-bold text-[#4a7a2e] uppercase tracking-widest">Bal: ${fmtNum(plotBalance)}</span></td>`
          : `<td></td>`;
        html.push(`
          <tr>
            ${plotCell}
            <td>${r.batch || '—'}</td>
            ${fmtCell(r.opening)}
            ${fmtCell(r.seeds,   'text-[#c07820] font-black')}
            ${fmtCell(r.planted, 'text-[#c07820]')}
            ${fmtCell(r.trans,   'text-[#3a7ab4]')}
            ${fmtCell(r.premium, 'text-[#3a7ab4]')}
            ${fmtCell(r.dtone,   'text-[#3a7ab4]')}
            ${fmtCell(r.damaged, 'text-[#a83020]')}
            ${fmtCell(r.cull1,   'text-[#a83020]')}
            ${fmtCell(r.cull2,   'text-[#a83020]')}
            ${fmtCell(r.cull3,   'text-[#a83020]')}
            ${fmtCell(r.sold,    'text-[#a83020]')}
            ${fmtCell(r.closing, 'text-[#4a7a2e] font-black')}
          </tr>`);
      });
    }
    return html.join('');
  })();

  // Grand totals row
  const grand = rows.reduce((s, r) => {
    Object.keys(_emptyMv()).forEach(k => s[k] = (s[k] || 0) + r[k]);
    s.opening += r.opening; s.closing += r.closing;
    return s;
  }, { opening: 0, closing: 0, ..._emptyMv() });

  const headLeft = isPlotMode
    ? `<th>Plot</th><th>Batch</th>`
    : `<th>${isDateMode ? 'Date' : 'Batch'}</th>`;
  const grandLeft = isPlotMode ? `<td class="font-black text-[#3d2610]">GRAND TOTAL</td><td></td>` : `<td class="font-black text-[#3d2610]">GRAND TOTAL</td>`;

  const rangeLabel = `${fromStr ? fmtDate(fromStr) : '—'} → ${toStr ? fmtDate(toStr) : '—'}`;
  out.innerHTML = `
    <div class="glass-panel p-6 rounded-[2rem]">
      <div class="flex items-center justify-between mb-4 border-b border-[#e8dcc8] pb-4">
        <h3 class="text-lg font-black uppercase tracking-widest text-[#3d2610]">Summary Report · by ${groupBy[0].toUpperCase()+groupBy.slice(1)}</h3>
        <div class="text-[10px] font-bold text-[#8a7a68] uppercase tracking-widest">${rangeLabel}</div>
      </div>

      <div class="overflow-x-auto">
        <table class="report-table">
          <thead>
            <tr>
              ${headLeft}
              <th class="text-right">B/F</th>
              <th class="text-right">Seeds In</th>
              <th class="text-right">Planted</th>
              <th class="text-right">Transplanted</th>
              <th class="text-right">Premium</th>
              <th class="text-right">Double Tone</th>
              <th class="text-right">Damaged</th>
              <th class="text-right">1st Cull</th>
              <th class="text-right">2nd Cull</th>
              <th class="text-right">3rd Cull</th>
              <th class="text-right">Sold</th>
              <th class="text-right">Closing</th>
            </tr>
          </thead>
          <tbody>
            ${tbodyHtml}
            <tr style="background:#fdf3e6">
              ${grandLeft}
              ${fmtCell(grand.opening, 'font-black')}
              ${fmtCell(grand.seeds,   'text-[#c07820] font-black')}
              ${fmtCell(grand.planted, 'text-[#c07820] font-black')}
              ${fmtCell(grand.trans,   'text-[#3a7ab4] font-black')}
              ${fmtCell(grand.premium, 'text-[#3a7ab4] font-black')}
              ${fmtCell(grand.dtone,   'text-[#3a7ab4] font-black')}
              ${fmtCell(grand.damaged, 'text-[#a83020] font-black')}
              ${fmtCell(grand.cull1,   'text-[#a83020] font-black')}
              ${fmtCell(grand.cull2,   'text-[#a83020] font-black')}
              ${fmtCell(grand.cull3,   'text-[#a83020] font-black')}
              ${fmtCell(grand.sold,    'text-[#a83020] font-black')}
              ${fmtCell(grand.closing, 'text-[#4a7a2e] font-black')}
            </tr>
          </tbody>
        </table>
      </div>

      <div class="text-[10px] font-bold text-[#8a7a68] mt-4 leading-relaxed">
        <strong class="text-[#3d2610]">Notes —</strong>
        <em>B/F</em> is the cumulative net of all transactions <strong>before</strong> the From date for the same key.
        Sold is taken from delivery (DO) line items <code>plot_n / batch_n / qty_n</code>; cancelled DOs are excluded.
        Audit, photo, and stock-calibration entries are not counted as movements.
        Pre-nursery plots populate <em>Planted</em> / <em>1st Cull</em>; main-nursery plots populate <em>Transplanted</em> / <em>Double Tone</em> / <em>2nd Cull</em>. Empty cells are zero.
      </div>
    </div>
  `;
}

async function bootstrap() {
  await MJMAccess.load(_supabase);
  if (!MJMAccess.user()) { window.location.href = 'operation_dashboard.html'; return; }
  if (!MJMAccess.canAccess('reports')) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('report-area').classList.add('hidden');
    document.getElementById('forbidden').classList.remove('hidden');
    return;
  }
  const { from, to } = defaultRange();
  document.getElementById('f-from').value = from;
  document.getElementById('f-to').value   = to;
  await Promise.all([loadBreeds(), loadNurseryFilter()]);
  _setSalesView('table');
  document.getElementById('f-mode-table').addEventListener('click', () => { _setSalesView('table'); runReport(); });
  document.getElementById('f-mode-chart').addEventListener('click', () => { _setSalesView('chart'); runReport(); });
  document.addEventListener('change', e => {
    if (e.target && (e.target.classList.contains('f-yr-cb') || e.target.classList.contains('f-nurs-cb'))) runReport();
  });
  syncFilterVisibility();
  runReport();
}

bootstrap();
</script>
</body>
</html>
