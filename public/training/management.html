<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team &amp; Resource Management — MJM Training Center</title>
<meta name="description" content="Team & resource management training for Nursery Managers (coming soon).">
<meta name="theme-color" content="#1E3A20">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/auth.js"></script>
</head>
<body>

<div class="pagebar"><div class="fill" id="pgfill"></div></div>

<section class="slide" id="intro"><div class="wrap">
  <div class="coming">
    <div class="cs-icon"><i class="fa-solid fa-users-gear"></i></div>
    <div class="kicker">Team &amp; Resource Management</div>
    <h2 class="slide-title">Team &amp; Resource Management</h2>
    <p>The full training content for this program is being prepared.</p>
  </div>
</div></section>

<div class="pager">
  <div class="pager-in">
    <a class="phome" href="nursery.html"><i class="fa-solid fa-arrow-left"></i> Back to main page</a>
    <div class="pmeta">
      <div class="pstep" id="pstep">Page 1</div>
      <div class="pname" id="pname"></div>
    </div>
    <div class="pbtns">
      <button class="pbtn ghost" id="prevBtn"><i class="fa-solid fa-arrow-left"></i> <span class="lbl">Previous</span></button>
      <button class="pbtn" id="nextBtn">Next <i class="fa-solid fa-arrow-right"></i></button>
    </div>
  </div>
</div>

<footer>
  <p><b>MJM Training Center</b> · Team &amp; Resource Management</p>
</footer>

<script>
(function(){
  var body=document.body;
  var steps=[].slice.call(document.querySelectorAll('section.slide'));
  var fill=document.getElementById('pgfill');
  var stepEl=document.getElementById('pstep'),nameEl=document.getElementById('pname');
  var prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn');
  var total=steps.length, cur=0;
  var SLUG='management';
  var PFX='mjm-u-'+(localStorage.getItem('mjm-user')||'guest')+'-';
  var seen={};
  try{JSON.parse(localStorage.getItem(PFX+'read-'+SLUG)||'[]').forEach(function(n){seen[n]=1});}catch(e){}
  function record(i){
    seen[i]=1;
    var arr=Object.keys(seen).map(Number);
    try{
      localStorage.setItem(PFX+'read-'+SLUG,JSON.stringify(arr));
      localStorage.setItem(PFX+'pages-'+SLUG,String(total));
      if(arr.length>=total) localStorage.setItem(PFX+'done-'+SLUG,'1');
    }catch(e){}
  }
  [].forEach.call(document.querySelectorAll('.reveal'),function(el){el.classList.add('in');});
  function nameOf(sec){var t=sec.querySelector('.slide-title');return t?t.textContent.trim():'';}
  function show(i,scroll){
    cur=Math.max(0,Math.min(total-1,i));
    record(cur);
    steps.forEach(function(s,idx){s.classList.toggle('active',idx===cur);});
    fill.style.width=((cur+1)/total*100)+'%';
    stepEl.textContent='Page '+(cur+1)+' of '+total;
    nameEl.textContent=nameOf(steps[cur]);
    prevBtn.disabled=(cur===0);
    nextBtn.innerHTML=(cur===total-1)?'Finish <i class="fa-solid fa-check"></i>':'Next <i class="fa-solid fa-arrow-right"></i>';
    if(scroll!==false) window.scrollTo({top:0,behavior:'smooth'});
  }
  prevBtn.addEventListener('click',function(){ if(cur>0) show(cur-1); });
  nextBtn.addEventListener('click',function(){ if(cur<total-1) show(cur+1); else window.location.href='nursery.html'; });
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(e.key==='ArrowRight'){ if(cur<total-1) show(cur+1); }
    else if(e.key==='ArrowLeft'){ if(cur>0) show(cur-1); }
  });
  body.classList.add('paged');
  show(0,false);
})();
</script>

</body>
</html>
