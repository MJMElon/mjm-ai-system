<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - MJM AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf5ff; margin: 0; font-family: 'Outfit', system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(#e9d5ff 1px, transparent 1px); background-size: 24px 24px; z-index: -2; opacity: 0.5; }
        .glass-panel { background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(24px); border: 1px solid #ffffff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); border-l: 12px solid #a855f7; }
        .input-style { border: 1px solid #cbd5e1; background-color: #ffffff; padding: 10px; border-radius: 8px; outline: none; width: 100%; font-weight: 600; transition: all 0.2s; }
        .input-style:focus { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,0.2); }
        .btn-purple { background: linear-gradient(to right, #9333ea, #a855f7); color: white; font-weight: bold; padding: 12px 24px; border-radius: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; box-shadow: 0 4px 10px -2px rgba(168, 85, 247, 0.4); border: none; }
        .btn-purple:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(168, 85, 247, 0.5); }
        .nav-btn { display: block; width: 100%; text-align: left; padding: 16px 24px; border-radius: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px; transition: all 0.2s; color: #64748b; margin-bottom: 8px;}
        .nav-btn.active { background-color: #a855f7; color: white; box-shadow: 0 4px 10px -2px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 relative">
    <div class="bg-pattern"></div>

    <div class="w-full max-w-[1400px] mx-auto z-10 space-y-6 py-4">
        
        <div class="glass-panel p-6 rounded-[2rem] flex flex-col md:flex-row items-center justify-between gap-4 relative overflow-hidden" id="main-title-panel">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-bold text-slate-500 hover:text-purple-700 uppercase tracking-widest bg-slate-100 hover:bg-slate-200 px-5 py-3 rounded-xl transition-colors flex items-center gap-2 self-start md:self-auto">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to main page
            </button>
            <h1 class="text-2xl md:text-3xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-800 via-fuchsia-600 to-purple-500 drop-shadow-sm pb-1 text-center" style="word-spacing: 0.2em;">System Configuration</h1>
            <div class="hidden md:block w-[130px]"></div>
        </div>

        <div class="flex flex-col xl:flex-row gap-6">
            
            <div class="w-full xl:w-1/3 flex flex-col gap-6">
                <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl border-l-[8px] border-fuchsia-400">
                    <h2 class="font-black text-slate-800 uppercase tracking-widest text-lg border-b-2 border-slate-100 pb-4 mb-4">Manage Breeds</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-breed-name" class="input-style text-xs" placeholder="Breed Name">
                        <button onclick="addBreed()" class="btn-purple !px-4 text-xs tracking-widest">+ Add</button>
                    </div>
                    <ul id="breeds-list" class="space-y-2 max-h-[250px] overflow-y-auto pr-2"></ul>
                </div>

                <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl border-l-[8px] border-emerald-400">
                    <h2 class="font-black text-slate-800 uppercase tracking-widest text-lg border-b-2 border-slate-100 pb-4 mb-4">Manage Batches</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-batch-name" class="input-style text-xs uppercase" placeholder="Batch Name">
                        <button onclick="addBatch()" class="btn-purple !bg-emerald-600 !px-4 text-xs tracking-widest">+ Add</button>
                    </div>
                    <ul id="batches-list" class="space-y-2 max-h-[250px] overflow-y-auto pr-2"></ul>
                </div>
            </div>

            <div class="w-full xl:w-2/3 flex flex-col gap-6">
                
                <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl border-l-[8px] border-blue-500">
                    <h2 class="font-black text-slate-800 uppercase tracking-widest text-lg border-b-2 border-slate-100 pb-4 mb-4">Manage Nurseries & Licenses</h2>
                    <div class="flex flex-col md:flex-row gap-2 mb-4 bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <input type="text" id="new-nursery-name" class="input-style text-xs uppercase" placeholder="Nursery Name (UNN 1)">
                        <input type="text" id="new-nursery-license" class="input-style text-xs uppercase" placeholder="License Number">
                        <button onclick="addNursery()" class="btn-purple !bg-blue-600 !px-6 text-xs tracking-widest">+ Add Nursery</button>
                    </div>
                    <ul id="nurseries-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-[200px] overflow-y-auto pr-2"></ul>
                </div>

                <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl border-l-[8px] border-purple-500 flex-1">
                    <div class="flex justify-between items-center border-b-2 border-slate-100 pb-4 mb-4">
                        <h2 class="font-black text-slate-800 uppercase tracking-widest text-lg">Manage Plots</h2>
                        <select id="nursery-filter" class="input-style text-xs w-1/3 !py-2" onchange="renderFilteredPlots()">
                            <option value="">All Nurseries</option>
                        </select>
                    </div>
                    
                    <div class="flex flex-col md:flex-row gap-2 mb-4 bg-purple-50 p-4 rounded-xl border border-purple-100">
                        <select id="plot-nursery-select" class="input-style text-xs flex-1 font-bold text-slate-700"></select>
                        <input type="text" id="new-plot-name" class="input-style text-xs flex-1 uppercase" placeholder="Plot Name (U1)">
                        <button onclick="addPlot()" class="btn-purple !px-6 text-xs tracking-widest">+ Add Plot</button>
                    </div>
                    <ul id="plots-list" class="grid grid-cols-1 md:grid-cols-3 gap-2 max-h-[300px] overflow-y-auto pr-2"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kibqjztozokohqmhqqqf.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYnFqenRvem9rb2hxbWhxcXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzQzNjIsImV4cCI6MjA4OTgxMDM2Mn0.J7qJUZhWXYf5b9oey4wXJkjdi66jomEMw_NeV9NWF7M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let globalBreeds = []; 
        let globalPlots = []; 
        let globalNurseries = []; 
        let globalBatches = [];

        async function fetchData() {
            try {
                // Fetch all data without strict DB ordering to allow human-natural sorting in JS
                const [breedRes, plotRes, nursRes, batchRes] = await Promise.all([
                    _supabase.from('breeds').select('*').order('name'),
                    _supabase.from('plots').select('*'),
                    _supabase.from('nurseries').select('*').order('name'),
                    _supabase.from('batches').select('*')
                ]);

                globalBreeds = breedRes.data || [];
                globalPlots = plotRes.data || [];
                globalNurseries = nursRes.data || [];
                globalBatches = batchRes.data || [];
                
                // NATURAL SORTING LOGIC: Fixes U10 coming before U2.
                globalPlots.sort((a, b) => {
                    // Sort primarily by Nursery name
                    let nursCompare = a.nursery_name.localeCompare(b.nursery_name);
                    if (nursCompare !== 0) return nursCompare;
                    // Sort secondarily by Plot name (using natural numeric sorting)
                    return a.plot_name.localeCompare(b.plot_name, undefined, { numeric: true, sensitivity: 'base' });
                });

                // DESCENDING NATURAL SORT FOR BATCHES
                globalBatches.sort((a, b) => {
                    return b.name.localeCompare(a.name, undefined, { numeric: true, sensitivity: 'base' });
                });

                renderBreeds(); 
                renderBatches(); 
                renderNurseries(); 
                populateNurseryFilters(); 
                renderFilteredPlots();
            } catch(err) {
                alert("Database Error: Ensure tables are set up with RLS allowed!");
                console.error(err);
            }
        }

        function renderBreeds() {
            const list = document.getElementById('breeds-list'); list.innerHTML = '';
            if(globalBreeds.length === 0) return list.innerHTML = '<div class="text-xs text-slate-400 italic text-center p-4">No breeds added.</div>';
            globalBreeds.forEach(item => {
                list.insertAdjacentHTML('beforeend', `
                    <li class="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center text-sm font-bold text-slate-700 shadow-sm">
                        ${item.name} 
                        <button onclick="deleteItem('breeds', '${item.id}')" class="text-red-400 hover:bg-red-50 w-6 h-6 rounded-full flex items-center justify-center transition-colors">✕</button>
                    </li>
                `);
            });
        }

        function renderBatches() {
            const list = document.getElementById('batches-list'); list.innerHTML = '';
            if(globalBatches.length === 0) return list.innerHTML = '<div class="text-xs text-slate-400 italic text-center p-4">No batches added.</div>';
            globalBatches.forEach(item => {
                list.insertAdjacentHTML('beforeend', `
                    <li class="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center text-sm font-bold text-slate-700 shadow-sm">
                        ${item.name} 
                        <button onclick="deleteItem('batches', '${item.id}')" class="text-red-400 hover:text-red-600 bg-red-50 w-6 h-6 rounded-full flex items-center justify-center transition-colors">✕</button>
                    </li>
                `);
            });
        }

        function renderNurseries() {
            const list = document.getElementById('nurseries-list'); list.innerHTML = '';
            if(globalNurseries.length === 0) return list.innerHTML = '<div class="text-xs text-slate-400 italic text-center p-4">No nurseries added.</div>';
            globalNurseries.forEach(item => {
                list.insertAdjacentHTML('beforeend', `
                    <li class="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm">
                        <div class="flex flex-col">
                            <span class="text-blue-700 uppercase tracking-widest font-black text-sm">${item.name}</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Lic: ${item.license || 'N/A'}</span>
                        </div>
                        <button onclick="deleteItem('nurseries', '${item.id}')" class="text-red-400 hover:bg-red-50 w-8 h-8 rounded-full flex items-center justify-center transition-colors">✕</button>
                    </li>
                `);
            });
        }

        function populateNurseryFilters() {
            const filterSelect = document.getElementById('nursery-filter'); 
            const plotNurserySelect = document.getElementById('plot-nursery-select');
            
            filterSelect.innerHTML = '<option value="">All Nurseries</option>'; 
            plotNurserySelect.innerHTML = '<option value="">Assign to Nursery...</option>';
            
            const uniqueNurseries = [...new Set(globalPlots.map(p => p.nursery_name))];
            uniqueNurseries.forEach(n => filterSelect.insertAdjacentHTML('beforeend', `<option value="${n}">${n}</option>`));
            globalNurseries.forEach(n => plotNurserySelect.insertAdjacentHTML('beforeend', `<option value="${n.name}">${n.name}</option>`));
        }

        function renderFilteredPlots() {
            const filterVal = document.getElementById('nursery-filter').value; 
            const list = document.getElementById('plots-list'); list.innerHTML = '';
            
            let filtered = filterVal ? globalPlots.filter(p => p.nursery_name === filterVal) : globalPlots;

            if(filtered.length === 0) return list.innerHTML = '<div class="text-xs text-slate-400 italic text-center p-4 col-span-3">No plots found.</div>';

            filtered.forEach(item => {
                list.insertAdjacentHTML('beforeend', `
                    <li class="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center text-sm font-bold text-slate-700 shadow-sm">
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] text-purple-600 font-black uppercase tracking-widest bg-purple-100 px-2 py-1 rounded">${item.nursery_name}</span> 
                            <span class="text-base">${item.plot_name}</span>
                        </div> 
                        <button onclick="deleteItem('plots', '${item.id}')" class="text-red-400 hover:bg-red-50 w-6 h-6 rounded-full flex items-center justify-center transition-colors">✕</button>
                    </li>
                `);
            });
        }

        async function addBreed() {
            const name = document.getElementById('new-breed-name').value.trim(); if(!name) return;
            await _supabase.from('breeds').insert([{ name }]); 
            document.getElementById('new-breed-name').value = ''; fetchData(); 
        }

        async function addBatch() {
            const name = document.getElementById('new-batch-name').value.trim().toUpperCase(); if(!name) return;
            await _supabase.from('batches').insert([{ name }]); 
            document.getElementById('new-batch-name').value = ''; fetchData(); 
        }

        async function addNursery() {
            const name = document.getElementById('new-nursery-name').value.trim().toUpperCase(); 
            const license = document.getElementById('new-nursery-license').value.trim().toUpperCase();
            if(!name || !license) return alert("Provide Nursery Name and License.");
            await _supabase.from('nurseries').insert([{ name, license }]);
            document.getElementById('new-nursery-name').value = ''; document.getElementById('new-nursery-license').value = ''; fetchData(); 
        }

        async function addPlot() {
            const nursery = document.getElementById('plot-nursery-select').value; 
            const plot = document.getElementById('new-plot-name').value.trim().toUpperCase();
            if(!nursery || !plot) return alert("Select a Nursery and provide a Plot Name.");
            await _supabase.from('plots').insert([{ nursery_name: nursery, plot_name: plot }]);
            document.getElementById('new-plot-name').value = ''; fetchData(); 
        }

        async function deleteItem(table, id) {
            if(!confirm(`Are you sure you want to delete this item?`)) return;
            await _supabase.from(table).delete().eq('id', id);
            fetchData();
        }

        _supabase.auth.getSession().then(({ data: { session } }) => { if (!session) window.location.href = 'index.html'; else fetchData(); });
    </script>
</body>
</html>
