<style>
  /* ── Proof modal ─────────────────────────────────────────── */
  .proof-overlay{position:fixed;inset:0;background:rgba(15,30,18,.65);backdrop-filter:blur(4px);z-index:90;display:none;align-items:center;justify-content:center;padding:16px;}
  .proof-overlay.open{display:flex;}
  .proof-card{background:#fff;border-radius:20px;max-width:440px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,.35);padding:22px;}
  .proof-card h3{margin:0 0 2px;font-size:1.15rem;}
  .proof-card .p-sub{color:#6b7a6b;font-size:.85rem;margin:0 0 14px;}
  .p-photo{display:block;width:100%;border:2px dashed #b9ccb9;border-radius:14px;background:#f3f7f3;text-align:center;padding:26px 12px;cursor:pointer;transition:all .15s;}
  .p-photo:hover{border-color:var(--green,#2f7d32);background:#ecf4ec;}
  .p-photo i{font-size:1.9rem;color:var(--green,#2f7d32);display:block;margin-bottom:8px;}
  .p-photo span{font-weight:700;color:#33472f;font-size:.9rem;}
  .p-photo small{display:block;color:#7d8d7d;margin-top:4px;font-size:.75rem;}
  .p-photo img{max-width:100%;max-height:240px;border-radius:10px;display:block;margin:0 auto;}
  .p-photo.hasimg{padding:10px;border-style:solid;}
  .p-meta{margin:14px 0 4px;display:flex;flex-direction:column;gap:8px;}
  .p-meta-row{display:flex;align-items:center;gap:10px;background:#f6f8f6;border:1px solid #e3eae3;border-radius:10px;padding:9px 12px;font-size:.85rem;color:#33472f;}
  .p-meta-row i{width:18px;text-align:center;color:var(--green,#2f7d32);}
  .p-meta-row .warn{color:#a15c00;}
  .p-btns{display:flex;gap:10px;margin-top:16px;}
  .p-btns .btn{flex:1;justify-content:center;}
  .p-btns .btn.ghost{background:#eef2ee;color:#33472f;box-shadow:none;}
  .p-btns .btn:disabled{opacity:.5;cursor:not-allowed;}
  /* ── Per-activity history ───────────────────────────────── */
  .ph-toggle{background:none;border:none;color:#5c7a5c;font-size:.78rem;font-weight:700;cursor:pointer;padding:2px 0 0;display:inline-flex;align-items:center;gap:6px;}
  .ph-toggle:hover{color:var(--green,#2f7d32);}
  .proof-hist{display:none;margin:2px 0 10px;padding:10px 12px;background:#f6f8f6;border:1px solid #e3eae3;border-radius:12px;}
  .proof-hist.open{display:block;}
  .ph-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed #dbe5db;font-size:.8rem;color:#3c4f3c;}
  .ph-item:last-child{border-bottom:none;}
  .ph-item img{width:46px;height:46px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;}
  .ph-item .ph-noimg{width:46px;height:46px;border-radius:8px;background:#e3eae3;display:flex;align-items:center;justify-content:center;color:#8ba18b;flex-shrink:0;}
  .ph-item a{color:#2f7d32;font-weight:700;text-decoration:none;}
  .ph-item .ph-pend{color:#a15c00;font-weight:700;font-size:.72rem;}
  .ph-empty{font-size:.8rem;color:#7d8d7d;padding:4px 0;}
  /* ── Collapsible category groups ────────────────────────── */
  .req-group.clps>h3{cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;user-select:none;}
  .req-group.clps>h3 .clps-n{font-size:.72em;font-weight:800;color:#5c7a5c;background:#eef4ee;border:1px solid #dbe5db;border-radius:999px;padding:2px 10px;margin-left:auto;}
  .req-group.clps>h3 .clps-arrow{color:#8ba18b;font-size:.75em;transition:transform .15s;}
  .req-group.clps.open>h3 .clps-arrow{transform:rotate(180deg);}
  .req-group.clps .grp-body{display:none;}
  .req-group.clps.open .grp-body{display:block;}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-in">
    <a class="brand brandmark" href="index.html">
      <span class="mjm-logo">MJM</span>
      <span class="tc-label">Training<br>Center</span>
    </a>
  </div>
</nav>

<div class="tc-tabs">
  <a class="tc-tab" href="index.html"><i class="fa-solid fa-table-cells-large"></i> Modules</a>
  <span class="tc-tab active"><i class="fa-solid fa-camera"></i> Practical Record</span>
  <span class="tc-swipe-hint"><i class="fa-solid fa-left-right"></i> swipe</span>

<section class="slide"><div class="wrap">
  <div class="titlewrap">
    <h2 class="slide-title" id="pageTitle">MJM Nursery Practical Record</h2>
  </div>
  <div class="cert-pick" style="max-width:760px">
    <span class="cstatus" id="progStatus" hidden></span>
    <div id="logGroups"></div>
  </div>
</div></section>

<footer>
  <p><b>MJM Training Center</b> · Practical Record</p>
</footer>

<!-- ── Proof-capture modal ─────────────────────────────────── -->
<div class="proof-overlay" id="proofOverlay">
  <div class="proof-card">
    <h3 id="pTitle">Add record</h3>
    <p class="p-sub">Take a photo of the work as proof — location, date and time are saved with it.</p>

    <label class="p-photo" id="pPhotoBox">
      <i class="fa-solid fa-camera"></i>
      <span>Take / choose photo</span>
      <small>Required — this is your proof of work</small>
      <input type="file" id="pFile" accept="image/*" capture="environment" hidden>
    </label>

    <div class="p-meta">
      <div class="p-meta-row"><i class="fa-solid fa-calendar-day"></i> <span id="pWhen">—</span></div>
      <div class="p-meta-row"><i class="fa-solid fa-location-dot"></i> <span id="pWhere">Getting location…</span></div>
    </div>

    <div class="p-btns">
      <button class="btn ghost" type="button" id="pCancel">Cancel</button>
      <button class="btn" type="button" id="pSave" disabled><i class="fa-solid fa-check"></i> Save record</button>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
(function(){
  if(!MJM.user()) return;
  MJM.initTopbar();

  /* "Set as my start page" — this page is 'logbook' */
  (function(){
    var btn=document.getElementById('tcStart');
    if(!btn) return;
    function paint(){
      var on=MJM.startPage()==='logbook';
      btn.className='tc-start'+(on?' on':'');
      btn.innerHTML=on
        ? '<i class="fa-solid fa-circle-check"></i> Your start page'
        : '<i class="fa-regular fa-star"></i> Set as my start page';
    }
    btn.addEventListener('click',function(){ MJM.setStartPage('logbook'); paint(); });
    paint();
  })();

  /* Swipe right (finger moves right) → back to the Modules page.
     Ignored while the photo-proof modal is open. */
  (function(){
    var sx=null,sy=null;
    document.addEventListener('touchstart',function(e){
      var t=e.touches[0]; sx=t.clientX; sy=t.clientY;
    },{passive:true});
    document.addEventListener('touchend',function(e){
      if(sx==null) return;
      var t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
      sx=null;
      var modalOpen=document.querySelector('.proof-overlay.open');
      if(!modalOpen&&dx>70&&Math.abs(dy)<60) location.href='index.html';
    },{passive:true});
  })();

  var root=document.getElementById('logGroups'),
      status=document.getElementById('progStatus');

  /* ── Supabase (shares the AI System login session on this domain) ── */
  var _sb=null;
  try{ _sb=supabase.createClient(SHARED_SUPA_URL, SHARED_SUPA_KEY); }catch(e){}
  var BUCKET='documents';

  function el(tag,cls,html){ var n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

  function param(name){
    var m=new RegExp('[?&]'+name+'=([^&]*)').exec(location.search);
    return m?decodeURIComponent(m[1]):null;
  }

  /* ── Local proof entries (per user, per activity) ─────────────
     entries-<act>: [{at,lat,lng,acc,url,synced}]  (small — no image data)
     pending-proofs: [{act,at,lat,lng,acc,dataUrl}] queued while offline */
  function entries(act){ try{ return JSON.parse(MJM.get('entries-'+act)||'[]'); }catch(e){ return []; } }
  function saveEntries(act,list){ MJM.set('entries-'+act,JSON.stringify(list)); }
  function pending(){ try{ return JSON.parse(MJM.get('pending-proofs')||'[]'); }catch(e){ return []; } }
  function savePending(list){ MJM.set('pending-proofs',JSON.stringify(list)); }

  function fmtWhen(iso){
    try{ return new Date(iso).toLocaleString(undefined,{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
    catch(e){ return iso; }
  }
  function whereHtml(e){
    if(e.lat==null||e.lng==null) return '<span class="ph-pend">no location</span>';
    var ll=e.lat.toFixed(5)+', '+e.lng.toFixed(5);
    return '<a href="https://maps.google.com/?q='+e.lat+','+e.lng+'" target="_blank" rel="noopener">'+ll+'</a>'+
           (e.acc?' <small>±'+Math.round(e.acc)+'m</small>':'');
  }

  /* ── Photo helpers ──────────────────────────────────────── */
  function compress(file,maxDim,quality){
    return new Promise(function(res,rej){
      var img=new Image();
      img.onload=function(){
        var w=img.width,h=img.height,s=Math.min(1,maxDim/Math.max(w,h));
        var c=document.createElement('canvas');
        c.width=Math.round(w*s); c.height=Math.round(h*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        c.toBlob(function(b){ b?res(b):rej(new Error('compress failed')); },'image/jpeg',quality);
        URL.revokeObjectURL(img.src);
      };
      img.onerror=function(){ rej(new Error('cannot read image')); };
      img.src=URL.createObjectURL(file);
    });
  }
  function blobToDataUrl(b){
    return new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result)}; r.onerror=function(){rej(r.error)};
      r.readAsDataURL(b);
    });
  }
  function dataUrlToBlob(d){
    var p=d.split(','),m=/data:(.*?);/.exec(p[0]),bin=atob(p[1]),a=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);
    return new Blob([a],{type:m?m[1]:'image/jpeg'});
  }

  /* ── Upload one proof (blob) → storage + table row. Returns {url,path}. ── */
  async function uploadProof(act,blob,meta){
    if(!_sb) throw new Error('no client');
    var s=await _sb.auth.getSession();
    var session=s&&s.data&&s.data.session;
    if(!session) throw new Error('not signed in to Supabase');
    var uid=session.user.id;
    var path='training_proofs/'+uid+'/'+act+'-'+Date.now()+'.jpg';
    var up=await _sb.storage.from(BUCKET).upload(path,blob,{contentType:'image/jpeg',upsert:false});
    if(up.error) throw up.error;
    var url=_sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
    // Proof row — best-effort: the photo in storage is already proof if the
    // table migration hasn't been run yet.
    try{
      var ins=await _sb.from('training_practical_logs').insert({
        user_id:uid,
        email:session.user.email||null,
        full_name:(session.user.user_metadata&&session.user.user_metadata.full_name)||null,
        activity:act,
        taken_at:meta.at,
        lat:meta.lat, lng:meta.lng, accuracy_m:meta.acc,
        photo_path:path, photo_url:url
      });
      if(ins.error) console.warn('[proof] table insert failed (photo still uploaded):',ins.error.message);
    }catch(e){ console.warn('[proof] table insert threw:',e); }
    return {url:url,path:path};
  }

  /* ── Sync queued offline proofs (best effort, on page load) ── */
  async function syncPending(){
    var q=pending();
    if(!q.length) return;
    var rest=[];
    for(var i=0;i<q.length;i++){
      var it=q[i];
      try{
        var r=await uploadProof(it.act,dataUrlToBlob(it.dataUrl),it);
        var list=entries(it.act);
        // match the placeholder entry by timestamp and mark it synced
        for(var j=0;j<list.length;j++){
          if(list[j].at===it.at&&!list[j].synced){ list[j].synced=true; list[j].url=r.url; break; }
        }
        saveEntries(it.act,list);
      }catch(e){ rest.push(it); }
    }
    savePending(rest);
  }

  /* ── Proof modal ────────────────────────────────────────── */
  var pv={act:null,name:'',blob:null,geo:null,geoDone:false,onSaved:null,saving:false};
  var overlay=document.getElementById('proofOverlay'),
      pTitle=document.getElementById('pTitle'),
      pBox=document.getElementById('pPhotoBox'),
      pFile=document.getElementById('pFile'),
      pWhen=document.getElementById('pWhen'),
      pWhere=document.getElementById('pWhere'),
      pSave=document.getElementById('pSave'),
      pCancel=document.getElementById('pCancel');

  function resetPhotoBox(){
    pBox.classList.remove('hasimg');
    pBox.innerHTML='<i class="fa-solid fa-camera"></i><span>Take / choose photo</span>'+
      '<small>Required — this is your proof of work</small>';
    pBox.appendChild(pFile);
    pFile.value='';
  }

  function openProof(a,onSaved){
    pv={act:a.key,name:a.name,blob:null,geo:null,geoDone:false,onSaved:onSaved,saving:false};
    pTitle.textContent='Add record — '+a.name;
    pWhen.textContent=fmtWhen(new Date().toISOString());
    pWhere.textContent='Getting location…';
    pSave.disabled=true;
    pSave.innerHTML='<i class="fa-solid fa-check"></i> Save record';
    resetPhotoBox();
    overlay.classList.add('open');
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        function(pos){ pv.geo={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy}; pv.geoDone=true;
          pWhere.innerHTML=pv.geo.lat.toFixed(5)+', '+pv.geo.lng.toFixed(5)+' <small>±'+Math.round(pv.geo.acc)+'m</small>'; },
        function(err){ pv.geoDone=true;
          pWhere.innerHTML='<span class="warn">Location unavailable ('+esc(err.message)+') — record saves without it</span>'; },
        {enableHighAccuracy:true,timeout:10000,maximumAge:30000}
      );
    }else{
      pv.geoDone=true;
      pWhere.innerHTML='<span class="warn">This device has no location support</span>';
    }
  }
  function closeProof(){ overlay.classList.remove('open'); pv.saving=false; }

  pFile.addEventListener('change',async function(){
    var f=pFile.files&&pFile.files[0];
    if(!f) return;
    try{
      pv.blob=await compress(f,1000,0.72);
      var url=URL.createObjectURL(pv.blob);
      pBox.classList.add('hasimg');
      pBox.innerHTML='<img alt="proof photo" src="'+url+'">'+
        '<small style="display:block;margin-top:6px;color:#5c7a5c;font-weight:700">Tap to retake</small>';
      pBox.appendChild(pFile);
      pSave.disabled=false;
    }catch(e){ alert('Could not read that photo — please try again.'); }
  });

  pCancel.addEventListener('click',closeProof);
  overlay.addEventListener('click',function(e){ if(e.target===overlay&&!pv.saving) closeProof(); });

  pSave.addEventListener('click',async function(){
    if(!pv.blob||pv.saving) return;
    pv.saving=true;
    pSave.disabled=true;
    pSave.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Saving…';
    var meta={at:new Date().toISOString(),
              lat:pv.geo?pv.geo.lat:null,lng:pv.geo?pv.geo.lng:null,acc:pv.geo?pv.geo.acc:null};
    var entry={at:meta.at,lat:meta.lat,lng:meta.lng,acc:meta.acc,url:null,synced:false};
    try{
      var r=await uploadProof(pv.act,pv.blob,meta);
      entry.url=r.url; entry.synced=true;
    }catch(e){
      console.warn('[proof] upload failed:',e);
      var ok=confirm('Photo upload failed ('+(e&&e.message?e.message:'offline?')+').\n\nSave the record on this device and upload automatically later?');
      if(!ok){ pv.saving=false; pSave.disabled=false; pSave.innerHTML='<i class="fa-solid fa-check"></i> Save record'; return; }
      try{
        var q=pending();
        if(q.length>=25){ alert('Too many unsynced records on this device — please get online to sync before adding more.'); pv.saving=false; pSave.disabled=false; pSave.innerHTML='<i class="fa-solid fa-check"></i> Save record'; return; }
        q.push({act:pv.act,at:meta.at,lat:meta.lat,lng:meta.lng,acc:meta.acc,dataUrl:await blobToDataUrl(pv.blob)});
        savePending(q);
      }catch(ex){ alert('Could not save offline — storage is full or blocked.'); pv.saving=false; pSave.disabled=false; pSave.innerHTML='<i class="fa-solid fa-check"></i> Save record'; return; }
    }
    var list=entries(pv.act); list.unshift(entry); saveEntries(pv.act,list);
    if(pv.onSaved) pv.onSaved();
    closeProof();
  });

  /* ── History list under each activity ───────────────────── */
  function histItemHtml(e){
    var thumb;
    if(e.url) thumb='<img src="'+esc(e.url)+'" loading="lazy" onclick="window.open(this.src,\'_blank\')" alt="proof">';
    else thumb='<div class="ph-noimg"><i class="fa-solid '+(e.synced?'fa-image':'fa-cloud-arrow-up')+'"></i></div>';
    return '<div class="ph-item">'+thumb+
      '<div style="flex:1;min-width:0"><div>'+fmtWhen(e.at)+'</div><div>'+whereHtml(e)+'</div></div>'+
      (e.synced?'':'<span class="ph-pend"><i class="fa-solid fa-cloud-arrow-up"></i> pending sync</span>')+
      '</div>';
  }

  /* counter row; onChange is called after every +/- so progress can refresh */
  function actRow(a,color,target,onChange){
    var wrap=el('div');
    var row=el('div','act');
    var body=el('div','act-body');
    body.appendChild(el('h3',null,a.name));
    body.appendChild(el('p',null,a.desc));
    var bar=null,tgt=null;
    if(target){
      tgt=el('span','tgt');
      bar=el('div','bar'); bar.appendChild(el('span','fill'));
      body.appendChild(bar);
    }
    var histBtn=el('button','ph-toggle','<i class="fa-solid fa-clock-rotate-left"></i> <span>0 records</span>');
    histBtn.type='button';
    body.appendChild(histBtn);
    row.appendChild(el('div','icon-badge '+color,'<i class="fa-solid '+a.icon+'"></i>'));
    row.appendChild(body);
    if(tgt) row.appendChild(tgt);
    var counter=el('div','counter');
    var minus=el('button','cbtn minus','<i class="fa-solid fa-minus"></i>');
    minus.type='button'; minus.setAttribute('aria-label','Remove one from '+a.name);
    var cnt=el('span','cnt','0');
    var plus=el('button','cbtn plus','<i class="fa-solid fa-plus"></i>');
    plus.type='button'; plus.setAttribute('aria-label','Add one to '+a.name+' with photo proof');
    counter.appendChild(minus); counter.appendChild(cnt); counter.appendChild(plus);
    row.appendChild(counter);

    var hist=el('div','proof-hist');

    function paintHist(){
      var list=entries(a.key);
      histBtn.querySelector('span').textContent=list.length+' record'+(list.length===1?'':'s');
      if(hist.classList.contains('open')){
        hist.innerHTML=list.length?list.map(histItemHtml).join(''):'<div class="ph-empty">No records yet — tap + to add your first one with a photo.</div>';
      }
    }
    histBtn.addEventListener('click',function(){
      hist.classList.toggle('open');
      paintHist();
    });
    /* Tap anywhere on the job row (except the buttons) to open its history */
    row.style.cursor='pointer';
    row.addEventListener('click',function(e){
      if(e.target.closest&&(e.target.closest('button')||e.target.closest('a'))) return;
      hist.classList.toggle('open');
      paintHist();
    });

    function paint(){
      var l=MJM.log(), v=l[a.key]||0;
      cnt.textContent=v;
      minus.disabled=(v===0);
      if(target){
        row.classList.toggle('met',v>=target);
        tgt.textContent=Math.min(v,target)+' / '+target;
        bar.firstChild.style.width=Math.min(100,v/target*100)+'%';
      }
      paintHist();
    }
    function bump(d){
      var l=MJM.log();
      l[a.key]=Math.max(0,(l[a.key]||0)+d);
      MJM.saveLog(l);
      paint();
      if(onChange) onChange();
    }
    /* "+" now requires photo proof — the count only goes up after the
       record (photo + location + time) is saved. */
    plus.addEventListener('click',function(){ openProof(a,function(){ bump(1); }); });
    minus.addEventListener('click',function(){ bump(-1); });
    paint();
    wrap.appendChild(row);
    wrap.appendChild(hist);
    return wrap;
  }

  /* ---------- per-program view (?program=slug) ---------- */
  function renderProgram(slug){
    var prog=MJM.PROGRAMS[slug];
    document.title=prog.name+' — Practical Record — MJM Training Center';
    document.getElementById('pageTitle').textContent=prog.name;

    var regroup=null;

    function refresh(){
      if(regroup) regroup();
      var p=MJM.progress(slug);
      status.hidden=false;
      if(p.complete){
        status.className='cstatus ok';
        status.innerHTML='<i class="fa-solid fa-circle-check"></i> Program complete — well done!';
      }else{
        status.className='cstatus todo';
        status.innerHTML='<i class="fa-solid fa-bars-progress"></i> Program result: '+p.score+'%'+
          ' &nbsp;·&nbsp; Slides '+p.slides.got+'/'+p.slides.total+
          (p.practical.length?' &nbsp;·&nbsp; Practical '+p.practicalPct+'%':'');
      }
      // slides requirement row
      var slidesRow=document.getElementById('slidesReq');
      if(slidesRow){
        slidesRow.className='req'+(p.slides.met?' met':'');
        slidesRow.querySelector('.req-count').textContent=
          p.slides.met?'All '+p.slides.total+' slides read':p.slides.got+' of '+p.slides.total+' slides read';
        slidesRow.querySelector('.bar .fill').style.width=
          Math.min(100,p.slides.total?p.slides.got/p.slides.total*100:0)+'%';
        slidesRow.querySelector('.req-state i').className=
          'fa-solid '+(p.slides.met?'fa-circle-check':'fa-circle');
      }
    }

    var g1=el('div','req-group');
    g1.appendChild(el('h3',null,'<i class="fa-solid fa-book-open" style="color:var(--green);margin-right:8px"></i>Training Slides'));
    g1.appendChild(el('div','rg-sub','Reading is recorded automatically as you go through the slides.'));
    var sr=el('div','req'); sr.id='slidesReq';
    sr.innerHTML='<div class="icon-badge"><i class="fa-solid fa-book-open"></i></div>'+
      '<div class="req-body"><div class="req-name"><a href="'+prog.page+'">'+prog.name+' — open slides</a></div>'+
      '<div class="req-count"></div><div class="bar"><span class="fill"></span></div></div>'+
      '<div class="req-state"><i class="fa-solid fa-circle"></i></div>';
    g1.appendChild(sr);
    root.appendChild(g1);

    var g2=el('div','req-group');
    g2.appendChild(el('h3',null,'<i class="fa-solid fa-list-check" style="color:var(--green);margin-right:8px"></i>Practical Tasks'));
    var keys=Object.keys(prog.practical);
    if(keys.length){
      g2.appendChild(el('div','rg-sub','Reach each target to fulfil the practical requirement. Every + needs a photo — location, date and time are recorded as proof.'));
      var pendBody=el('div'), allDone=el('div','rg-sub','All practical targets met — see the Completed section below.');
      allDone.style.display='none';
      g2.appendChild(pendBody); g2.appendChild(allDone);
      // Completed tasks drop down here so pending work always stays on top.
      var g3=el('div','req-group');
      g3.appendChild(el('h3',null,'<i class="fa-solid fa-circle-check" style="color:var(--green);margin-right:8px"></i>Completed'));
      g3.appendChild(el('div','rg-sub','Targets already met. Records stay here — tap a job to see its history.'));
      var doneBody=el('div'); g3.appendChild(doneBody);
      g3.style.display='none';
      var rowByKey={};
      keys.forEach(function(k){
        var a=MJM.ACTIVITIES[k];
        rowByKey[k]=actRow({key:k,name:a.name,icon:a.icon,desc:a.desc},'ib-green',prog.practical[k],refresh);
      });
      regroup=function(){
        var l=MJM.log();
        keys.forEach(function(k){
          var met=(l[k]||0)>=prog.practical[k];
          (met?doneBody:pendBody).appendChild(rowByKey[k]);
        });
        g3.style.display=doneBody.children.length?'':'none';
        allDone.style.display=pendBody.children.length?'none':'';
      };
      root.appendChild(g2);
      root.appendChild(g3);
    }else{
      g2.appendChild(el('div','rg-sub','No practical tasks for this program — completing the training slides completes it.'));
      root.appendChild(g2);
    }

    var back=el('a','btn ghost','<i class="fa-solid fa-arrow-left"></i> Back to Training Pathways');
    back.href='nursery.html'; back.style.marginTop='26px';
    root.appendChild(back);

    refresh();
  }

  /* ---------- full logbook (no program selected) ---------- */
  function renderAll(){
    var GROUPS=[
      {title:'Field Work', sub:'Nursery operations carried out in the field. Every + needs a photo — location, date and time are recorded as proof.', color:'ib-green',
       keys:['seed-planting','seed-culling','watering','manuring','weeding','spraying','interrow','transplanting','culling']},
      {title:'Troubleshoot & Cases', sub:'Problems logged and resolved in Carlos.', color:'ib-earth',
       keys:['case-open','case-solve']},
      {title:'Site Office', sub:'Admin and sales work at the site office.', color:'ib-forest',
       keys:['order','report','collection']}
    ];
    /* If an admin assigned this user a role, only that role's practicals
       show, with the role's targets. Otherwise show everything, with each
       activity's highest target across all programs. */
    var roleMap=MJM.rolePractical();
    function targetFor(k){
      if(roleMap) return roleMap[k]||null;
      var t=0;
      Object.keys(MJM.PROGRAMS).forEach(function(s){
        var v=MJM.PROGRAMS[s].practical[k];
        if(v&&v>t) t=v;
      });
      return t||null;
    }
    function keyShown(k){ return roleMap?!!roleMap[k]:true; }

    var rk=MJM.roleKey();
    if(rk){
      root.appendChild(el('div','rg-sub',
        '<i class="fa-solid fa-user-check" style="color:var(--green);margin-right:6px"></i>Your role: <b>'+
        MJM.ROLES[rk].name+'</b> — showing the practicals this role must complete.'));
    }

    /* Categories are collapsed by default — tap one to expand its jobs */
    function collapsibleGroup(titleHtml,sub){
      var grp=el('div','req-group clps');
      var head=el('h3',null,'<span>'+titleHtml+'</span><span class="clps-n" data-n></span><i class="fa-solid fa-chevron-down clps-arrow"></i>');
      head.addEventListener('click',function(){ grp.classList.toggle('open'); });
      grp.appendChild(head);
      grp.appendChild(el('div','rg-sub',sub));
      var body=el('div','grp-body'); grp.appendChild(body);
      return {grp:grp,body:body,n:head.querySelector('[data-n]')};
    }

    var rowByKey={}, homeBody={}, groupEls=[];
    GROUPS.forEach(function(g){
      var keys=g.keys.filter(keyShown);
      if(!keys.length) return;
      var c=collapsibleGroup(g.title,g.sub);
      keys.forEach(function(k){
        var a=MJM.ACTIVITIES[k];
        rowByKey[k]=actRow({key:k,name:a.name,icon:a.icon,desc:a.desc},g.color,targetFor(k),regroup);
        homeBody[k]=c.body;
      });
      root.appendChild(c.grp);
      groupEls.push({grp:c.grp,body:c.body,n:c.n,keys:keys});
    });

    /* Completed jobs drop down here — pending work always stays on top */
    var done=collapsibleGroup(
      '<i class="fa-solid fa-circle-check" style="color:var(--green);margin-right:8px"></i>Completed',
      'Targets already met. Records stay here — tap a job to see its history.');
    done.grp.style.display='none';
    root.appendChild(done.grp);

    function regroup(){
      var l=MJM.log();
      groupEls.forEach(function(x){
        x.keys.forEach(function(k){
          var t=targetFor(k), met=!!t&&(l[k]||0)>=t;
          (met?done.body:homeBody[k]).appendChild(rowByKey[k]);
        });
      });
      groupEls.forEach(function(x){
        x.grp.style.display=x.body.children.length?'':'none';
        x.n.textContent=x.body.children.length+' job'+(x.body.children.length===1?'':'s');
      });
      done.grp.style.display=done.body.children.length?'':'none';
      done.n.textContent=done.body.children.length+' job'+(done.body.children.length===1?'':'s');
    }
    regroup();
  }

  var slug=param('program'), usedAll=!(slug&&MJM.PROGRAMS[slug]);
  if(usedAll) renderAll();
  else renderProgram(slug);

  // Refresh this user's role/slides settings from the server in the
  // background; re-render if an admin changed them since last visit.
  if(_sb&&usedAll){
    var _before=JSON.stringify(MJM.trainingAccess());
    MJM.refreshTrainingAccess(_sb).then(function(c){
      if(c&&JSON.stringify(c)!==_before){ root.innerHTML=''; renderAll(); }
    });
  }

  // Try to push any offline-queued proofs up in the background.
  syncPending();
})();
</script>

</body>
</html>
